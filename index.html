function animateLastRace() {
  const el = document.getElementById('panel-lastrace');
  if (!el) return;
  if (S.history.length === 0) { renderLastRace(); return; }

  const top3 = S.history[0].order.slice(0, 3);
  const rankColors = [
    { bg:'#c9a227', txt:'#000' },
    { bg:'#9aa0a6', txt:'#000' },
    { bg:'#b06a2a', txt:'#fff' },
  ];

  // 先用隨機馬初始化頭像，名字留空
  el.innerHTML = `<div class="lr-title">上場前三名</div>
    <div class="lr-podium">
      ${top3.map((h, i) => {
        const rc   = rankColors[i];
        const rand = POOL[Math.floor(Math.random() * POOL.length)];
        return `<div class="lr-horse">
          <div class="lr-portrait-wrap">
            <div class="lr-rank-badge" style="background:${rc.bg};color:${rc.txt}">${i+1}</div>
            <img class="lr-portrait" id="lr-img-${i}" src="./馬頭像/${rand.name}.png"
                 style="border-color:${h.color}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="lr-portrait-fallback" id="lr-fb-${i}"
                 style="background:${h.color}22;border-color:${h.color}">${rand.silk}</div>
          </div>
          <span class="lr-name lr-flip-name" id="lr-flip-${i}" style="color:${h.color}">　　　</span>
        </div>`;
      }).join('')}
    </div>`;

  const FLIP_HALF = 90;  // ms：翻到側面的時間
  const FLIP_MS   = 220; // ms：一次完整翻牌週期

  top3.forEach((h, i) => {
    const nameEl = document.getElementById('lr-flip-' + i);
    const imgEl  = document.getElementById('lr-img-'  + i);
    const fbEl   = document.getElementById('lr-fb-'   + i);
    if (!nameEl || !imgEl) return;

    const total = 460 + i * 80; // 總 scramble 時長
    let elapsed = 0;

    // 換一張隨機（或指定）頭像，帶翻牌動畫
    function flipTo(targetHorse) {
      imgEl.style.transition = `transform ${FLIP_HALF}ms ease-in`;
      imgEl.style.transform  = 'rotateY(90deg)';
      setTimeout(() => {
        imgEl.src = `./馬頭像/${targetHorse.name}.png`;
        if (fbEl) { fbEl.textContent = targetHorse.silk; }
        imgEl.style.transition = `transform ${FLIP_HALF}ms ease-out`;
        imgEl.style.transform  = 'rotateY(0deg)';
      }, FLIP_HALF);
    }

    setTimeout(() => {
      // 頭像翻牌 loop
      const imgTimer = setInterval(() => {
        elapsed += FLIP_MS;
        if (elapsed >= total) {
          clearInterval(imgTimer);
          flipTo(h); // 最後一次翻到真正的馬
        } else {
          flipTo(POOL[Math.floor(Math.random() * POOL.length)]);
        }
      }, FLIP_MS);

      // 名字 scramble loop（維持原有節奏）
      let nameElapsed = 0;
      const nameTimer = setInterval(() => {
        nameElapsed += 55;
        if (nameElapsed >= total) {
          clearInterval(nameTimer);
          nameEl.textContent = h.name;
          nameEl.style.fontWeight = '700';
          nameEl.style.animation  = 'lr-flip-settle .18s ease-out';
        } else {
          nameEl.textContent = POOL[Math.floor(Math.random() * POOL.length)].name;
        }
      }, 55);
    }, i * 180); // stagger 每張卡
  });
}

function getInsights() {
  const hist = S.history;
  const n    = hist.length;
  const out  = [];
  if (n === 0) return out;

  // 勝率王
  const winCnt = {};
  hist.slice(0, 10).forEach(r => {
    const w = r.order[0];
    if (w) winCnt[w.id] = (winCnt[w.id] || 0) + 1;
  });
  let topId = null, topCt = 0;
  Object.entries(winCnt).forEach(([id, c]) => { if (c > topCt) { topCt = c; topId = +id; } });
  if (topId) {
    const horse = S.horses.find(h => h.id === topId) || POOL.find(h => h.id === topId);
    if (horse) out.push({ icon:'🏆', title:'勝率王', horse,
      desc:`近${Math.min(n,10)}場 ${topCt}勝（${Math.round(topCt/Math.min(n,10)*100)}%）` });
  }

  // 爆冷王（單場最高賠率奪冠）
  let topOddsRace = null, topOdds = 0;
  hist.slice(0, 10).forEach(r => {
    if (r.winnerWinOdds && r.winnerWinOdds > topOdds) { topOdds = r.winnerWinOdds; topOddsRace = r; }
  });
  if (topOddsRace && topOdds >= 4) {
    const horse = S.horses.find(h => h.id === topOddsRace.order[0].id) || topOddsRace.order[0];
    if (horse) out.push({ icon:'💰', title:'爆冷王', horse, desc:`最高 ${topOdds}x 賠率奪冠` });
  }

  // 久未奪冠（≥5 場）
  // S.raceNum 是「當前投注中」場次，S.raceNum-1 才是最後完賽場次
  const completedRaces = S.raceNum - 1;
  const lastWinRace = {};
  hist.forEach(r => { const w = r.order[0]; if (w && lastWinRace[w.id] === undefined) lastWinRace[w.id] = r.raceNum; });
  let drHorse = null, maxDr = 0;
  S.horses.forEach(h => {
    const last = lastWinRace[h.id];
    const gap  = last !== undefined ? completedRaces - last : completedRaces;
    if (gap >= 5 && gap > maxDr) { maxDr = gap; drHorse = h; }
  });
  if (drHorse) out.push({ icon:'😴', title:'久未奪冠', horse: drHorse, desc:`已 ${maxDr} 場未奪冠` });

  // 前三常客（近10場前三次數最多）
  const top3Cnt = {};
  hist.slice(0, 10).forEach(r => {
    r.order.slice(0, 3).forEach(h => {
      if (h) top3Cnt[h.id] = (top3Cnt[h.id] || 0) + 1;
    });
  });
  let t3Horse = null, maxT3 = 2;
  S.horses.forEach(h => {
    const c = top3Cnt[h.id] || 0;
    if (c > maxT3) { maxT3 = c; t3Horse = h; }
  });
  if (t3Horse) out.push({ icon:'🎯', title:'前三常客', horse: t3Horse, desc:`近${Math.min(n,10)}場 ${maxT3}次前三` });

  // 黃金馬幾場未現
  const lastGoldenIdx = S.history.findIndex(r => r.specialType === 'GOLDEN');

let _icActiveCard = null;

function onInsightCardClick(e) {
  const card = e.target.closest('.insight-card[data-desc]');
  const tt   = document.getElementById('ic-tooltip');
  if (!tt) return;

  // 點同一張：收起
  if (_icActiveCard && _icActiveCard === card) {
    hideInsightTooltip();
    return;
  }

  if (!card) { hideInsightTooltip(); return; }

  // 移除舊 active
  document.querySelectorAll('.insight-card.ic-active').forEach(c => c.classList.remove('ic-active'));
  card.classList.add('ic-active');
  _icActiveCard = card;

  tt.textContent = card.dataset.desc;
  tt.classList.add('ic-tt-show');

  // 定位：卡片正上方，水平置中
  const rect = card.getBoundingClientRect();
  const ttW  = 160;
  let left   = rect.left + rect.width / 2 - ttW / 2;
  left = Math.max(6, Math.min(left, window.innerWidth - ttW - 6));
  const top  = rect.top - tt.offsetHeight - 10;
  tt.style.left  = left + 'px';
  // 先顯示取得高度再定位
  requestAnimationFrame(() => {
    const h  = tt.offsetHeight;
    const t2 = rect.top - h - 10;
    tt.style.top = (t2 < 6 ? rect.bottom + 10 : t2) + 'px';
  });
}

function hideInsightTooltip() {
  const tt = document.getElementById('ic-tooltip');
  if (tt) tt.classList.remove('ic-tt-show');
  document.querySelectorAll('.insight-card.ic-active').forEach(c => c.classList.remove('ic-active'));

}

// 計算某格累積投注金額（用 pos）
function cellBetTotal(type, positions) {
  return S.bets
    .filter(b => b.type===type && positions.every(p=>b.horses.includes(p)))
    .reduce((s,b)=>s+b.amount, 0);
}

function placeBet(type, pos) {
  if (S.phase!=='BETTING') return;
  const h = S.horses.find(x=>x.pos===pos);
  if (!h) return;
  const odds = type==='WIN' ? h.winOdds : h.placeOdds;
  if (S.balance < S.chipAmt) { flashInsufficient(); return; }
  S.balance -= S.chipAmt;
  updateBal();
  S.bets.push({type, horses:[pos], amount:S.chipAmt, odds});
  renderAll();
}

function flashInsufficient() {
  const el = document.getElementById('pf-total-val');
  if (!el) return;
  const orig = el.style.color;
  el.textContent = '餘額不足';
  el.style.color = 'var(--color-lose)';
  setTimeout(() => { el.style.color = orig; renderPanelFooter(); }, 1200);
}

function toggleTurbo() {
  S.turbo = !S.turbo;
  const btn = document.getElementById('bb-btn-turbo');
  if (!btn) return;
  btn.textContent = (S.turbo ? '☑' : '□') + ' 加速';
  btn.classList.toggle('active', S.turbo);
}

function repeatBet() {
  if (S.phase !== 'BETTING' || S.lastBets.length === 0) return;
  // 用 horse.id 對應當前賽局的 pos
  const idToPos = {};
  S.horses.forEach(h => { idToPos[h.id] = h.pos; });
  S.lastBets.forEach(b => {
    const newPos = b.horseIds.map(id => idToPos[id]).filter(Boolean);
    if (newPos.length !== b.horseIds.length) return; // 該馬本場不出賽
    if (S.balance < b.amount) return;
    if (b.type === 'QUINELLA' && newPos.length === 2) {
      S.balance -= b.amount;
      S.bets.push({ type:'QUINELLA', horses:newPos, amount:b.amount, odds:b.odds });
    } else if (b.type !== 'QUINELLA' && newPos.length === 1) {
      const horse = S.horses.find(h => h.pos === newPos[0]);
      const odds  = b.type === 'WIN' ? horse.winOdds : horse.placeOdds;
      S.balance -= b.amount;
      S.bets.push({ type:b.type, horses:newPos, amount:b.amount, odds });
    }
  });
  updateBal();
  renderAll();
}

function placeQuinellaBet(posA, posB) {
  if (S.phase!=='BETTING') return;
  const ha=S.horses.find(x=>x.pos===posA), hb=S.horses.find(x=>x.pos===posB);
  if (!ha||!hb) return;
  if (S.balance < S.chipAmt) return;
  S.balance -= S.chipAmt;
  updateBal();
  S.bets.push({type:'QUINELLA', horses:[posA,posB], amount:S.chipAmt, odds:calcQuinellaOdds(ha,hb)});
  renderAll();
}

function betAll() {
  if (S.phase !== 'BETTING') return;
  const horses = [...S.horses].sort((a,b) => a.pos - b.pos);
  const amt = S.chipAmt;
  let spent = 0;

  // 獨贏
  horses.forEach(h => {
    if (S.balance - spent < amt) return;
    spent += amt;
    S.bets.push({ type:'WIN', horses:[h.pos], amount:amt, odds:h.winOdds });
  });
  // 位置
  horses.forEach(h => {
    if (S.balance - spent < amt) return;
    spent += amt;
    S.bets.push({ type:'PLACE', horses:[h.pos], amount:amt, odds:h.placeOdds });
  });
  // 連贏
  for (let i = 0; i < horses.length - 1; i++) {
    for (let j = i + 1; j < horses.length; j++) {
      if (S.balance - spent < amt) break;
      const ha = horses[i], hb = horses[j];
      spent += amt;
      S.bets.push({ type:'QUINELLA', horses:[ha.pos,hb.pos], amount:amt, odds:calcQuinellaOdds(ha,hb) });
    }
  }

  S.balance -= spent;
  updateBal();
  renderAll();
}

function cancelAll() {
  const refund = S.bets.reduce((s,b)=>s+b.amount, 0);
  S.balance += refund;
  updateBal();
  S.bets = [];
  renderAll();
}

function updateRankBar(ts) {
  const sorted = S.horses
    .map(h => ({ h, left: racePositions[h.pos] || RACE_START_PCT }))
    .sort((a,b) => b.left - a.left);

  const posClass = ['p1','p2','p3','px','px','px','px'];
  const bgClass  = ['top1','top2','top3','','','',''];

  sorted.forEach(({ h }, rank) => {
    const rb = rbItemsByPos[h.pos];
    if (!rb) return;
    rb.el.style.order  = rank;
    rb.el.className    = `rb-item ${bgClass[rank]}`;
    rb.posEl.className = `rb-pos ${posClass[rank]}`;
    rb.posEl.textContent = rank + 1;
  });

  if (ts - lastArrowTs > 500) {
    sorted.forEach(({ h }, rank) => {
      const rb   = rbItemsByPos[h.pos];
      const prev = prevRanksByPos[h.pos];
      if (!rb) return;
      if (prev === -1 || rank === prev) {
        rb.arrowEl.className = 'rb-arrow same'; rb.arrowEl.textContent = '—';
      } else if (rank < prev) {
        rb.arrowEl.className = 'rb-arrow up';   rb.arrowEl.textContent = '▲';
      } else {
        rb.arrowEl.className = 'rb-arrow down'; rb.arrowEl.textContent = '▼';
      }
      prevRanksByPos[h.pos] = rank;
    });
    lastArrowTs = ts;
  }
}

function buildSpeedProfiles(script, order) {
  const p1 = {}, p2 = {}, p3 = {};
  const rnd = (min, rng) => min + Math.random() * rng;

  switch (script) {
    case 1: { // 終點焦灼：前3名三段緊貼，下直道才分出毫釐
      [0.90,0.89,0.88].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i].pos] = v + rnd(0,0.02); });
      [0.84,0.81,0.78,0.74].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i+3].pos] = v; });
      [0.91,0.90,0.89].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p2[order[i].pos] = v + rnd(0,0.02); });
      [0.82,0.79,0.75,0.71].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p2[order[i+3].pos] = v; });
      [1.18,1.14,1.10]
        .forEach((v,i) => { p3[order[i].pos] = v * rnd(0.98,0.03); });
      [0.76,0.71,0.66,0.62]
        .forEach((v,i) => { p3[order[i+3].pos] = v * rnd(0.96,0.06); });
      break;
    }
    case 2: { // 直線戰神：冠軍前兩段落後，下直道急速爆發超車
      p1[order[0].pos] = rnd(0.76, 0.06); // 上直道：慢
      p2[order[0].pos] = rnd(0.78, 0.06); // 彎道：持續落後
      p3[order[0].pos] = rnd(1.45, 0.10); // 下直道：爆發
      [0.91,0.89,0.87,0.85,0.83,0.81].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i+1].pos] = v; });
      [0.89,0.87,0.84,0.81,0.78,0.75].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p2[order[i+1].pos] = v; });
      [0.88,0.82,0.76,0.71,0.66,0.62]
        .forEach((v,i) => { p3[order[i+1].pos] = v * rnd(0.96,0.08); });
      break;
    }
    case 3: { // 彎道戰神：冠軍彎道爆發超車，下直道驚險守住
      p1[order[0].pos] = rnd(0.76, 0.06); // 上直道：落後
      p2[order[0].pos] = rnd(1.02, 0.08); // 彎道：大爆發
      p3[order[0].pos] = rnd(0.90, 0.06); // 下直道：略降速
      [0.91,0.89,0.87,0.85,0.83,0.81].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i+1].pos] = v; });
      [0.80,0.77,0.74,0.71,0.68,0.65].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p2[order[i+1].pos] = v; }); // 彎道其他馬慢
      p3[order[1].pos] = rnd(0.92, 0.06); // 亞軍後段追趕
      [0.86,0.80,0.74,0.68,0.62]
        .forEach((v,i) => { p3[order[i+2].pos] = v * rnd(0.96,0.08); });
      break;
    }
    case 4: { // 功虧一簣：亞軍前兩段領跑，冠軍下直道才絕境反超
      p1[order[0].pos] = rnd(0.84, 0.03);
      p1[order[1].pos] = rnd(0.93, 0.03); // 亞軍上直道最快
      [0.88,0.85,0.81,0.77,0.73].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i+2].pos] = v; });
      p2[order[0].pos] = rnd(0.88, 0.04);
      p2[order[1].pos] = rnd(0.94, 0.03); // 彎道亞軍仍領
      [0.86,0.82,0.78,0.74,0.70].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p2[order[i+2].pos] = v; });
      p3[order[0].pos] = rnd(1.52, 0.06); // 下直道冠軍爆發
      p3[order[1].pos] = rnd(1.14, 0.05); // 亞軍也快但差一截
      [0.82,0.76,0.70,0.65,0.60]
        .forEach((v,i) => { p3[order[i+2].pos] = v * rnd(0.96,0.08); });
      break;
    }
    case 5: { // 隨機演出：三段完全亂數
      order.forEach(h => {
        p1[h.pos] = rnd(0.75, 0.30);
        p2[h.pos] = rnd(0.75, 0.30);
        p3[h.pos] = rnd(0.75, 0.30);
      });
      break;
    }
    case 6: { // 一騎絕塵：冠軍三段全程壓制，無懸念
      p1[order[0].pos] = rnd(1.08, 0.04);
      [0.88,0.85,0.82,0.78,0.74,0.70].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i+1].pos] = v; });
      p2[order[0].pos] = rnd(1.06, 0.04);
      [0.86,0.82,0.78,0.74,0.70,0.66].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p2[order[i+1].pos] = v; });
      p3[order[0].pos] = rnd(1.14, 0.06);
      [1.02,0.94,0.86,0.78,0.71,0.64]
        .forEach((v,i) => { p3[order[i+1].pos] = v * rnd(0.96,0.08); });
      break;
    }
  }
  return { p1, p2, p3 };
}

// U-TRACK CANVAS HELPERS
// ════════════════════════════════════
function getTrackGeom() {
  const W = raceCanvasEl.offsetWidth, H = raceCanvasEl.offsetHeight;
  if (!W || !H) return null;
  const leftX  = W * 0.05;
  const midY   = H * 0.50;
  const topY   = H * 0.08;                      // lane 0 y（上直道最外道）
  const laneH  = (H * 0.24) / 6;               // 6 間距，總跨幅 24% H
  const margin = laneH * 0.5;
  const outerR = midY - topY + margin;           // 外側半徑
  // bendX 動態計算：確保弧形不超出右邊界（留 3% 右邊距）
  const bendX  = W * 0.97 - outerR;
  const R3     = midY - topY - 3 * laneH;       // 中間道半徑（用於弧長計算）
  const L_top  = bendX - leftX;
  const L_semi = Math.PI * R3;
  const L_bot  = L_top;
  return { W, H, leftX, bendX, midY, topY, laneH,
           L_top, L_semi, L_bot, L_total: L_top + L_semi + L_bot };
}

function getHorsePos(progress, laneIdx, g) {
  const d  = Math.max(0, Math.min(1, progress)) * g.L_total;
  const ri = g.midY - g.topY - laneIdx * g.laneH;
  if (d <= g.L_top) {
    return { x: g.leftX + d, y: g.topY + laneIdx * g.laneH, angle: 0 };
  } else if (d <= g.L_top + g.L_semi) {
    // 彎道統一用 L_semi（參考弧長），所有道次同步進出彎道，避免漂移時位置跳躍
    const theta = Math.PI * (d - g.L_top) / g.L_semi;
    return { x: g.bendX + ri * Math.sin(theta), y: g.midY - ri * Math.cos(theta), angle: theta };
  } else {
    return { x: g.bendX - (d - g.L_top - g.L_semi), y: g.midY + ri, angle: Math.PI };
  }
}

function drawTrack(ctx, g) {
  const { W, H, leftX, bendX, midY, topY, laneH } = g;
  const margin = laneH * 0.5;
  const outerR = midY - topY + margin;
  const innerR = Math.max(midY - topY - 6 * laneH - margin, laneH * 0.8);

  // 1. 背景
  ctx.fillStyle = '#071320';
  ctx.fillRect(0, 0, W, H);

  // 2. 跑道面：一次性路徑（外環順時針 + 內環逆時針 = 環形填充）
  ctx.fillStyle = '#7a5228';
  ctx.beginPath();
  // 外邊界（順時針）
  ctx.moveTo(leftX, midY - outerR);
  ctx.lineTo(bendX, midY - outerR);
  ctx.arc(bendX, midY, outerR, -Math.PI / 2, Math.PI / 2);
  ctx.lineTo(leftX, midY + outerR);
  // 內邊界（逆時針，切出內場孔洞）
  ctx.lineTo(leftX, midY + innerR);
  ctx.arc(bendX, midY, innerR, Math.PI / 2, -Math.PI / 2, true);
  ctx.lineTo(leftX, midY - innerR);
  ctx.closePath();
  ctx.fill();

  // 3. 內場草地
  ctx.fillStyle = '#0d3020';
  ctx.fillRect(leftX, midY - innerR, bendX - leftX, innerR * 2);
  ctx.beginPath();
  ctx.moveTo(bendX, midY - innerR);
  ctx.arc(bendX, midY, innerR, -Math.PI / 2, Math.PI / 2);
  ctx.closePath();
  ctx.fill();

  // 4. 內場文字
  ctx.save();
  ctx.font = `bold ${Math.round(laneH * 0.9)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,215,0,0.18)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('急速馬王', (leftX + bendX) / 2, midY);
  ctx.restore();

  // 5. 道次分隔線（直道虛線 + 彎道弧線）
  ctx.save();
  ctx.setLineDash([4, 8]);
  ctx.lineWidth = 0.7;
  ctx.strokeStyle = 'rgba(255,255,255,0.14)';
  for (let i = 1; i < 7; i++) {
    const ri = midY - topY - i * laneH;
    const ty = topY + i * laneH;
    const by = midY + ri;           // 下直道對應 y（鏡像）
    // 直道段
    ctx.beginPath(); ctx.moveTo(leftX, ty); ctx.lineTo(bendX, ty); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(leftX, by); ctx.lineTo(bendX, by); ctx.stroke();
    // 彎道段（弧線）
    ctx.beginPath(); ctx.arc(bendX, midY, ri, -Math.PI / 2, Math.PI / 2); ctx.stroke();
  }
  // 外緣邊界線
  ctx.setLineDash([]);
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(255,255,255,0.28)';
  ctx.beginPath(); ctx.moveTo(leftX, midY - outerR); ctx.lineTo(bendX, midY - outerR); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(leftX, midY + outerR); ctx.lineTo(bendX, midY + outerR); ctx.stroke();
  ctx.beginPath(); ctx.arc(bendX, midY, outerR, -Math.PI / 2, Math.PI / 2); ctx.stroke();
  // 內場邊界線
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.moveTo(leftX, midY - innerR); ctx.lineTo(bendX, midY - innerR); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(leftX, midY + innerR); ctx.lineTo(bendX, midY + innerR); ctx.stroke();
  ctx.beginPath(); ctx.arc(bendX, midY, innerR, -Math.PI / 2, Math.PI / 2); ctx.stroke();
  ctx.restore();

  // 6. 終點線（下直道左端，棋盤格）
  const fsTop = midY + innerR;
  const fsBot = midY + outerR;
  const sh    = (fsBot - fsTop) / 8;
  for (let s = 0; s < 8; s++) {
    ctx.fillStyle = s % 2 === 0 ? '#ffffff' : '#000000';
    ctx.fillRect(leftX - 4, fsTop + s * sh, 8, sh);
  }
  ctx.save();
  ctx.font = `bold ${Math.round(laneH * 0.6)}px sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.translate(leftX - 11, (fsTop + fsBot) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('FINISH', 0, 0);
  ctx.restore();

  // 7. 起跑線（上直道左端）
  const stTop = midY - outerR;
  const stBot = midY - innerR;
  ctx.fillStyle = 'rgba(46,204,113,0.80)';
  ctx.fillRect(leftX - 3, stTop, 6, stBot - stTop);
}

function drawHorses(ctx, geom, frameIdx, ts) {
  const SW = 52, SH = 52;
  const drawSz = Math.min(Math.round(geom.laneH * 2.4), 44);  // 精靈尺寸，上限 44px
  const half   = drawSz / 2;

  S.horses.forEach(h => {
    if (canvasDone[h.pos]) return;
    const rawProg = racePositions[h.pos];
    if (rawProg === undefined) return;
    const laneY   = horseLaneY[h.pos] ?? 3;
    const progress = (rawProg - RACE_START_PCT) / (RACE_FINISH_PCT - RACE_START_PCT);
    const { x, y, angle } = getHorsePos(Math.min(progress, 1.0), laneY, geom);
    const sx = (frameIdx % 6) * SW;

    const isSpec = S.specialHorse && h.pos === S.specialHorse.pos && S.specialRevealed;

    ctx.save();
    ctx.translate(x, y);

    // 光暈（現身後才顯示特殊光效）
    const flash = horseFlashes[h.pos];
    if (flash && ts < flash.until) {
      ctx.shadowBlur = 18; ctx.shadowColor = flash.color;
    } else if (isSpec) {
      const gc = S.specialType === 'GOLDEN' ? '#ffd700' : '#66aaff';
      ctx.shadowBlur = 14; ctx.shadowColor = gc;
    } else {
      ctx.shadowBlur = 0;
    }

    // 繪製馬匹精靈（依角度旋轉或翻轉）
    if (angle <= Math.PI / 2 + 0.05) {
      // 向右 / 向下右：正常旋轉
      ctx.rotate(angle);
      ctx.drawImage(horseSprite, sx, 0, SW, SH, -half, -half, drawSz, drawSz);
    } else {
      // 向左 / 向下左：水平翻轉
      ctx.scale(-1, 1);
      ctx.rotate(Math.PI - angle);
      ctx.drawImage(horseSprite, sx, 0, SW, SH, -half, -half, drawSz, drawSz);
    }
    ctx.restore();

    // 號碼方塊（馬匹上方或下方）
    const circR = Math.max(7, Math.round(geom.laneH * 0.50));
    const offY  = angle < Math.PI * 0.8 ? -(half + circR + 1) : (half + circR + 1);
    const cx = x, cy = y + offY;
    const sq = circR * 2;
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(cx - circR, cy - circR, sq, sq, Math.max(1, circR * 0.22));
    ctx.fillStyle   = h.color || '#888';
    ctx.globalAlpha = 0.92;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle    = '#fff';
    ctx.font         = `bold ${Math.round(circR * 1.1)}px sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(h.pos, cx, cy);
    ctx.restore();
  });
}

function updateCamera(dt) {
  const geom = getTrackGeom();
  if (!geom) return;
  const { W, H, leftX } = geom;

  // 按進度排序（最前面優先）
  const horses = S.horses.filter(h => racePositions[h.pos] !== undefined);
  if (!horses.length) return;
  horses.sort((a, b) => (racePositions[b.pos] || 0) - (racePositions[a.pos] || 0));

  // 前 3 匹的世界座標中心
  const top3 = horses.slice(0, Math.min(3, horses.length));
  let sumX = 0, sumY = 0;
  top3.forEach(h => {
    const prog = Math.min(1, Math.max(0, (racePositions[h.pos] - RACE_START_PCT) / (RACE_FINISH_PCT - RACE_START_PCT)));
    const { x, y } = getHorsePos(prog, horseLaneY[h.pos] ?? 3, geom);
    sumX += x; sumY += y;
  });
  const followX = sumX / top3.length;
  const followY = sumY / top3.length;

  // 最前馬進度（0 = 起跑，1 = 終點）
  const leadProg = Math.min(1, Math.max(0, (racePositions[horses[0].pos] - RACE_START_PCT) / (RACE_FINISH_PCT - RACE_START_PCT)));

  let tx, ty, tz;

  if (leadProg < 0.12) {
    // ── Phase 1：開賽 zoom in（鏡頭對準起跑線群馬）──
    tx = leftX + W * 0.13;
    ty = H * 0.20;
    tz = 1.9;
  } else if (leadProg > 0.80) {
    // ── Phase 3：衝線 zoom in（鏡頭往終點區推進）──
    const t  = Math.min(1, (leadProg - 0.80) / 0.12);
    const fx = leftX + W * 0.09;
    const fy = H * 0.80;
    tx = followX + (fx - followX) * t;
    ty = followY + (fy - followY) * t;
    tz = 1.4 + t * 0.55;   // 1.4 → 1.95
  } else {
    // ── Phase 2：跟隨領先群（中場跟跑）──
    tx = followX;
    ty = followY;
    tz = 1.35;
  }

  // 邊界限制（不超出畫布）
  const halfW = W / (2 * tz);
  const halfH = H / (2 * tz);
  tx = Math.max(halfW, Math.min(W - halfW, tx));
  ty = Math.max(halfH, Math.min(H - halfH, ty));

  // 指數平滑插值（frame-rate independent）
  const alpha = 1 - Math.pow(0.92, dt / 16);
  cam.x    += (tx - cam.x)    * alpha;
  cam.y    += (ty - cam.y)    * alpha;
  cam.zoom += (tz - cam.zoom) * alpha;
}

function drawRaceFrame(ts) {
  if (!raceCtx || !raceCanvasEl) return;
  const W = raceCanvasEl.offsetWidth, H = raceCanvasEl.offsetHeight;
  if (!W || !H) return;
  if (raceCanvasEl.width !== W || raceCanvasEl.height !== H) {
    raceCanvasEl.width = W; raceCanvasEl.height = H;
  }
  const geom = getTrackGeom();
  if (!geom) return;

  // ── 套用鏡頭變換（world → screen）──
  raceCtx.save();
  raceCtx.translate(W / 2, H / 2);
  raceCtx.scale(cam.zoom, cam.zoom);
  raceCtx.translate(-cam.x, -cam.y);

  drawTrack(raceCtx, geom);
  drawHorses(raceCtx, geom, Math.floor(ts / 80) % 6, ts);
  drawSpecialParticles(raceCtx);
  drawSmallMoveFloaters(raceCtx);

  raceCtx.restore();
}

function startRace() {
  S.phase = 'RACING';
  // 儲存本場注單供下場「重複下注」使用
  S.lastBets = S.bets.map(b => ({
    type: b.type, horseIds: b.horses.map(pos => S.horses.find(h=>h.pos===pos)?.id).filter(Boolean),
    amount: b.amount, odds: b.odds
  }));
  const startBtn = document.getElementById('btn-start');
  if (startBtn) startBtn.disabled = true;

  const overlay = document.getElementById('race-overlay');
  document.getElementById('result-backdrop').classList.remove('active');
  // ro-phase-lbl removed
  overlay.classList.add('active');

  buildRaceBackground();
  document.querySelectorAll('.ro-horse-wrap').forEach(e => e.remove());
  document.getElementById('finish-results').innerHTML = '';

  // ── 預先模擬（結果已定，存入 S.raceOrder 供跳過使用）──
  const order = simulateRace(S.horses);
  // QA 作弊：強制特殊馬第一名
  if (S.specialHorse) {
    const forceFirst = (S.specialType === 'GOLDEN' && S.forceGoldenFirst) ||
                       (S.specialType === 'BLACK'  && S.forceBlackFirst);
    if (forceFirst) {
      const idx = order.findIndex(h => h.pos === S.specialHorse.pos);
      if (idx > 0) order.unshift(order.splice(idx, 1)[0]);
    }
  }
  order.forEach((h, i) => h.finalPos = i + 1);
  S.raceOrder = order;
  // 劇本系統：3 段速度（上直道 / 右彎 / 下直道）
  const PHASE1_END  = 35;  // 上直道結束 %
  const PHASE2_END  = 65;  // 彎道結束 %
  const PHASE_TRANS = 3;   // 段間過渡寬度 %
  const phase1Speeds = {};
  const phase2Speeds = {};
  const phase3Speeds = {};

  // 特殊馬：中途現身時間（進度 18-42%）
  S.specialRevealed   = false;
  S.specialRevealPct  = S.specialHorse ? (0.18 + Math.random() * 0.24) : 2;
  specialParticles    = [];

  S.raceScript = selectRaceScript();
  const { p1: sp1, p2: sp2, p3: sp3 } = buildSpeedProfiles(S.raceScript, order);
  Object.assign(phase1Speeds, sp1);
  Object.assign(phase2Speeds, sp2);
  Object.assign(phase3Speeds, sp3);

  // ── 大招預計算 ──
  const bigMoveCfg        = BIG_MOVE_CFG[S.raceScript] || null;
  const bigMoveShouldFire = bigMoveCfg ? (Math.random() < bigMoveCfg.chance) : false;
  let   bigMoveFired      = false;
  _dbgBigMove = { cfg: bigMoveCfg, shouldFire: bigMoveShouldFire, fired: false };

  // ── 小招預計算（每匹馬每段最多觸發1次）──
  smallMoveFloaters = [];
  const p3MoveChance  = bigMoveShouldFire ? 0.15 : 0.35;
  const smallMovePlan = {};
  _dbgSmallPlan = smallMovePlan;
  S.horses.forEach(h => {
    const pick = pool => pool[Math.floor(Math.random() * pool.length)];
    smallMovePlan[h.pos] = {
      p1: Math.random() < 0.40 ? { at: 10 + Math.random() * 20, name: pick(MOVE_POOL.p1), fired: false } : null,
      p2: Math.random() < 0.40 ? { at: 40 + Math.random() * 20, name: pick(MOVE_POOL.p2), fired: false } : null,
      p3: Math.random() < p3MoveChance ? { at: 68 + Math.random() * 12, name: pick(MOVE_POOL.p3), fired: false } : null,
    };
  });

  // 特殊馬場次：後段絕對最快，確保視覺衝線正確
  if (S.specialHorse) {
    const maxP3 = Math.max(...Object.values(phase3Speeds));
    phase3Speeds[order[0].pos] = maxP3 + 0.30;
    phase2Speeds[order[0].pos] = Math.max(phase2Speeds[order[0].pos] || 0.85, 0.88);
    phase1Speeds[order[0].pos] = Math.max(phase1Speeds[order[0].pos] || 0.85, 0.88);
  }

  // ── Canvas U-Track 初始化 ──
  racePositions = {};
  horsesByIdx   = [...S.horses].sort(() => Math.random() - 0.5);
  horsesByIdx.forEach(h => { racePositions[h.pos] = RACE_START_PCT; });
  canvasDone    = {};
  S.horses.forEach(h => {
    canvasDone[h.pos]     = false;
    horseLaneY[h.pos]     = h.pos - 1;                   // 開賽：1號外道→6號內道，依序排好
    horseLaneTgt[h.pos]   = 0.3 + Math.random() * 5.4;  // 開跑後才開始隨機漂移
    horseLaneTimer[h.pos] = Math.random() * 1200;
  });
  raceCanvasEl  = document.getElementById('race-canvas');
  raceCtx       = raceCanvasEl.getContext('2d');
  raceCanvasEl.style.display = 'block';
  // 初始相機：全景（raceTick 開始後才 zoom in 至起跑線）
  const _ig = getTrackGeom();
  cam = _ig ? { x: _ig.W / 2, y: _ig.H / 2, zoom: 1.0 } : { x: 0, y: 0, zoom: 1.0 };
  drawRaceFrame(performance.now());   // 倒數期間先顯示空跑道

  buildRankBar();

  // ── 3-2-1-GO! 倒數，完成後才啟動跑馬動畫 ──
  showCountdown(() => {
    // ro-phase-lbl removed

    // scheduleSkills 已由新大招/小招系統取代，停用舊 DOM bubble 觸發

    // ── rAF 跑馬主迴圈 ──
    if (raceAnimId) cancelAnimationFrame(raceAnimId);
    const OFFSCREEN_PCT = 115;
    let lastTs          = null;
    const done          = {};
    const crossedFinish = {};
    let crossedCount    = 0;
    let raceEndCalled   = false;
    S.horses.forEach(h => { done[h.pos] = false; crossedFinish[h.pos] = false; });

    function raceTick(ts) {
      if (!lastTs) lastTs = ts;
      const dt = ts - lastTs;
      lastTs = ts;

      let anyRunning = false;
      S.horses.forEach(h => {
        if (done[h.pos]) return;
        const pos = racePositions[h.pos];
        let spd;
        if (pos < PHASE1_END) {
          spd = phase1Speeds[h.pos];
        } else if (pos < PHASE1_END + PHASE_TRANS) {
          const t = (pos - PHASE1_END) / PHASE_TRANS;
          spd = phase1Speeds[h.pos] * (1 - t) + phase2Speeds[h.pos] * t;
        } else if (pos < PHASE2_END) {
          spd = phase2Speeds[h.pos];
        } else if (pos < PHASE2_END + PHASE_TRANS) {
          const t = (pos - PHASE2_END) / PHASE_TRANS;
          spd = phase2Speeds[h.pos] * (1 - t) + phase3Speeds[h.pos] * t;
        } else {
          spd = phase3Speeds[h.pos];
        }
        const delta = spd * (RACE_FINISH_PCT - RACE_START_PCT) / CFG.RACE_DUR * dt * (S.turbo ? 2 : 1);
        racePositions[h.pos] = Math.min(racePositions[h.pos] + delta, OFFSCREEN_PCT);

        if (!crossedFinish[h.pos] && racePositions[h.pos] >= RACE_FINISH_PCT) {
          crossedFinish[h.pos] = true;
          canvasDone[h.pos]    = true;   // 衝線後立即停止繪製，不再亂跑
          crossedCount++;
          const rank = order.findIndex(x => x.pos === h.pos) + 1;
          showFinishMarker(h, rank);
          if (crossedCount === S.horses.length && !raceEndCalled) {
            raceEndCalled = true;
            onRaceEnd(order);
          }
        }

        if (racePositions[h.pos] >= OFFSCREEN_PCT) {
          done[h.pos] = true;
          canvasDone[h.pos] = true;
        } else {
          anyRunning = true;
        }
      });

      // ── 橫向漂移：每匹馬緩慢游移至隨機目標道次 ──
      const LANE_SPD = 0.0018; // lane 單位/ms（約 2-3 秒橫跨全道）
      S.horses.forEach(h => {
        if (done[h.pos] || crossedFinish[h.pos]) return;   // 衝線後停止漂移
        horseLaneTimer[h.pos] -= dt;
        if (horseLaneTimer[h.pos] <= 0) {
          horseLaneTgt[h.pos]   = 0.3 + Math.random() * 5.4;
          horseLaneTimer[h.pos] = 1200 + Math.random() * 2000;
        }
        const diff = horseLaneTgt[h.pos] - horseLaneY[h.pos];
        horseLaneY[h.pos] += Math.sign(diff) * Math.min(Math.abs(diff), LANE_SPD * dt);
        horseLaneY[h.pos]  = Math.max(0.1, Math.min(5.9, horseLaneY[h.pos]));
      });

      // ── 大招觸發 ──
      if (!bigMoveFired && bigMoveShouldFire && bigMoveCfg) {
        const winnerPos = racePositions[order[0].pos];
        if (winnerPos >= bigMoveCfg.triggerPct) {
          bigMoveFired = true;
          if (_dbgBigMove) _dbgBigMove.fired = true;
          triggerBigMove(bigMoveCfg);
        }
      }

      // ── 小招觸發 ──
      S.horses.forEach(h => {
        if (done[h.pos]) return;
        const pos  = racePositions[h.pos];
        const plan = smallMovePlan[h.pos];
        const geom = getTrackGeom();
        if (!geom) return;
        ['p1','p2','p3'].forEach(seg => {
          const m = plan[seg];
          if (!m || m.fired || pos < m.at) return;
          m.fired = true;
          const prog = Math.max(0, Math.min(1, (pos - RACE_START_PCT) / (RACE_FINISH_PCT - RACE_START_PCT)));
          const { x, y } = getHorsePos(prog, horseLaneY[h.pos] ?? 3, geom);
          smallMoveFloaters.push({ x, y, text: m.name, startTime: performance.now(), duration: 1800, rise: geom.laneH * 2.5, fontSize: Math.max(10, Math.round(geom.laneH * 0.9)) });
        });
      });

      // 特殊馬：進度到達閾值時中途現身
      if (S.specialHorse && !S.specialRevealed) {
        const prog = Math.max(0, (racePositions[S.specialHorse.pos] - RACE_START_PCT) / (RACE_FINISH_PCT - RACE_START_PCT));
        if (prog >= S.specialRevealPct) {
          S.specialRevealed = true;
          triggerSpecialMidReveal();
        }
      }
      // 特殊馬粒子更新
      if (S.specialRevealed) updateSpecialParticles(dt);

      updateCamera(dt);
      drawRaceFrame(ts);
      updateRankBar(ts);
      if (anyRunning) raceAnimId = requestAnimationFrame(raceTick);
    }
    raceAnimId = requestAnimationFrame(raceTick);
  });
}

function showCountdown(onComplete) {
  const el  = document.getElementById('race-countdown');
  const seq = [3, 2, 1, 'GO!'];
  const myGen = ++_countdownGen;  // 每次呼叫產生新世代，舊的 timeout 自動失效
  let i = 0;
  el.classList.add('cd-active');

  function tick() {
    if (_countdownGen !== myGen) return; // 已被新的倒數或 nextRace 取代，放棄
    const val  = seq[i];
    const isGo = val === 'GO!';

    if (isGo) {
      el.innerHTML = `<span class="cd-go">GO!</span>`;
    } else {
      el.innerHTML = `
        <div class="cd-wrapper">
          <svg class="cd-ring-svg" viewBox="0 0 120 120">
            <circle class="cd-ring-bg" cx="60" cy="60" r="52"/>
            <circle class="cd-ring-fg" cx="60" cy="60" r="52"/>
          </svg>
          <span class="cd-num">${val}</span>
        </div>`;
    }

    i++;
    if (i < seq.length) {
      setTimeout(tick, isGo ? 650 : 950);
    } else {
      setTimeout(() => {
        if (_countdownGen !== myGen) return;
        el.classList.remove('cd-active');
        onComplete();
      }, 650);
    }
  }
  tick();
}

const _RANK_LABELS = ['1st','2nd','3rd','4th','5th','6th','7th'];
const _RANK_COLORS = ['#ffd700','#c0c0c0','#cd7f32'];

function initFinishPanel() {
  const panel = document.getElementById('finish-results');
  panel.innerHTML = '';
  _RANK_LABELS.forEach((lbl, i) => {
    const row = document.createElement('div');
    row.id = `frm-slot-${i+1}`;
    row.className = 'frm-row rank-other';
    row.style.opacity = '.2';
    row.innerHTML = `<span class="frm-rank" style="color:#3a4a60">${lbl}</span><span class="frm-name" style="color:#2a3850">—</span>`;
    panel.appendChild(row);
  });
}

function showFinishMarker(h, rank) {
  const panel     = document.getElementById('finish-results');
  const rankColor = rank <= 3 ? _RANK_COLORS[rank-1] : '#5a6a85';
  const rowClass  = rank <= 3 ? `rank-${rank}` : 'rank-other';
  const nameColor = rank <= 3 ? rankColor : '#6a7a95';

  const row = document.createElement('div');
  row.className    = `frm-row ${rowClass}`;
  row.dataset.rank = rank;
  row.innerHTML =
    `<span class="frm-rank" style="color:${rankColor}">${_RANK_LABELS[rank-1]}</span>` +
    `<span class="frm-num" style="background:${h.color}33;border-color:${h.color};color:${h.color}">${h.pos}</span>` +
    `<span class="frm-name" style="color:${nameColor}">${h.name}</span>`;

  // 按 rank 插入正確位置，不論過線先後
  const existing = panel.querySelectorAll('.frm-row');
  let inserted = false;
  for (const r of existing) {
    if (parseInt(r.dataset.rank) > rank) { panel.insertBefore(row, r); inserted = true; break; }
  }
  if (!inserted) panel.appendChild(row);
}

function onRaceEnd(order) {
  // 停止跑馬 rAF
  if (raceAnimId) { cancelAnimationFrame(raceAnimId); raceAnimId = null; }
  setTimeout(() => {
    // Payout
    const {totalWin, results} = calcPayout(S.bets, S.horses);
    S.result = {totalWin, results, order};
    if (totalWin>0) S.balance += totalWin;
    S.history.unshift({ raceNum:S.raceNum, order:[...order], winnerWinOdds:order[0].winOdds, specialType: S.specialType || null });
    if (S.history.length>50) S.history.pop();
    saveMachineData();
    updateBal();
    S.phase='RESULT';

    // ── Podium ──
    document.getElementById('ro-podium').innerHTML =
      order.slice(0,3).map((h,i)=>{
        let badge = '';
        const sp = S.specialHorse && h.pos === S.specialHorse.pos;
        if (sp) {
          const ic = S.specialType === 'BLACK' ? '♚' : '★';
          const cl = S.specialType === 'BLACK' ? '#ccccff' : '#ffd700';
          badge = `<span style="color:${cl};font-size:.85em;">${ic}</span>`;
        }
        return `<div class="ro-podium-item">
          <span>${['🥇','🥈','🥉'][i]}</span>
          <span class="ro-podium-dot" style="background:${h.color}"></span>
          <span style="color:${h.color}">${h.name}</span>
          ${badge}
        </div>`;
      }).join('');

    // ── Bet breakdown ──
    const TYPE_LABEL = {WIN:'獨贏', PLACE:'位置', QUINELLA:'連贏'};
    let totalBet = 0;
    const merged = {};
    results.forEach(({bet, win}) => {
      const key = bet.type + '|' + [...bet.horses].sort().join('-');
      if (!merged[key]) merged[key] = { type:bet.type, horses:bet.horses, odds:bet.odds, amount:0, win:0 };
      merged[key].amount += bet.amount;
      merged[key].win    += win;
    });

    document.getElementById('rbd-list').innerHTML = Object.values(merged).map(row => {
      totalBet += row.amount;
      const isWon = row.win > 0;
      let targetHTML = '';
      if (row.type === 'QUINELLA') {
        const parts = row.horses.map(p => {
          const h = S.horses.find(x=>x.pos===p);
          return h ? `<span class="rbd-dot" style="background:${h.color}"></span><span>${h.name}</span>` : p;
        });
        targetHTML = parts.join('<span style="color:var(--text-dim);margin:0 .2em">＋</span>');
      } else {
        const h = S.horses.find(x=>x.pos===row.horses[0]);
        targetHTML = h ? `<span class="rbd-dot" style="background:${h.color}"></span><span>${h.name}</span>` : row.horses[0];
      }
      return `<div class="rbd-row ${isWon?'won-row':'lost-row'}">
        <span><span class="rbd-type-badge rbd-type-${row.type}">${TYPE_LABEL[row.type]}</span></span>
        <span class="rbd-target">${targetHTML}</span>
        <span>$${row.amount.toLocaleString()}</span>
        <span>${row.odds}x</span>
        <span class="${isWon?'rbd-result-won':'rbd-result-lost'}">${isWon?'✓ 中注':'✗ 未中'}</span>
        <span class="${isWon?'rbd-payout-won':'rbd-payout-lost'}">${isWon?'+$'+Math.round(row.win).toLocaleString():'—'}</span>
      </div>`;
    }).join('') || `<div style="padding:1.5% 2%;color:var(--text-dim);font-size:clamp(6px,.9vw,11px);text-align:center;">本場未下注</div>`;

    // ── Summary ──
    const net = Math.round(totalWin - totalBet);
    document.getElementById('sum-bet').textContent = '$'+totalBet.toLocaleString();
    document.getElementById('sum-pay').textContent = '$'+Math.round(totalWin).toLocaleString();
    const netEl = document.getElementById('sum-net');
    netEl.textContent = (net>=0?'+':'')+net.toLocaleString();
    netEl.style.color = net>0?'var(--color-win)':net<0?'var(--color-lose)':'var(--text-sub)';

    // ro-phase-lbl removed
    document.getElementById('result-backdrop').classList.add('active');
    markResultCells();
  }, 600);
}

let _settleMode = null; // 'settle' | 'warn'

function nextRace() {
  _countdownGen++;  // 取消任何進行中的倒數
  if (raceAnimId) { cancelAnimationFrame(raceAnimId); raceAnimId = null; }
  if (camTimer)   { clearTimeout(camTimer); camTimer = null; }
  if (raceCanvasEl) raceCanvasEl.style.display = 'none';
  document.getElementById('race-overlay').classList.remove('active');

  const savedResult   = S.result;
  const hasWin        = savedResult && savedResult.totalWin > 0;
  const specialInTop3 = S.specialHorse && S.raceOrder &&
    S.raceOrder.slice(0, 3).some(h => h.pos === S.specialHorse.pos);

  const BASE_DELAY  = 1000; // 停留 1 秒讓玩家看前三名標示
  const SPECIAL_DUR = 1800; // 特殊格閃爍 + 賠率展示
  const FLASH_DUR   = 2000; // 中獎格閃爍

  if (specialInTop3) {
    // 特殊馬入前三：先閃特殊格（賠率提升展示），再閃中獎格
    setTimeout(() => { flashSpecialCells(); refreshSpecialOdds(); }, BASE_DELAY);
    if (hasWin) {
      setTimeout(() => flashWinCells(savedResult),    BASE_DELAY + SPECIAL_DUR);
      setTimeout(() => showSettleDialog(savedResult), BASE_DELAY + SPECIAL_DUR + FLASH_DUR + 150);
    } else {
      setTimeout(() => showSettleDialog(savedResult), BASE_DELAY + SPECIAL_DUR + 150);
    }
  } else {
    // 一般流程（含特殊馬未入前三）
    if (hasWin) {
      setTimeout(() => flashWinCells(savedResult),    BASE_DELAY);
      setTimeout(() => showSettleDialog(savedResult), BASE_DELAY + FLASH_DUR + 150);
    } else {
      setTimeout(() => showSettleDialog(savedResult), BASE_DELAY + 150);
    }
  }
}

// 閃爍中獎格子（需要格子有 data-type / data-pos / data-pos-a / data-pos-b）
function flashWinCells(result) {
  if (!result) return;
  const seen = new Set();
  result.results.forEach(({bet, win}) => {
    if (win <= 0) return;
    let cell;
    if (bet.type === 'QUINELLA') {
      const [a, b] = bet.horses;
      const key = [a,b].sort().join('-');
      if (seen.has(key)) return; seen.add(key);
      cell = document.querySelector(`[data-type="QUINELLA"][data-pos-a="${a}"][data-pos-b="${b}"]`)
          || document.querySelector(`[data-type="QUINELLA"][data-pos-a="${b}"][data-pos-b="${a}"]`);
    } else {
      const key = bet.type + '-' + bet.horses[0];
      if (seen.has(key)) return; seen.add(key);
      cell = document.querySelector(`[data-type="${bet.type}"][data-pos="${bet.horses[0]}"]`);
    }
    if (cell) { cell.classList.remove('flash-win'); void cell.offsetWidth; cell.classList.add('flash-win'); }
  });
}

let smallMoveFloaters = []; // { x, y, text, startTime, duration }
let _dbgBigMove   = null;  // { cfg, shouldFire, fired } — debug 用
let _dbgSmallPlan = null;  // smallMovePlan ref — debug 用
let _countdownGen = 0;     // 每次 showCountdown 遞增，防止舊 timeout 殘留觸發

function triggerBigMove(cfg) {
  document.getElementById('bm-name').textContent = cfg.name;
  document.getElementById('bm-sub').textContent  = cfg.sub;
  const overlay = document.getElementById('big-move-overlay');
  overlay.classList.add('active');
  setTimeout(() => overlay.classList.remove('active'), 3000);
}

function drawSmallMoveFloaters(ctx) {
  const now = performance.now();
  smallMoveFloaters = smallMoveFloaters.filter(f => {
    const t = (now - f.startTime) / f.duration;
    if (t >= 1) return false;
    const alpha = t < 0.15 ? t / 0.15 : t > 0.65 ? 1 - (t - 0.65) / 0.35 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font        = `bold ${f.fontSize}px sans-serif`;
    ctx.fillStyle   = '#ffe066';
    ctx.strokeStyle = 'rgba(0,0,0,.6)';
    ctx.lineWidth   = 3;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    const floatY = f.y - f.rise * t;
    ctx.strokeText(f.text, f.x, floatY);
    ctx.fillText(f.text, f.x, floatY);
    ctx.restore();
    return true;
  });
}

// ── 特殊馬中途現身系統 ──

function refreshSpecialOdds() {
  if (!S.specialHorse) return;
  const h = S.specialHorse;
  [
    { type: 'WIN',   finalOdds: h.specialOdds },
    { type: 'PLACE', finalOdds: h.specialPlaceOdds },
  ].forEach(({ type, finalOdds }) => {
    const cell = document.querySelector(`[data-type="${type}"][data-pos="${h.pos}"]`);
    if (!cell) return;

    // ── 第二段：賠率 ticker ──
    const oddsEl = cell.querySelector('.bci-odds') || cell.querySelector('.hr-odds');
    if (oddsEl) {
      const baseVal = parseFloat(oddsEl.textContent) || finalOdds;
      let tick = 0;
      const TICKS = 14;
      function doTick() {
        tick++;
        if (tick >= TICKS) {
          oddsEl.textContent = finalOdds + 'x';
          oddsEl.classList.add('odds-refreshed');
        } else {
          const rand = +(baseVal + Math.random() * (finalOdds - baseVal)).toFixed(1);
          oddsEl.textContent = rand + 'x';
          setTimeout(doTick, 75);
        }
      }
      doTick();
    }
  });
}

function triggerSpecialMidReveal() {
  flashSpecialCells();
  refreshSpecialOdds();
  const banner  = document.getElementById('special-mid-banner');
  const isBlack = S.specialType === 'BLACK';
  const icon    = isBlack ? '♚' : '★';
  const text    = isBlack ? '黑金馬現身！' : '黃金馬現身！';
  banner.innerHTML = `
    <span class="smb-icon">${icon}</span>
    <span class="smb-text">${text}</span>
    <span class="smb-sep">|</span>
    <span class="smb-name">${S.specialHorse.pos}號 ${S.specialHorse.name}</span>
    <span class="smb-mult">${S.specialHorse.specialMult}x</span>`;
  banner.className = 'smb-active ' + (isBlack ? 'smb-black' : 'smb-golden');
  setTimeout(() => { banner.className = ''; banner.innerHTML = ''; }, 3800);
}

function spawnSpecialParticle(cx, cy, isBlack, laneH) {
  const angle  = Math.random() * Math.PI * 2;
  const scale  = (laneH || 20) / 20;
  const speed  = (25 + Math.random() * 65) * scale;
  const goldenPalette = ['#ffd700','#ffee44','#ffe566','#fff0a0','#ffaa00'];
  const blackPalette  = ['#ffffff','#aac0ff','#88aaee','#ddddff','#6688cc'];
  const palette = isBlack ? blackPalette : goldenPalette;
  specialParticles.push({
    x: cx + (Math.random() - 0.5) * laneH * 0.9,
    y: cy + (Math.random() - 0.5) * laneH * 0.5,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - speed * 0.35,
    life: 1,
    decay: (1.2 + Math.random() * 2.2) / 1000,
    size: (1.5 + Math.random() * 3.5) * scale,
    color: palette[Math.floor(Math.random() * palette.length)],
    glow: isBlack ? 5 : 8,
  });
}

function updateSpecialParticles(dt) {
  const h = S.specialHorse;
  if (h && !canvasDone[h.pos]) {
    const geom = getTrackGeom();
    if (geom) {
      const rawProg = racePositions[h.pos];
      if (rawProg !== undefined) {
        const progress = Math.max(0, Math.min(1, (rawProg - RACE_START_PCT) / (RACE_FINISH_PCT - RACE_START_PCT)));
        const { x, y } = getHorsePos(progress, horseLaneY[h.pos] ?? 3, geom);
        const isBlack = S.specialType === 'BLACK';
        const count = 2 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) spawnSpecialParticle(x, y, isBlack, geom.laneH);
      }
    }
  }
  for (let i = specialParticles.length - 1; i >= 0; i--) {
    const p = specialParticles[i];
    p.x   += p.vx * dt / 1000;
    p.y   += p.vy * dt / 1000;
    p.vy  += 110 * dt / 1000;
    p.life -= p.decay * dt;
    if (p.life <= 0) specialParticles.splice(i, 1);
  }
}

function drawSpecialParticles(ctx) {
  if (!specialParticles.length) return;
  for (const p of specialParticles) {
    const a = Math.max(0, p.life);
    ctx.save();
    ctx.globalAlpha  = a * 0.88;
    ctx.fillStyle    = p.color;
    ctx.shadowBlur   = p.glow;
    ctx.shadowColor  = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.size * a), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// 結算瞬間：頭像格標示前三名 + 特殊馬
function markResultCells() {
  if (!S.raceOrder) return;
  const medals      = ['🥇','🥈','🥉'];
  const rankColors  = ['#ffd700','#c0c0c0','#cd7f32'];
  const specialPos  = S.specialHorse ? S.specialHorse.pos : null;
  const top3Pos     = new Set(S.raceOrder.slice(0, 3).map(h => h.pos));

  S.raceOrder.slice(0, 3).forEach((h, i) => {
    const cell = document.querySelector(`.tl-img-cell[data-pos="${h.pos}"]`);
    if (!cell) return;
    if (h.pos === specialPos) {
      // 特殊馬入前三：維持頭像 + 亮框，只加角標
      cell.classList.add(`result-rank-${i + 1}`);
      const badge = document.createElement('span');
      badge.className = 'result-rank-badge';
      badge.textContent = medals[i];
      cell.appendChild(badge);
    } else {
      // 一般馬：編號旁加大 icon，保留頭像
      cell.innerHTML = `
        <div style="display:flex;align-items:center;gap:clamp(2px,.35vw,5px);">
          <div class="tl-num-badge" style="color:${h.color};border-color:${h.color}">${h.pos}</div>
          <span style="font-size:clamp(14px,2.2vw,28px);line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,.7))">${medals[i]}</span>
        </div>
        <img class="tl-portrait" src="./馬頭像/${h.name}.png"
             style="border-color:${h.color};"
             onerror="imgFallback(this,'${h.silk}','${h.name}','false')">`;
    }
  });

  // 特殊馬（未入前三）：頭像格加特殊馬圖示
  if (S.specialHorse && !top3Pos.has(specialPos)) {
    const isBlack = S.specialType === 'BLACK';
    const icon    = isBlack ? '♚' : '★';
    const color   = isBlack ? '#aac0ff' : '#ffd700';
    const cell    = document.querySelector(`.tl-img-cell[data-pos="${specialPos}"]`);
    if (cell) {
      cell.style.boxShadow = `inset 0 0 0 2px ${color}`;
      const badge = document.createElement('span');
      badge.className = 'result-rank-badge';
      badge.style.cssText = `color:${color};text-shadow:0 0 5px ${color};`;
      badge.textContent = icon;
      cell.appendChild(badge);
    }
  }
}

// 特殊馬格子亮框動畫（黃金/黑金/雙馬，不論玩家是否下注）
function flashSpecialCells() {
  if (!S.specialHorse) return;
  const targets = [];

  const addHorseCells = (horse) => {
    if (!horse) return;
    const cls = horse.specialType === 'GOLDEN' ? 'flash-special-golden' : 'flash-special-black';
    const winCell   = document.querySelector(`[data-type="WIN"][data-pos="${horse.pos}"]`);
    const placeCell = document.querySelector(`[data-type="PLACE"][data-pos="${horse.pos}"]`);
    if (winCell)   targets.push({ cell: winCell,   cls });
    if (placeCell) targets.push({ cell: placeCell, cls });
  };

  addHorseCells(S.specialHorse);

  targets.forEach(({ cell, cls }) => {
    cell.classList.remove('flash-special-golden','flash-special-black','flash-special-double');
    void cell.offsetWidth;
    cell.classList.add(cls);
    setTimeout(() => cell.classList.remove(cls), 1800);
  });
}

// 噴硬幣動畫
function spawnCoins(boxEl) {
  const icons = ['💰','🪙','💵','✨','⭐'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'coin-p';
      el.textContent = icons[Math.floor(Math.random() * icons.length)];
      el.style.setProperty('--tx', ((Math.random() - 0.5) * 240) + 'px');
      el.style.setProperty('--ty', ((Math.random() - 1.2) * 200) + 'px');
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.top  = (35 + Math.random() * 30) + '%';
      el.style.animationDelay = (Math.random() * 0.35) + 's';
      boxEl.appendChild(el);
      setTimeout(() => el.remove(), 1300);
    }, i * 45);
  }
}

// 顯示結算 Dialog（三種）
function showSettleDialog(result) {
  if (S.phase !== 'RESULT') return; // 防止 timeout 殘留在非結算階段觸發
  const overlay = document.getElementById('settle-overlay');
  const box     = document.getElementById('settle-box');
  const iconEl  = document.getElementById('sd-icon');
  const titleEl = document.getElementById('sd-title');
  const amtEl   = document.getElementById('sd-amount');
  const subEl   = document.getElementById('sd-sub');
  const btnEl   = document.getElementById('sd-btn');

  // 重置
  box.className = 'settle-box';
  titleEl.className = 'sd-title';
  amtEl.className   = 'sd-amount';
  btnEl.className   = 'sd-btn';
  amtEl.textContent = '';
  subEl.textContent = '';

  const totalWin    = result ? result.totalWin : 0;
  const hasFirstWin = result && result.results.some(r => r.win > 0 && r.bet.type === 'WIN');

  if (totalWin <= 0) {
    iconEl.textContent  = '😔';
    titleEl.textContent = '本局未中彩';
    subEl.textContent   = '再接再厲！';
  } else if (hasFirstWin) {
    box.classList.add('gold-box');
    iconEl.textContent  = '🏆';
    titleEl.classList.add('gold');
    titleEl.textContent = '獨贏！彩金出擊！';
    amtEl.classList.add('gold');
    amtEl.textContent   = '+$' + Math.round(totalWin).toLocaleString();
    setTimeout(() => spawnCoins(box), 120);
  } else {
    box.classList.add('win-box');
    iconEl.textContent  = '🎉';
    titleEl.textContent = '中彩！';
    amtEl.textContent   = '+$' + Math.round(totalWin).toLocaleString();
    setTimeout(() => spawnCoins(box), 120);
  }

  _settleMode = 'settle';
  overlay.classList.add('active');
}

// 資產不足 Dialog
function showInsufficientDialog() {
  const overlay = document.getElementById('settle-overlay');
  const box     = document.getElementById('settle-box');
  const iconEl  = document.getElementById('sd-icon');
  const titleEl = document.getElementById('sd-title');
  const amtEl   = document.getElementById('sd-amount');
  const subEl   = document.getElementById('sd-sub');
  const btnEl   = document.getElementById('sd-btn');

  box.className     = 'settle-box warn-box';
  titleEl.className = 'sd-title warn';
  btnEl.className   = 'sd-btn warn';

  titleEl.textContent = '籌碼不足';

}

// 玩家點擊 Dialog 按鈕
function onSettleConfirm() {
  document.getElementById('settle-overlay').classList.remove('active');
  const mode = _settleMode;
  _settleMode = null;
  if (mode === 'settle') doNextRace();
}

function openHistory() {
  // Reset to records tab
  switchHistTab('records');
  document.getElementById('history-overlay').classList.add('active');
}
function closeHistory() {
  document.getElementById('history-overlay').classList.remove('active');
}
function switchHistTab(tab) {
  const histBody       = document.getElementById('hist-body');
  const statsPanel     = document.getElementById('hist-stats-panel');
  const tabs           = document.querySelectorAll('.hist-tab');
  if (tab === 'records') {
    histBody.style.display   = '';
    statsPanel.classList.remove('active');
    tabs[0].classList.add('active');
    tabs[1].classList.remove('active');
    document.getElementById('hist-subtitle').textContent = '最新場次在最上方';
    renderHistory();
  } else {
    histBody.style.display   = 'none';
    statsPanel.classList.add('active');
    tabs[0].classList.remove('active');
    tabs[1].classList.add('active');
    document.getElementById('hist-subtitle').textContent = '基於近' + S.history.length + '場數據';
    renderHorseStats();
  }
}
function renderHorseStats() {
  const tbody = document.getElementById('stats-tbody');
  const total = S.history.length;

  if (total === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="color:var(--text-dim);padding:2em;text-align:center;">尚無紀錄，完成第一場後即開始記錄</td></tr>`;
    document.getElementById('hist-stats').innerHTML = '';
    return;
  }

  // Count stats per horse name
  const stats = {};
  POOL.forEach(h => {
    stats[h.name] = { name:h.name, color:h.color, appear:0, first:0, top2:0, top3:0 };
  });

  S.history.forEach(entry => {
    entry.order.forEach((h, i) => {
      if (!stats[h.name]) return;
      stats[h.name].appear++;
      if (i === 0) stats[h.name].first++;
      if (i <= 1)  stats[h.name].top2++;
      if (i <= 2)  stats[h.name].top3++;
    });
  });

  // Sort by first-place count desc
  const rows = Object.values(stats).sort((a,b) => b.first - a.first || b.top3 - a.top3);

  tbody.innerHTML = rows.map(s => {
    const app = s.appear;
    if (app === 0) return `
      <tr>
        <td><span class="stats-horse-name">
          <span class="hist-dot" style="background:${s.color}"></span>${s.name}
        </span></td>
        <td style="color:var(--text-dim)">—</td>
        <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>
      </tr>`;
    const r1  = (s.first / app * 100).toFixed(1);
    const r2  = (s.top2  / app * 100).toFixed(1);
    const r3  = (s.top3  / app * 100).toFixed(1);
    const bar = (pct, clr) =>
      `<span class="stats-rate-bar" style="width:${Math.max(2,parseFloat(pct)*.4)}px;background:${clr};"></span>`;
    return `
      <tr>
        <td><span class="stats-horse-name">
          <span class="hist-dot" style="background:${s.color}"></span>${s.name}
        </span></td>
        <td style="color:var(--text-sub)">${app}</td>
        <td class="rank-1">${s.first}${bar(r1,'var(--gold-bright)')}</td>
        <td class="rank-1">${r1}%</td>
        <td class="rank-2">${s.top2}${bar(r2,'#b0b8c8')}</td>
        <td class="rank-2">${r2}%</td>
        <td class="rank-3">${s.top3}${bar(r3,'#cd7f32')}</td>
        <td class="rank-3">${r3}%</td>
      </tr>`;
  }).join('');

  // Update summary bar
  const goldenCount = S.history.filter(e => e.goldenPos).length;
  document.getElementById('hist-stats').innerHTML = `
    <div class="stat-item">共 <span class="stat-val">${total}</span> 場數據</div>
    <div style="width:1px;height:60%;background:var(--border)"></div>
    <div class="stat-item">彩金馬場次 <span class="stat-val" style="color:var(--color-golden)">${goldenCount}</span>（${Math.round(goldenCount/total*100)}%）</div>`;
}

function renderHistory() {
  const tbody = document.getElementById('hist-tbody');
  tbody.innerHTML = '';

  if (S.history.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" style="color:var(--text-dim);padding:2em;text-align:center;">尚無紀錄，完成第一場後即開始記錄</td></tr>`;
    document.getElementById('hist-stats').innerHTML = '';
    document.getElementById('hist-subtitle').textContent = '尚無紀錄';
    return;
  }

  S.history.forEach(entry => {
    const tr = document.createElement('tr');

    // Race num cell
    const raceCell = `<td class="hist-race-num">#${entry.raceNum}</td>`;

    // Horse cells for each position
    const horseCells = entry.order.map((h, i) => {
      const rankCls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
      return `<td>
        <span class="hist-horse-badge">
          <span class="hist-dot" style="background:${h.color}"></span>
          <span class="${rankCls}" style="color:var(--text-sub)">${h.name}</span>
        </span>
      </td>`;
    }).join('');

    const noteCell = `<td style="color:var(--text-dim)">—</td>`;
    tr.innerHTML = raceCell + horseCells + noteCell;
    tbody.appendChild(tr);
  });

  // Stats
  const total = S.history.length;
  const firstCount = {};
  S.history.forEach(e => {
    const name = e.order[0]?.name;
    if (name) firstCount[name] = (firstCount[name]||0)+1;
  });
  const topHorse = Object.entries(firstCount).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('hist-subtitle').textContent = `最新場次在最上方 · 共 ${total} 場`;
  document.getElementById('hist-stats').innerHTML = `
    <div class="stat-item">已記錄 <span class="stat-val">${total}</span> / 50 場</div>
    <div style="width:1px;height:60%;background:var(--border)"></div>
    <div class="stat-item">最常奪冠 <span class="stat-val">${topHorse ? topHorse[0]+' ('+topHorse[1]+'次)' : '—'}</span></div>`;
}

// DEBUG
// ════════════════════════════════════
function renderDbg() {
  document.getElementById('dbg').innerHTML=`
    <div style="color:var(--accent-gold);font-weight:700;margin-bottom:4px;">🛠 DEBUG</div>
    <div>Phase: <b>${S.phase}</b> | Race: #${S.raceNum}</div>
    <div>Balance: $${S.balance} | Bets: ${S.bets.length}</div>
    <div>特殊馬: ${S.specialHorse ? (S.specialType==='BLACK'?'黑金馬':'黃金馬')+' 馬 #'+S.specialHorse.pos+' 獨贏'+S.specialHorse.specialWinMult+'x／位置'+S.specialHorse.specialPlaceMult+'x → WIN:'+S.specialHorse.specialOdds+'x PLACE:'+S.specialHorse.specialPlaceOdds+'x' : '無'}</div>
    <div>劇本: ${S.raceScript ? S.raceScript+' '+SCRIPT_NAMES[S.raceScript] : '—'}</div>
    <div style="margin-top:3px;">大招: ${(() => {
      if (!_dbgBigMove || !_dbgBigMove.cfg) return '<span style="color:#555">無</span>';
      const d = _dbgBigMove;
      if (!d.shouldFire) return `<span style="color:#555">${d.cfg.name}（本場不觸發）</span>`;
      const status = d.fired ? '<span style="color:#e080ff">✔ 已觸發</span>' : `<span style="color:#cc88ff">待觸發 @${d.cfg.triggerPct}%</span>`;
      return `<b style="color:#e080ff">${d.cfg.name}</b> ${status}`;
    })()}</div>
    <div style="margin-top:3px;color:#888;font-size:9px;">小招：${(() => {
      if (!_dbgSmallPlan) return '—';
      const rows = S.horses.map(h => {
        const p = _dbgSmallPlan[h.pos];
        if (!p) return '';
        const segs = ['p1','p2','p3'].map(s => {
          const m = p[s];
          if (!m) return null;
          const st = m.fired ? `<span style="color:#2AC98C">✔${m.name}</span>` : `<span style="color:#aaa">${m.name}@${Math.round(m.at)}%</span>`;
          return st;
        }).filter(Boolean);
        return segs.length ? `#${h.pos}:${segs.join(' ')}` : '';
      }).filter(Boolean);
      return rows.join('  ') || '（無小招）';
    })()}</div>
    <label style="cursor:pointer;display:block;margin-top:4px;">
      <input type="checkbox" ${S.forceGoldenHorse?'checked':''} onchange="S.forceGoldenHorse=this.checked;renderDbg();">
      強制黃金馬
    </label>
    <label style="cursor:pointer;display:block;margin-top:2px;padding-left:10px;color:#ffdd88;">
      <input type="checkbox" ${S.forceGoldenFirst?'checked':''} onchange="S.forceGoldenFirst=this.checked;renderDbg();">
      └ 黃金馬必定第一
    </label>
    <label style="cursor:pointer;display:block;margin-top:4px;">
      <input type="checkbox" ${S.forceBlackHorse?'checked':''} onchange="S.forceBlackHorse=this.checked;renderDbg();">
      強制黑金馬
    </label>
    <label style="cursor:pointer;display:block;margin-top:2px;padding-left:10px;color:#aaaaff;">
      <input type="checkbox" ${S.forceBlackFirst?'checked':''} onchange="S.forceBlackFirst=this.checked;renderDbg();">
      └ 黑金馬必定第一
    </label>
    <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;">
      <button onclick="nextRace()" style="background:#333;border:1px solid #555;color:#ccc;padding:2px 6px;border-radius:3px;cursor:pointer;font-size:10px;">跳下一場</button>
      <button onclick="S.balance=10000;updateBal();renderDbg();" style="background:#333;border:1px solid #555;color:#ccc;padding:2px 6px;border-radius:3px;cursor:pointer;font-size:10px;">補充籌碼</button>
    </div>
    `;
}

function toggleDbg() {
  const p = document.getElementById('dbg');
  if (p.style.display === 'none') { p.style.display = 'block'; renderDbg(); }
  else p.style.display = 'none';
}

// ── Horse sprite animation — JS-driven, no CSS animation bugs ──
(function(){
  let frame = 0;
  const FRAMES   = 6;
  const FRAME_W  = 52; // matches .ro-horse-sprite width in px
  setInterval(() => {
    frame = (frame + 1) % FRAMES;
    const pos = (-frame * FRAME_W) + 'px 0';
    document.querySelectorAll('.ro-horse-sprite').forEach(el => {
      el.style.backgroundPosition = pos;
    });
  }, 83); // ~12 fps
})();
</script>
