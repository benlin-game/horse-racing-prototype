const SCRIPT_NAMES = {
  1:'後來居上', 2:'終點焦灼', 3:'隨機演出', 4:'功虧一簣', 5:'一騎絕塵'
};

function selectRaceScript() {
  // 純機率抽劇本，與賠率結果無關
  const r = Math.random();
  if (r < 0.15) return 1; // 後來居上  15%
  if (r < 0.30) return 2; // 終點焦灼  15%
  if (r < 0.65) return 3; // 隨機演出  35%
  if (r < 0.80) return 4; // 功虧一簣  15%
  return 5;                // 一騎絕塵  20%
}

function buildSpeedProfiles(script, order) {
  const p1 = {}, p2 = {};
  const rnd = (min, rng) => min + Math.random() * rng;

  switch (script) {
    case 1: { // 後來居上：冠軍落後 → 後段大招超車
      p1[order[0].pos] = rnd(0.80, 0.04);
      [0.93,0.91,0.89,0.87,0.85,0.83].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i+1].pos] = v; });
      [1.40,0.88,0.82,0.76,0.71,0.66,0.62]
        .forEach((v,i) => { p2[order[i].pos] = v * rnd(0.96,0.08); });
      break;
    }
    case 2: { // 終點焦灼：前三名緊貼，幾乎同時衝線
      [0.88,0.87,0.86].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i].pos]   = v + rnd(0,0.02); });
      [0.84,0.81,0.77,0.73].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i+3].pos] = v + rnd(0,0.02); });
      [1.18,1.12,1.07]
        .forEach((v,i) => { p2[order[i].pos]   = v * rnd(0.98,0.04); });
      [0.76,0.71,0.66,0.62]
        .forEach((v,i) => { p2[order[i+3].pos] = v * rnd(0.96,0.08); });
      break;
    }
    case 3: { // 隨機演出：完全隨機，無任何劇本結構
      order.forEach(h => {
        p1[h.pos] = rnd(0.75, 0.30); // 0.75–1.05，每匹獨立亂數
        p2[h.pos] = rnd(0.75, 0.30);
      });
      break;
    }
    case 4: { // 功虧一簣：亞軍領跑 → 冠軍最後一刻反超
      p1[order[0].pos] = rnd(0.84, 0.03);
      p1[order[1].pos] = rnd(0.90, 0.03);
      [0.87,0.84,0.80,0.76,0.72].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i+2].pos] = v; });
      p2[order[0].pos] = rnd(1.50, 0.06);
      p2[order[1].pos] = rnd(1.28, 0.05);
      [0.82,0.76,0.70,0.65,0.60]
        .forEach((v,i) => { p2[order[i+2].pos] = v * rnd(0.96,0.08); });
      break;
    }
    case 5: { // 一騎絕塵：冠軍全程領跑，無人追上
      p1[order[0].pos] = rnd(1.06, 0.04);
      [0.88,0.85,0.82,0.78,0.74,0.70].sort(()=>Math.random()-.5)
        .forEach((v,i) => { p1[order[i+1].pos] = v; });
      p2[order[0].pos] = rnd(1.12, 0.06);
      [1.05,0.96,0.87,0.78,0.71,0.64]
        .forEach((v,i) => { p2[order[i+1].pos] = v * rnd(0.96,0.08); });
      break;
    }
  }
  return { p1, p2 };
}

// ════════════════════════════════════
// U-TRACK CANVAS HELPERS
// ════════════════════════════════════
function getTrackGeom() {
  const W = raceCanvasEl.offsetWidth, H = raceCanvasEl.offsetHeight;
  const leftX = W * 0.06;
  const bendX = W * 0.88;
  const midY  = H * 0.50;
  const topY  = H * 0.10;                   // 最外道（lane 0）在上直道的 y
  const laneH = (H * 0.35) / 6;             // 7 道 6 間距，跨幅 = 35% H
  const R3    = midY - topY - 3 * laneH;    // 中間道（laneIdx=3）半徑
  const L_top = bendX - leftX;
  const L_semi = Math.PI * R3;
  const L_bot  = L_top;
  return { W, H, leftX, bendX, midY, topY, laneH,
           L_top, L_semi, L_bot, L_total: L_top + L_semi + L_bot };
}

function getHorsePos(progress, laneIdx, g) {
  const d  = Math.max(0, Math.min(1, progress)) * g.L_total;
  const ri = g.midY - g.topY - laneIdx * g.laneH;   // 此道半徑
  if (d <= g.L_top) {
    // 上直道：左→右
    return { x: g.leftX + d, y: g.topY + laneIdx * g.laneH, angle: 0 };
  } else if (d <= g.L_top + g.L_semi) {
    // 右彎
    const theta = Math.PI * (d - g.L_top) / g.L_semi;
    return { x: g.bendX + ri * Math.sin(theta), y: g.midY - ri * Math.cos(theta), angle: theta };
  } else {
    // 下直道：右→左
    return { x: g.bendX - (d - g.L_top - g.L_semi), y: g.midY + ri, angle: Math.PI };
  }
}

function drawTrack(ctx, g) {
  const { W, H, leftX, bendX, midY, topY, laneH } = g;
  const margin = laneH * 0.4;
  const outerR = midY - topY + margin;
  const innerR = Math.max(midY - topY - 6 * laneH - margin, laneH * 0.3);
  const midR   = (outerR + innerR) / 2;
  const bandW  = outerR - innerR;

  // 背景
  ctx.fillStyle = '#071320';
  ctx.fillRect(0, 0, W, H);

  // 跑道面（上直、下直、右彎弧帶）
  ctx.fillStyle = '#7a5228';
  ctx.fillRect(leftX, midY - outerR, bendX - leftX, bandW);
  ctx.fillRect(leftX, midY + innerR, bendX - leftX, bandW);
  ctx.save();
  ctx.lineWidth = bandW + 1;
  ctx.strokeStyle = '#7a5228';
  ctx.beginPath();
  ctx.arc(bendX, midY, midR, -Math.PI / 2, Math.PI / 2);
  ctx.stroke();
  ctx.restore();

  // 內側草地（直道矩形 + 右彎 D 形填充）
  ctx.fillStyle = '#0d3020';
  ctx.fillRect(leftX, midY - innerR, bendX - leftX, innerR * 2);
  ctx.save();
  ctx.fillStyle = '#0d3020';
  ctx.beginPath();
  ctx.moveTo(bendX, midY - innerR);
  ctx.arc(bendX, midY, innerR, -Math.PI / 2, Math.PI / 2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 內場文字
  ctx.save();
  ctx.font = `bold ${Math.round(laneH * 1.0)}px sans-serif`;
  ctx.fillStyle = 'rgba(255,215,0,0.20)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('急速馬王', (leftX + bendX) / 2, midY);
  ctx.restore();

  // 道次分隔線（虛線）
  ctx.save();
  ctx.setLineDash([5, 9]);
  ctx.lineWidth = 0.8;
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  for (let i = 1; i < 7; i++) {
    const ty = topY + i * laneH;
    const by = 2 * midY - ty;
    ctx.beginPath(); ctx.moveTo(leftX, ty); ctx.lineTo(bendX, ty); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(leftX, by); ctx.lineTo(bendX, by); ctx.stroke();
  }
  // 外緣實線
  ctx.setLineDash([]);
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(255,255,255,0.30)';
  ctx.beginPath(); ctx.moveTo(leftX, midY - outerR); ctx.lineTo(bendX, midY - outerR); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(leftX, midY + outerR); ctx.lineTo(bendX, midY + outerR); ctx.stroke();
  ctx.beginPath(); ctx.arc(bendX, midY, outerR, -Math.PI / 2, Math.PI / 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.arc(bendX, midY, innerR, -Math.PI / 2, Math.PI / 2); ctx.stroke();
  ctx.restore();

  // 終點線（下直道左端）
  const fsTop = midY + innerR;
  const fsBot = midY + outerR;
  const stripes = 8;
  const sh = (fsBot - fsTop) / stripes;
  for (let s = 0; s < stripes; s++) {
    ctx.fillStyle = s % 2 === 0 ? '#ffffff' : '#000000';
    ctx.fillRect(leftX - 4, fsTop + s * sh, 8, sh);
  }
  ctx.save();
  ctx.font = `bold ${Math.round(laneH * 0.65)}px sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.save();
  ctx.translate(leftX - 12, (fsTop + fsBot) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('FINISH', 0, 0);
  ctx.restore();
  ctx.restore();

  // 起跑標記（上直道左端）
  const stTop = midY - outerR;
  const stBot = midY - innerR;
  ctx.fillStyle = 'rgba(46,204,113,0.75)';
  ctx.fillRect(leftX - 3, stTop, 6, stBot - stTop);
}

function drawHorses(ctx, geom, frameIdx, ts) {
  const SW = 52, SH = 52;
  const drawSz = Math.round(geom.laneH * 1.7);   // canvas 繪製尺寸（縮放後）
  const half   = drawSz / 2;

  horsesByIdx.forEach((h, laneIdx) => {
    if (canvasDone[h.pos]) return;
    const rawProg = racePositions[h.pos];
    if (rawProg === undefined) return;
    const progress = (rawProg - RACE_START_PCT) / (RACE_FINISH_PCT - RACE_START_PCT);
    const { x, y, angle } = getHorsePos(Math.min(progress, 1.0), laneIdx, geom);
    const sx = (frameIdx % 6) * SW;

    const isSpec1 = S.specialHorse  && h.pos === S.specialHorse.pos;
    const isSpec2 = S.specialHorse2 && h.pos === S.specialHorse2.pos;

    ctx.save();
    ctx.translate(x, y);

    // 光暈
    const flash = horseFlashes[h.pos];
    if (flash && ts < flash.until) {
      ctx.shadowBlur = 18; ctx.shadowColor = flash.color;
    } else if (isSpec1 || isSpec2) {
      const gc = ((isSpec1 && S.specialType === 'GOLDEN') || (isSpec2 && S.specialType2 === 'GOLDEN'))
        ? '#ffd700' : '#66aaff';
      ctx.shadowBlur = 12; ctx.shadowColor = gc;
    } else {
      ctx.shadowBlur = 0;
    }

    // 繪製馬匹精靈（依角度旋轉或翻轉）
    if (angle <= Math.PI / 2 + 0.05) {
      // 向右 / 向下右：正常旋轉
      ctx.rotate(angle);
      ctx.drawImage(horseSprite, sx, 0, SW, SH, -half, -half, drawSz, drawSz);
    } else {
      // 向左 / 向下左：水平翻轉
      ctx.scale(-1, 1);
      ctx.rotate(Math.PI - angle);
      ctx.drawImage(horseSprite, sx, 0, SW, SH, -half, -half, drawSz, drawSz);
    }
    ctx.restore();

    // 號碼圓（馬匹上方或下方）
    const circR = Math.max(7, Math.round(geom.laneH * 0.50));
    const offY  = angle < Math.PI * 0.8 ? -(half + circR + 1) : (half + circR + 1);
    const cx = x, cy = y + offY;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, circR, 0, Math.PI * 2);
    ctx.fillStyle   = h.color || '#888';
    ctx.globalAlpha = 0.92;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle    = '#fff';
    ctx.font         = `bold ${Math.round(circR * 1.1)}px sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(h.pos, cx, cy);
    ctx.restore();
  });
}

function drawRaceFrame(ts) {
  if (!raceCtx || !raceCanvasEl) return;
  const W = raceCanvasEl.offsetWidth, H = raceCanvasEl.offsetHeight;
  if (raceCanvasEl.width !== W || raceCanvasEl.height !== H) {
    raceCanvasEl.width = W; raceCanvasEl.height = H;
  }
  const geom = getTrackGeom();
  drawTrack(raceCtx, geom);
  drawHorses(raceCtx, geom, Math.floor(ts / 80) % 6, ts);
}

// RACE
// ════════════════════════════════════
function startRace() {
  S.phase = 'RACING';
  // 儲存本場注單供下場「重複下注」使用
  S.lastBets = S.bets.map(b => ({
    type: b.type, horseIds: b.horses.map(pos => S.horses.find(h=>h.pos===pos)?.id).filter(Boolean),
    amount: b.amount, odds: b.odds
  }));
  const startBtn = document.getElementById('btn-start');
  if (startBtn) startBtn.disabled = true;

  const overlay = document.getElementById('race-overlay');
  document.getElementById('result-backdrop').classList.remove('active');
  document.getElementById('ro-phase-lbl').textContent = '🏇 準備起跑！';
  overlay.classList.add('active');

  buildRaceBackground();
  document.querySelectorAll('.ro-horse-wrap').forEach(e => e.remove());
  document.getElementById('finish-results').innerHTML = '';

  // ── 預先模擬（結果已定，存入 S.raceOrder 供跳過使用）──
  const order = simulateRace(S.horses);
  // 特殊馬：強制名次
  if (S.doubleEvent && S.specialHorse2) {
    // 雙馬：specialHorse=第一、specialHorse2=第二
    const i1 = order.findIndex(h => h.pos === S.specialHorse.pos);
    if (i1 > 0) { const [s] = order.splice(i1, 1); order.unshift(s); }
    const i2 = order.findIndex(h => h.pos === S.specialHorse2.pos);
    if (i2 > 1) { const [s] = order.splice(i2, 1); order.splice(1, 0, s); }
    order.forEach((h, i) => h.finalPos = i + 1);
  } else if (S.specialHorse) {
    const idx = order.findIndex(h => h.pos === S.specialHorse.pos);
    if (idx > 0) { const [sp] = order.splice(idx, 1); order.unshift(sp); }
    order.forEach((h, i) => h.finalPos = i + 1);
  }
  S.raceOrder = order;
  // 劇本系統：依賠率條件選劇本，建立速度配置
  const PHASE_SWITCH = 55;
  const PHASE_TRANS  = 6;
  const phase1Speeds = {};
  const phase2Speeds = {};

  S.raceScript = selectRaceScript();
  const { p1: sp1, p2: sp2 } = buildSpeedProfiles(S.raceScript, order);
  Object.assign(phase1Speeds, sp1);
  Object.assign(phase2Speeds, sp2);

  // 特殊馬場次：覆蓋速度，確保視覺衝線順序與預定名次一致
  if (S.specialHorse) {
    const allP2 = Object.values(phase2Speeds);
    const maxP2 = Math.max(...allP2);
    phase2Speeds[order[0].pos] = maxP2 + 0.30;       // 第一名絕對最快
    phase1Speeds[order[0].pos] = Math.max(phase1Speeds[order[0].pos] || 0.85, 0.88);
    if (S.doubleEvent && S.specialHorse2) {
      // 第二名：在第一名之外找最大值，再加0.15
      const maxP2excl1 = Math.max(...Object.entries(phase2Speeds)
        .filter(([k]) => Number(k) !== order[0].pos).map(([,v]) => v));
      phase2Speeds[order[1].pos] = maxP2excl1 + 0.15;
      phase1Speeds[order[1].pos] = Math.max(phase1Speeds[order[1].pos] || 0.85, 0.84);
    }
  }

  // ── Canvas U-Track 初始化 ──
  racePositions = {};
  horsesByIdx   = [...S.horses].sort((a, b) => a.pos - b.pos);
  horsesByIdx.forEach(h => { racePositions[h.pos] = RACE_START_PCT; });
  canvasDone    = {};
  S.horses.forEach(h => { canvasDone[h.pos] = false; });
  raceCanvasEl  = document.getElementById('race-canvas');
  raceCtx       = raceCanvasEl.getContext('2d');
  raceCanvasEl.style.display = 'block';

  buildRankBar();

  // ── 3-2-1-GO! 倒數，完成後才啟動跑馬動畫 ──
  showCountdown(() => {
    document.getElementById('ro-phase-lbl').textContent = '🏇 比賽開始！';

    // 技能（落後馬在比賽中段觸發）
    const T3 = CFG.RACE_DUR + CFG.RACE_DUR * 0.4;
    scheduleSkills(order, T3);

    // ── rAF 跑馬主迴圈 ──
    if (raceAnimId) cancelAnimationFrame(raceAnimId);
    const OFFSCREEN_PCT = 115;
    let lastTs          = null;
    const done          = {};
    const crossedFinish = {};
    let crossedCount    = 0;
    let raceEndCalled   = false;
    S.horses.forEach(h => { done[h.pos] = false; crossedFinish[h.pos] = false; });

    function raceTick(ts) {
      if (!lastTs) lastTs = ts;
      const dt = ts - lastTs;
      lastTs = ts;

      let anyRunning = false;
      S.horses.forEach(h => {
        if (done[h.pos]) return;
        const pos = racePositions[h.pos];
        let spd;
        if (pos < PHASE_SWITCH) {
          spd = phase1Speeds[h.pos];
        } else if (pos < PHASE_SWITCH + PHASE_TRANS) {
          const t = (pos - PHASE_SWITCH) / PHASE_TRANS;
          spd = phase1Speeds[h.pos] * (1 - t) + phase2Speeds[h.pos] * t;
        } else {
          spd = phase2Speeds[h.pos];
        }
        const delta = spd * (RACE_FINISH_PCT - RACE_START_PCT) / CFG.RACE_DUR * dt;
        racePositions[h.pos] = Math.min(racePositions[h.pos] + delta, OFFSCREEN_PCT);

        if (!crossedFinish[h.pos] && racePositions[h.pos] >= RACE_FINISH_PCT) {
          crossedFinish[h.pos] = true;
          crossedCount++;
          const rank = order.findIndex(x => x.pos === h.pos) + 1;
          showFinishMarker(h, rank);
          if (crossedCount === S.horses.length && !raceEndCalled) {
            raceEndCalled = true;
            onRaceEnd(order);
          }
        }

        if (racePositions[h.pos] >= OFFSCREEN_PCT) {
          done[h.pos] = true;
          canvasDone[h.pos] = true;
        } else {
          anyRunning = true;
        }
      });

      drawRaceFrame(ts);
      updateRankBar(ts);
      if (anyRunning) raceAnimId = requestAnimationFrame(raceTick);
    }
    raceAnimId = requestAnimationFrame(raceTick);
  });
}

// COUNTDOWN
// ════════════════════════════════════
function showCountdown(onComplete) {
  const el  = document.getElementById('race-countdown');
  const seq = [3, 2, 1, 'GO!'];
  // 圓周 = 2π × r(52) ≈ 327
  const CIRCUM = 327;
  let i = 0;
  el.classList.add('cd-active');

  function tick() {
    const val  = seq[i];
    const isGo = val === 'GO!';

    if (isGo) {
      el.innerHTML = `<span class="cd-go">GO!</span>`;
    } else {
      // 每次重建 DOM 讓 SVG animation 從頭播放
      el.innerHTML = `
        <div class="cd-wrapper">
          <svg class="cd-ring-svg" viewBox="0 0 120 120">
            <circle class="cd-ring-bg" cx="60" cy="60" r="52"/>
            <circle class="cd-ring-fg" cx="60" cy="60" r="52"/>
          </svg>
          <span class="cd-num">${val}</span>
        </div>`;
    }

    i++;
    if (i < seq.length) {
      setTimeout(tick, isGo ? 650 : 950);
    } else {
      setTimeout(() => {
        el.classList.remove('cd-active');
        onComplete();
      }, 650);
    }
  }
  tick();
}

const _RANK_LABELS = ['1st','2nd','3rd','4th','5th','6th','7th'];
const _RANK_COLORS = ['#ffd700','#c0c0c0','#cd7f32'];

function initFinishPanel() {
  const panel = document.getElementById('finish-results');
  panel.innerHTML = '';
  _RANK_LABELS.forEach((lbl, i) => {
    const row = document.createElement('div');
    row.id = `frm-slot-${i+1}`;
    row.className = 'frm-row rank-other';
    row.style.opacity = '.2';
    row.innerHTML = `<span class="frm-rank" style="color:#3a4a60">${lbl}</span><span class="frm-name" style="color:#2a3850">—</span>`;
    panel.appendChild(row);
  });
}

function showFinishMarker(h, rank) {
  const panel     = document.getElementById('finish-results');
  const rankColor = rank <= 3 ? _RANK_COLORS[rank-1] : '#5a6a85';
  const rowClass  = rank <= 3 ? `rank-${rank}` : 'rank-other';
  const nameColor = rank <= 3 ? rankColor : '#6a7a95';

  const row = document.createElement('div');
  row.className    = `frm-row ${rowClass}`;
  row.dataset.rank = rank;
  row.innerHTML =
    `<span class="frm-rank" style="color:${rankColor}">${_RANK_LABELS[rank-1]}</span>` +
    `<span class="frm-num" style="background:${h.color}33;border-color:${h.color};color:${h.color}">${h.pos}</span>` +
    `<span class="frm-name" style="color:${nameColor}">${h.name}</span>`;

  // 按 rank 插入正確位置，不論過線先後
  const existing = panel.querySelectorAll('.frm-row');
  let inserted = false;
  for (const r of existing) {
    if (parseInt(r.dataset.rank) > rank) { panel.insertBefore(row, r); inserted = true; break; }
  }
  if (!inserted) panel.appendChild(row);
}

function onRaceEnd(order) {
  // 停止跑馬 rAF
  if (raceAnimId) { cancelAnimationFrame(raceAnimId); raceAnimId = null; }
  setTimeout(() => {
    // Payout
    const {totalWin, results} = calcPayout(S.bets, S.horses);
    S.result = {totalWin, results, order};
    if (totalWin>0) S.balance += totalWin;
    S.history.unshift({ raceNum:S.raceNum, order:[...order], winnerWinOdds:order[0].winOdds });
    if (S.history.length>50) S.history.pop();
    saveMachineData();
    updateBal();
    S.phase='RESULT';

    // ── Podium ──
    document.getElementById('ro-podium').innerHTML =
      order.slice(0,3).map((h,i)=>{
        let badge = '';
        const sp1 = S.specialHorse  && h.pos === S.specialHorse.pos;
        const sp2 = S.specialHorse2 && h.pos === S.specialHorse2.pos;
        if (sp1 || sp2) {
          const t  = sp1 ? S.specialType : S.specialType2;
          const ic = t === 'BLACK' ? '♚' : '★';
          const cl = t === 'BLACK' ? '#ccccff' : '#ffd700';
          badge = `<span style="color:${cl};font-size:.85em;">${ic}</span>`;
        }
        return `<div class="ro-podium-item">
          <span>${['🥇','🥈','🥉'][i]}</span>
          <span class="ro-podium-dot" style="background:${h.color}"></span>
          <span style="color:${h.color}">${h.name}</span>
          ${badge}
        </div>`;
      }).join('');

    // ── Bet breakdown ──
    const TYPE_LABEL = {WIN:'獨贏', PLACE:'位置', QUINELLA:'連贏'};
    let totalBet = 0;
    const merged = {};
    results.forEach(({bet, win}) => {
      const key = bet.type + '|' + [...bet.horses].sort().join('-');
      if (!merged[key]) merged[key] = { type:bet.type, horses:bet.horses, odds:bet.odds, amount:0, win:0 };
      merged[key].amount += bet.amount;
      merged[key].win    += win;
    });

    document.getElementById('rbd-list').innerHTML = Object.values(merged).map(row => {
      totalBet += row.amount;
      const isWon = row.win > 0;
      let targetHTML = '';
      if (row.type === 'QUINELLA') {
        const parts = row.horses.map(p => {
          const h = S.horses.find(x=>x.pos===p);
          return h ? `<span class="rbd-dot" style="background:${h.color}"></span><span>${h.name}</span>` : p;
        });
        targetHTML = parts.join('<span style="color:var(--text-dim);margin:0 .2em">＋</span>');
      } else {
        const h = S.horses.find(x=>x.pos===row.horses[0]);
        targetHTML = h ? `<span class="rbd-dot" style="background:${h.color}"></span><span>${h.name}</span>` : row.horses[0];
      }
      return `<div class="rbd-row ${isWon?'won-row':'lost-row'}">
        <span><span class="rbd-type-badge rbd-type-${row.type}">${TYPE_LABEL[row.type]}</span></span>
        <span class="rbd-target">${targetHTML}</span>
        <span>$${row.amount.toLocaleString()}</span>
        <span>${row.odds}x</span>
        <span class="${isWon?'rbd-result-won':'rbd-result-lost'}">${isWon?'✓ 中注':'✗ 未中'}</span>
        <span class="${isWon?'rbd-payout-won':'rbd-payout-lost'}">${isWon?'+$'+Math.round(row.win).toLocaleString():'—'}</span>
      </div>`;
    }).join('') || `<div style="padding:1.5% 2%;color:var(--text-dim);font-size:clamp(6px,.9vw,11px);text-align:center;">本場未下注</div>`;

    // ── Summary ──
    const net = Math.round(totalWin - totalBet);
    document.getElementById('sum-bet').textContent = '$'+totalBet.toLocaleString();
    document.getElementById('sum-pay').textContent = '$'+Math.round(totalWin).toLocaleString();
    const netEl = document.getElementById('sum-net');
    netEl.textContent = (net>=0?'+':'')+net.toLocaleString();
    netEl.style.color = net>0?'var(--color-win)':net<0?'var(--color-lose)':'var(--text-sub)';

    document.getElementById('ro-phase-lbl').textContent='🏁 比賽結束';
    document.getElementById('result-backdrop').classList.add('active');
  }, 600);
}

let _settleMode = null; // 'settle' | 'warn'

// Step 1：玩家按「下一場」→ 關閉比賽覆蓋層，進入結算流程
function nextRace() {
  if (raceAnimId) { cancelAnimationFrame(raceAnimId); raceAnimId = null; }
  if (camTimer)   { clearTimeout(camTimer); camTimer = null; }
  if (raceCanvasEl) raceCanvasEl.style.display = 'none';
  document.getElementById('race-overlay').classList.remove('active');

  const savedResult = S.result;
  const hasWin      = savedResult && savedResult.totalWin > 0;
  const hasSpecial  = !!S.specialHorse;

  // Step 1：刷新右側前三名 & 近期熱門，停留 1.5s
  openInfoPanel();
  animateLastRace();
  flashInsights();

  const PANEL_OPEN  = 2500; // 右側資訊可見時間
  const PANEL_FADE  = 350;  // 收合過渡
  const SPECIAL_DUR = 1500; // 特殊馬格子亮框動畫
  const FLASH_DUR   = 2000; // flash-win 4次 × 0.5s

  setTimeout(() => closeInfoPanel(), PANEL_OPEN);

  const t0 = PANEL_OPEN + PANEL_FADE; // 面板完全收合後

  if (hasSpecial) {
    // 黃金馬 / 黑金馬流程
    setTimeout(() => flashSpecialCells(), t0);
    if (hasWin) {
      setTimeout(() => flashWinCells(savedResult),        t0 + SPECIAL_DUR);
      setTimeout(() => showSettleDialog(savedResult),     t0 + SPECIAL_DUR + FLASH_DUR + 150);
    } else {
      setTimeout(() => showSettleDialog(savedResult),     t0 + SPECIAL_DUR + 150);
    }
  } else {
    // 一般流程
    if (hasWin) {
      setTimeout(() => flashWinCells(savedResult),        t0);
      setTimeout(() => showSettleDialog(savedResult),     t0 + FLASH_DUR + 150);
    } else {
      setTimeout(() => showSettleDialog(savedResult),     t0 + 150);
    }
  }
}

// 閃爍中獎格子（需要格子有 data-type / data-pos / data-pos-a / data-pos-b）
function flashWinCells(result) {
  if (!result) return;
  const seen = new Set();
  result.results.forEach(({bet, win}) => {
    if (win <= 0) return;
    let cell;
    if (bet.type === 'QUINELLA') {
      const [a, b] = bet.horses;
      const key = [a,b].sort().join('-');
      if (seen.has(key)) return; seen.add(key);
      cell = document.querySelector(`[data-type="QUINELLA"][data-pos-a="${a}"][data-pos-b="${b}"]`)
          || document.querySelector(`[data-type="QUINELLA"][data-pos-a="${b}"][data-pos-b="${a}"]`);
    } else {
      const key = bet.type + '-' + bet.horses[0];
      if (seen.has(key)) return; seen.add(key);
      cell = document.querySelector(`[data-type="${bet.type}"][data-pos="${bet.horses[0]}"]`);
    }
    if (cell) { cell.classList.remove('flash-win'); void cell.offsetWidth; cell.classList.add('flash-win'); }
  });
}

// 特殊馬格子亮框動畫（黃金/黑金/雙馬，不論玩家是否下注）
function flashSpecialCells() {
  if (!S.specialHorse) return;
  const targets = [];

  const addHorseCells = (horse) => {
    if (!horse) return;
    const cls = horse.specialType === 'GOLDEN' ? 'flash-special-golden' : 'flash-special-black';
    const winCell   = document.querySelector(`[data-type="WIN"][data-pos="${horse.pos}"]`);
    const placeCell = document.querySelector(`[data-type="PLACE"][data-pos="${horse.pos}"]`);
    if (winCell)   targets.push({ cell: winCell,   cls });
    if (placeCell) targets.push({ cell: placeCell, cls });
  };

  addHorseCells(S.specialHorse);
  if (S.doubleEvent) {
    addHorseCells(S.specialHorse2);
    const a = S.specialHorse.pos, b = S.specialHorse2 ? S.specialHorse2.pos : -1;
    const qCell = document.querySelector(`[data-type="QUINELLA"][data-pos-a="${a}"][data-pos-b="${b}"]`)
               || document.querySelector(`[data-type="QUINELLA"][data-pos-a="${b}"][data-pos-b="${a}"]`);
    if (qCell) targets.push({ cell: qCell, cls: 'flash-special-double' });
  }

  targets.forEach(({ cell, cls }) => {
    cell.classList.remove('flash-special-golden','flash-special-black','flash-special-double');
    void cell.offsetWidth;
    cell.classList.add(cls);
    setTimeout(() => cell.classList.remove(cls), 1550);
  });
}

// 噴硬幣動畫
function spawnCoins(boxEl) {
  const icons = ['💰','🪙','💵','✨','⭐'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'coin-p';
      el.textContent = icons[Math.floor(Math.random() * icons.length)];
      el.style.setProperty('--tx', ((Math.random() - 0.5) * 240) + 'px');
      el.style.setProperty('--ty', ((Math.random() - 1.2) * 200) + 'px');
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.top  = (35 + Math.random() * 30) + '%';
      el.style.animationDelay = (Math.random() * 0.35) + 's';
      boxEl.appendChild(el);
      setTimeout(() => el.remove(), 1300);
    }, i * 45);
  }
}

// 顯示結算 Dialog（三種）
function showSettleDialog(result) {
  const overlay = document.getElementById('settle-overlay');
  const box     = document.getElementById('settle-box');
  const iconEl  = document.getElementById('sd-icon');
  const titleEl = document.getElementById('sd-title');
  const amtEl   = document.getElementById('sd-amount');
  const subEl   = document.getElementById('sd-sub');
  const btnEl   = document.getElementById('sd-btn');

  // 重置
  box.className = 'settle-box';
  titleEl.className = 'sd-title';
  amtEl.className   = 'sd-amount';
  btnEl.className   = 'sd-btn';
  amtEl.textContent = '';
  subEl.textContent = '';

  const totalWin    = result ? result.totalWin : 0;
  const hasFirstWin = result && result.results.some(r => r.win > 0 && r.bet.type === 'WIN');

  if (totalWin <= 0) {
    iconEl.textContent  = '😔';
    titleEl.textContent = '本局未中彩';
    subEl.textContent   = '再接再厲！';
  } else if (hasFirstWin) {
    box.classList.add('gold-box');
    iconEl.textContent  = '🏆';
    titleEl.classList.add('gold');
    titleEl.textContent = '獨贏！彩金出擊！';
    amtEl.classList.add('gold');
    amtEl.textContent   = '+$' + Math.round(totalWin).toLocaleString();
    setTimeout(() => spawnCoins(box), 120);
  } else {
    box.classList.add('win-box');
    iconEl.textContent  = '🎉';
    titleEl.textContent = '中彩！';
    amtEl.textContent   = '+$' + Math.round(totalWin).toLocaleString();
    setTimeout(() => spawnCoins(box), 120);
  }

  _settleMode = 'settle';
  overlay.classList.add('active');
}

// 資產不足 Dialog
function showInsufficientDialog() {
  const overlay = document.getElementById('settle-overlay');
  const box     = document.getElementById('settle-box');
  const iconEl  = document.getElementById('sd-icon');
  const titleEl = document.getElementById('sd-title');
  const amtEl   = document.getElementById('sd-amount');
  const subEl   = document.getElementById('sd-sub');
  const btnEl   = document.getElementById('sd-btn');

  box.className     = 'settle-box warn-box';
  titleEl.className = 'sd-title warn';
  btnEl.className   = 'sd-btn warn';
  iconEl.textContent  = '⚠️';
  titleEl.textContent = '籌碼不足';
  amtEl.textContent   = '';
  subEl.textContent   = '無法重複上局投注，已自動取消';

  _settleMode = 'warn';
  overlay.classList.add('active');
}

// 玩家點擊 Dialog 按鈕
function onSettleConfirm() {
  document.getElementById('settle-overlay').classList.remove('active');
  const mode = _settleMode;
  _settleMode = null;
  if (mode === 'settle') doNextRace();
}

// 實際初始化下一局（含自動重複下注檢查）
function doNextRace() {
  S.raceNum++;
  saveMachineData();
  initRace(); // 新馬、清注單、渲染
}

function openInfoPanel() {
  const panel   = document.getElementById('info-panel');
  const overlay = document.getElementById('info-overlay');
  const btn     = document.getElementById('btn-info-toggle');
  panel.classList.add('open');
  overlay.classList.add('active');
  if (btn) btn.classList.add('open');
}

function closeInfoPanel() {
  const panel   = document.getElementById('info-panel');
  const overlay = document.getElementById('info-overlay');
  const btn     = document.getElementById('btn-info-toggle');
  panel.classList.remove('open');
  overlay.classList.remove('active');
  if (btn) btn.classList.remove('open');
}

function toggleInfoPanel() {
  const panel = document.getElementById('info-panel');
  if (panel.classList.contains('open')) closeInfoPanel();
  else openInfoPanel();
}

}
function closeHistory() {
  document.getElementById('history-overlay').classList.remove('active');
}
function switchHistTab(tab) {
  const histBody       = document.getElementById('hist-body');
  const statsPanel     = document.getElementById('hist-stats-panel');
  const tabs           = document.querySelectorAll('.hist-tab');
  if (tab === 'records') {
    histBody.style.display   = '';
    statsPanel.classList.remove('active');
    tabs[0].classList.add('active');
    tabs[1].classList.remove('active');
    document.getElementById('hist-subtitle').textContent = '最新場次在最上方';
    renderHistory();
  } else {
    histBody.style.display   = 'none';
    statsPanel.classList.add('active');
    tabs[0].classList.remove('active');
    tabs[1].classList.add('active');
    document.getElementById('hist-subtitle').textContent = '基於近' + S.history.length + '場數據';
    renderHorseStats();
  }
}
function renderHorseStats() {
  const tbody = document.getElementById('stats-tbody');
  const total = S.history.length;

  if (total === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="color:var(--text-dim);padding:2em;text-align:center;">尚無紀錄，完成第一場後即開始記錄</td></tr>`;
    document.getElementById('hist-stats').innerHTML = '';
    return;
  }

  // Count stats per horse name
  const stats = {};
  POOL.forEach(h => {
    stats[h.name] = { name:h.name, color:h.color, appear:0, first:0, top2:0, top3:0 };
  });

  S.history.forEach(entry => {
    entry.order.forEach((h, i) => {
      if (!stats[h.name]) return;
      stats[h.name].appear++;
      if (i === 0) stats[h.name].first++;
      if (i <= 1)  stats[h.name].top2++;
      if (i <= 2)  stats[h.name].top3++;
    });
  });

  // Sort by first-place count desc
  const rows = Object.values(stats).sort((a,b) => b.first - a.first || b.top3 - a.top3);

  tbody.innerHTML = rows.map(s => {
    const app = s.appear;
    if (app === 0) return `
      <tr>
        <td><span class="stats-horse-name">
          <span class="hist-dot" style="background:${s.color}"></span>${s.name}
        </span></td>
        <td style="color:var(--text-dim)">—</td>
        <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>
      </tr>`;
    const r1  = (s.first / app * 100).toFixed(1);
    const r2  = (s.top2  / app * 100).toFixed(1);
    const r3  = (s.top3  / app * 100).toFixed(1);
    const bar = (pct, clr) =>
      `<span class="stats-rate-bar" style="width:${Math.max(2,parseFloat(pct)*.4)}px;background:${clr};"></span>`;
    return `
      <tr>
        <td><span class="stats-horse-name">
          <span class="hist-dot" style="background:${s.color}"></span>${s.name}
        </span></td>
        <td style="color:var(--text-sub)">${app}</td>
        <td class="rank-1">${s.first}${bar(r1,'var(--gold-bright)')}</td>
        <td class="rank-1">${r1}%</td>
        <td class="rank-2">${s.top2}${bar(r2,'#b0b8c8')}</td>
        <td class="rank-2">${r2}%</td>
        <td class="rank-3">${s.top3}${bar(r3,'#cd7f32')}</td>
        <td class="rank-3">${r3}%</td>
      </tr>`;
  }).join('');

  // Update summary bar
  const goldenCount = S.history.filter(e => e.goldenPos).length;
  document.getElementById('hist-stats').innerHTML = `
    <div class="stat-item">共 <span class="stat-val">${total}</span> 場數據</div>
    <div style="width:1px;height:60%;background:var(--border)"></div>
    <div class="stat-item">彩金馬場次 <span class="stat-val" style="color:var(--color-golden)">${goldenCount}</span>（${Math.round(goldenCount/total*100)}%）</div>`;
}

function renderHistory() {
  const tbody = document.getElementById('hist-tbody');
  tbody.innerHTML = '';

  if (S.history.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" style="color:var(--text-dim);padding:2em;text-align:center;">尚無紀錄，完成第一場後即開始記錄</td></tr>`;
    document.getElementById('hist-stats').innerHTML = '';
    document.getElementById('hist-subtitle').textContent = '尚無紀錄';
    return;
  }

  S.history.forEach(entry => {
    const tr = document.createElement('tr');

    // Race num cell
    const raceCell = `<td class="hist-race-num">#${entry.raceNum}</td>`;

    // Horse cells for each position
    const horseCells = entry.order.map((h, i) => {
      const rankCls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
      return `<td>
        <span class="hist-horse-badge">
          <span class="hist-dot" style="background:${h.color}"></span>
          <span class="${rankCls}" style="color:var(--text-sub)">${h.name}</span>
        </span>
      </td>`;
    }).join('');

    const noteCell = `<td style="color:var(--text-dim)">—</td>`;
    tr.innerHTML = raceCell + horseCells + noteCell;
    tbody.appendChild(tr);
  });

  // Stats
  const total = S.history.length;
  const firstCount = {};
  S.history.forEach(e => {
    const name = e.order[0]?.name;
    if (name) firstCount[name] = (firstCount[name]||0)+1;
  });
  const topHorse = Object.entries(firstCount).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('hist-subtitle').textContent = `最新場次在最上方 · 共 ${total} 場`;
  document.getElementById('hist-stats').innerHTML = `
    <div class="stat-item">已記錄 <span class="stat-val">${total}</span> / 50 場</div>
    <div style="width:1px;height:60%;background:var(--border)"></div>
    <div class="stat-item">最常奪冠 <span class="stat-val">${topHorse ? topHorse[0]+' ('+topHorse[1]+'次)' : '—'}</span></div>`;
}

// DEBUG
// ════════════════════════════════════
function renderDbg() {
  document.getElementById('dbg').innerHTML=`
    <div style="color:var(--accent-gold);font-weight:700;margin-bottom:4px;">🛠 DEBUG</div>
    <div>Phase: <b>${S.phase}</b> | Race: #${S.raceNum}</div>
    <div>Balance: $${S.balance} | Bets: ${S.bets.length}</div>
    <div>特殊馬: ${S.doubleEvent ? '雙馬 '+S.specialHorse?.pos+'★+'+S.specialHorse2?.pos+'♚ Q='+S.doubleQOdds+'x' : S.specialHorse ? (S.specialType==='BLACK'?'黑金馬':'黃金馬')+' 馬 #'+S.specialHorse.pos+' ('+S.specialHorse.specialOdds+'x)' : '無'}</div>
    <div>劇本: ${S.raceScript ? S.raceScript+' '+SCRIPT_NAMES[S.raceScript] : '—'}</div>
    <label style="cursor:pointer;display:block;margin-top:4px;">
      <input type="checkbox" ${S.forceGoldenHorse?'checked':''} onchange="S.forceGoldenHorse=this.checked;renderDbg();">
      強制黃金馬
    </label>
    <label style="cursor:pointer;display:block;margin-top:2px;">
      <input type="checkbox" ${S.forceBlackHorse?'checked':''} onchange="S.forceBlackHorse=this.checked;renderDbg();">
      強制黑金馬
    </label>
    <label style="cursor:pointer;display:block;margin-top:2px;">
      <input type="checkbox" ${S.forceDoubleHorse?'checked':''} onchange="S.forceDoubleHorse=this.checked;renderDbg();">
      強制雙馬事件
    </label>
    <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;">
      <button onclick="nextRace()" style="background:#333;border:1px solid #555;color:#ccc;padding:2px 6px;border-radius:3px;cursor:pointer;font-size:10px;">跳下一場</button>
      <button onclick="S.balance=10000;updateBal();renderDbg();" style="background:#333;border:1px solid #555;color:#ccc;padding:2px 6px;border-radius:3px;cursor:pointer;font-size:10px;">補充籌碼</button>
    </div>
    <div style="margin-top:4px;color:#555;font-size:9px;">雙擊畫面顯示/隱藏</div>`;
}

document.addEventListener('dblclick',()=>{
  const p=document.getElementById('dbg');
  if (p.style.display==='none'){p.style.display='block';renderDbg();}
  else p.style.display='none';
});

function initRace() {
  S.horses      = pickHorses();
  S.bets        = [];
  S.result      = null;
  S.phase       = 'BETTING';
  S.raceOrder       = null;
  S.specialHorse  = null; S.specialType  = null;
  S.specialHorse2 = null; S.specialType2 = null;
  S.doubleEvent   = false; S.doubleQOdds  = null;
  document.getElementById('race-lbl').textContent = 'RACE ' + S.raceNum;
  updateBal();
  renderAll();
  document.getElementById('btn-start').disabled = false;
}

initMachine();
initSessionHorses(); // 本 session 固定 7 匹馬，F5 才重抽
initRace();

// ── Horse sprite animation — JS-driven, no CSS animation bugs ──
(function(){
  let frame = 0;
  const FRAMES   = 6;
  const FRAME_W  = 52; // matches .ro-horse-sprite width in px
  setInterval(() => {
    frame = (frame + 1) % FRAMES;
    const pos = (-frame * FRAME_W) + 'px 0';
    document.querySelectorAll('.ro-horse-sprite').forEach(el => {
      el.style.backgroundPosition = pos;
    });
  }, 83); // ~12 fps
})();
</script>
