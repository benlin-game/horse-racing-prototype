<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>急速馬王</title>
  <style>
    /* === VARIABLES === */
    :root {
      --bg-primary:   #0a0c14;
      --bg-surface:   #0f1520;
      --bg-card:      #141d2e;
      --bg-cell:      #111827;
      --bg-cell-alt:  #0d1420;
      --accent-gold:  #c9a227;
      --gold-bright:  #ffd700;
      --text-main:    #dde3f0;
      --text-sub:     #7a8ba0;
      --text-dim:     #3a4a60;
      --color-win:    #2ecc71;
      --color-lose:   #e74c3c;
      --color-hot:    #e74c3c;
      --color-golden: #ffd700;
      --border:       #1a2740;
      --border-sel:   #c9a227;
      --sel-bg:       rgba(201,162,39,0.22);
      --golden-bg:    rgba(255,215,0,0.10);
      --fn-mono:      'Courier New', monospace;
      --fn-main:      system-ui, -apple-system, sans-serif;
    }

    /* === RESET === */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    /* === APP SHELL === */
    #app {
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:#000;
    }
    #gc {                          /* game container — 16:9 letterbox */
      position:relative;
      background:var(--bg-primary);
      font-family:var(--fn-main);
      color:var(--text-main);
      overflow:hidden;
      width:100vw;
      height:calc(100vw * 9/16);
      max-height:100vh;
      max-width:calc(100vh * 16/9);
      display:grid;
      grid-template-rows: 8% 1fr 11%;
    }

    /* ── HEADER ── */
    #header {
      display:flex; align-items:center; gap:1%;
      padding:0 1.2%;
      background:var(--bg-surface);
      border-bottom:1px solid var(--border);
      z-index:10;
    }
    .hd-race { font-size:clamp(8px,1.5vw,18px); font-weight:700; color:var(--accent-gold); font-family:var(--fn-mono); letter-spacing:.06em; }
    .hd-info { font-size:clamp(6px,1.0vw,12px); color:var(--text-sub); font-family:var(--fn-mono); }
    .hd-div  { width:1px; height:60%; background:var(--border); margin:0 .4%; }
    .hd-spc  { flex:1; }
    #cd-wrap { display:flex; align-items:center; gap:.4em; }
    #bal-wrap { display:flex; align-items:center; gap:.4em; }
    #bal-label { font-size:clamp(6px,0.9vw,11px); color:var(--text-sub); }
    #bal-val { font-family:var(--fn-mono); font-size:clamp(9px,1.4vw,17px); font-weight:700; color:var(--color-win); }

    /* ── MAIN AREA ── */
    #main-area { display:flex; overflow:hidden; position:relative; }

    /* ══ 投注區：欄式佈局（每馬一欄，每種玩法一列）══ */
    #tote-left {
      flex:1; display:flex; flex-direction:column; overflow:hidden;
      background:var(--bg-primary);
    }

    /* 每列通用 */
    .tl-row {
      display:flex; flex-shrink:0;
      border-bottom:1px solid var(--border);
    }

    /* 各列高度 */
    #tl-imgs-row          { flex:0 0 clamp(72px,22%,120px); }
    #tl-names-row         { flex:0 0 clamp(18px,5.5%,28px); border-bottom:2px solid var(--border); }
    #tl-win-row           { flex:1; min-height:clamp(26px,6%,42px); }
    #tl-place-row         { flex:1; min-height:clamp(26px,6%,42px); border-bottom:2px solid var(--border); }
    #tl-quinella-section  { flex:3; display:flex; overflow:hidden; border-bottom:none; }

    /* 左側行標籤 */
    .tl-row-lbl {
      flex:0 0 clamp(34px,6.5%,54px);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; text-align:center;
      font-size:clamp(6px,.8vw,10px); font-weight:700; line-height:1.3;
      border-right:2px solid var(--border); flex-shrink:0;
      background:var(--bg-surface);
    }
    .tl-row-lbl small { font-size:.75em; opacity:.6; font-weight:400; letter-spacing:0; }
    .tl-row-lbl.win-lbl   { color:var(--accent-gold); }
    .tl-row-lbl.place-lbl { color:#5dade2; }
    .tl-row-lbl.q-lbl     { color:#bb8fce; }

    /* 馬頭像格 */
    .tl-img-cell {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:5%;
      border-right:1px solid var(--border); padding:3% 1%;
      min-width:0; background:var(--bg-card); position:relative;
    }
    .tl-img-cell:last-child { border-right:none; }

    .tl-num-badge {
      width:clamp(14px,2vw,22px); height:clamp(14px,2vw,22px);
      border-radius:50%; border:2px solid currentColor;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(6px,.88vw,11px); font-weight:700; font-family:var(--fn-mono);
      flex-shrink:0;
    }
    .tl-portrait {
      width:clamp(40px,6vw,72px); height:clamp(40px,6vw,72px);
      object-fit:contain; border-radius:4px; border:2px solid;
    }
    .tl-golden-crown {
      display:none;
    }

    /* 馬名格 */
    .tl-name-cell {
      flex:1; display:flex; align-items:center; justify-content:center;
      border-right:1px solid var(--border);
      font-size:clamp(6px,.88vw,11px); font-weight:600;
      padding:0 2%; min-width:0; overflow:hidden;
      white-space:nowrap; text-overflow:ellipsis;
    }
    .tl-name-cell:last-child { border-right:none; }

    /* 獨贏 / 位置 賠率格 — 編號左上、賠率右下 */
    .tl-odds-cell {
      flex:1; position:relative;
      border-right:1px solid var(--border);
      cursor:pointer; transition:background .12s; min-width:0;
    }
    .tl-odds-cell:last-child  { border-right:none; }
    .tl-odds-cell:hover       { background:rgba(255,255,255,.05); }
    .tl-odds-cell.sel         { background:var(--sel-bg); outline:1.5px solid var(--border-sel); }
    .tl-odds-cell.golden      { background:var(--golden-bg); }
    .tl-odds-cell.golden.sel  { background:rgba(255,215,0,.22); outline:1.5px solid var(--gold-bright); }
    /* 編號徽章：左上 */
    .tl-odds-cell .tl-num-badge {
      position:absolute; top:3px; left:3px;
    }
    /* 賠率：右下 */
    .tl-odds-cell .hr-odds {
      position:absolute; bottom:3px; right:3px;
      font-size:clamp(7px,1.05vw,13px);
    }

    /* 賠率數字（共用顏色） */
    .hr-odds {
      font-family:var(--fn-mono); font-weight:700; font-size:clamp(8px,1.2vw,15px);
    }
    .hr-odds        { color:var(--text-main); }
    .hr-odds.golden { color:var(--color-golden); }
    .hr-odds-unit   { font-size:.7em; opacity:.55; }

    /* 連贏區 */
    #tl-q-cells {
      flex:1; display:flex; flex-direction:column; overflow:hidden;
    }
    .tl-q-row {
      flex:1; display:flex;
      border-bottom:1px solid var(--border);
    }
    .tl-q-row:last-child { border-bottom:none; }
    /* 連贏格 — 號碼組左上、賠率右下 */
    .tl-q-cell {
      flex:1; position:relative;
      border-right:1px solid var(--border);
      cursor:pointer; transition:background .1s; min-width:0;
    }
    .tl-q-cell:last-child    { border-right:none; }
    .tl-q-cell:hover         { background:rgba(255,255,255,.05); }
    .tl-q-cell.sel           { background:var(--sel-bg); outline:1.5px solid var(--border-sel); }
    .tl-q-cell.golden        { background:var(--golden-bg); }
    .tl-q-cell.golden.sel    { background:rgba(255,215,0,.25); outline:1.5px solid var(--gold-bright); }
    /* 兩個彩色圈圈：左上 */
    .tl-q-pair {
      position:absolute; top:3px; left:3px;
      display:flex; gap:2px; align-items:center;
    }
    .tl-q-num {
      width:clamp(11px,1.5vw,18px); height:clamp(11px,1.5vw,18px);
      border-radius:50%; border:1.5px solid currentColor;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(5px,.62vw,8px); font-weight:700; font-family:var(--fn-mono);
      flex-shrink:0;
    }
    /* 賠率：右下 */
    .tl-q-odds {
      position:absolute; bottom:3px; right:3px;
      font-size:clamp(6px,.84vw,11px); font-weight:700;
      font-family:var(--fn-mono); color:var(--text-main);
    }
    .tl-q-cell.golden .tl-q-odds { color:var(--color-golden); }
    .tl-q-cell.sel    .tl-q-odds { color:var(--gold-bright); }

    /* 投注金額徽章：右上角 */
    .bet-badge {
      position:absolute; top:3px; right:3px;
      background:var(--accent-gold); color:#000;
      font-family:var(--fn-mono); font-weight:700;
      font-size:clamp(4px,.58vw,7px); padding:1px 3px;
      border-radius:2px; pointer-events:none; line-height:1.4; white-space:nowrap;
    }

    /* ── 中獎格閃爍 ── */
    @keyframes flash-win {
      0%,100% { background:inherit; }
      35%,65% { background:rgba(46,204,113,.22); outline:2px solid #2ecc71; }
    }
    .flash-win { animation:flash-win .5s ease-in-out 4; }

    /* ── 特殊馬格子亮框動畫 ── */
    @keyframes flash-special-golden {
      0%,100% { background:inherit; outline:none; box-shadow:none; }
      20%,60% { background:rgba(255,215,0,.20); outline:2px solid #ffd700; box-shadow:0 0 14px rgba(255,215,0,.55); }
      40%,80% { background:rgba(255,215,0,.10); outline:1px solid rgba(255,215,0,.5); box-shadow:none; }
    }
    @keyframes flash-special-black {
      0%,100% { background:inherit; outline:none; box-shadow:none; }
      20%,60% { background:rgba(170,170,255,.18); outline:2px solid #aaaaee; box-shadow:0 0 14px rgba(130,130,255,.55); }
      40%,80% { background:rgba(130,130,255,.08); outline:1px solid rgba(130,130,255,.45); box-shadow:none; }
    }
    @keyframes flash-special-double {
      0%,100% { background:inherit; outline:none; box-shadow:none; }
      20%,60% { background:rgba(200,160,255,.18); outline:2px solid #cc88ff; box-shadow:0 0 14px rgba(200,160,255,.55); }
      40%,80% { background:rgba(200,160,255,.08); outline:1px solid rgba(200,160,255,.45); box-shadow:none; }
    }
    .flash-special-golden { animation:flash-special-golden 1.5s ease-in-out forwards; }
    .flash-special-black  { animation:flash-special-black  1.5s ease-in-out forwards; }
    .flash-special-double { animation:flash-special-double 1.5s ease-in-out forwards; }

    /* ── 特殊馬揭曉 Overlay ── */
    #special-reveal-overlay {
      position:fixed; inset:0; z-index:210;
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none;
      transition:opacity .3s;
    }
    #special-reveal-overlay.active { opacity:1; pointer-events:all; }
    #special-reveal-overlay .sr-backdrop {
      position:absolute; inset:0;
    }
    .sr-backdrop-golden { background:radial-gradient(ellipse at center, rgba(80,60,0,.92) 0%, rgba(0,0,0,.88) 100%); }
    .sr-backdrop-black  { background:radial-gradient(ellipse at center, rgba(10,10,30,.95) 0%, rgba(0,0,0,.92) 100%); }
    .special-reveal-box {
      position:relative; z-index:1;
      border-radius:16px; padding:5% 6%;
      text-align:center; min-width:clamp(200px,38vw,420px);
      box-shadow:0 0 60px 20px var(--sr-glow);
      animation:sr-appear .4s cubic-bezier(.17,.67,.35,1.3) forwards;
    }
    @keyframes sr-appear {
      from { opacity:0; transform:scale(.7); }
      to   { opacity:1; transform:scale(1); }
    }
    .golden-horse-box {
      --sr-glow: rgba(255,215,0,.5);
      background:linear-gradient(160deg,#2a1f00 0%,#1a1300 100%);
      border:2px solid #ffd700;
    }
    .black-horse-box {
      --sr-glow: rgba(160,160,255,.45);
      background:linear-gradient(160deg,#0e0e22 0%,#05050f 100%);
      border:2px solid #8888cc;
    }
    .double-horse-box {
      --sr-glow: rgba(220,180,255,.55);
      background:linear-gradient(160deg,#1a1200 30%,#0c0c20 100%);
      border:2px solid;
      border-color:#ffd700;
      box-shadow:0 0 0 1px #8888cc inset;
    }
    .sr-double-row {
      display:flex; gap:8%; justify-content:center; margin-bottom:3%;
    }
    .sr-double-card {
      flex:1; max-width:42%;
      border-radius:8px; padding:4% 3%;
      text-align:center;
    }
    .sr-double-card.golden { background:rgba(255,215,0,.1); border:1px solid #ffd700; }
    .sr-double-card.black  { background:rgba(130,130,255,.1); border:1px solid #8888cc; }
    .sr-double-card .dc-label { font-size:clamp(7px,.9vw,11px); font-weight:700; margin-bottom:4%; }
    .sr-double-card.golden .dc-label { color:#ffd700; }
    .sr-double-card.black  .dc-label { color:#aaaaee; }
    .sr-double-card .dc-horse { font-size:clamp(9px,1.2vw,15px); font-weight:800; color:#fff; margin-bottom:3%; }
    .sr-double-card .dc-odds  { font-family:'Courier New',monospace; font-weight:900;
                                  font-size:clamp(16px,2.5vw,32px); }
    .sr-double-card.golden .dc-odds { color:#ffd700; text-shadow:0 0 10px #ffd700; }
    .sr-double-card.black  .dc-odds { color:#ccccff; text-shadow:0 0 10px #8888ff; }
    .sr-q-highlight {
      font-size:clamp(9px,1.3vw,16px); font-weight:700; color:#fff;
      margin-bottom:2%; letter-spacing:.04em;
    }
    .sr-q-odds {
      font-family:'Courier New',monospace; font-weight:900;
      font-size:clamp(28px,4.5vw,58px); color:#e0c0ff;
      text-shadow:0 0 20px #cc88ff; line-height:1; margin-bottom:3%;
    }
    @keyframes sr-pulse-double {
      0%,100% { box-shadow:0 0 60px 20px rgba(200,160,255,.45); }
      50%      { box-shadow:0 0 90px 35px rgba(200,160,255,.75); }
    }
    .double-horse-box { animation:sr-appear .4s cubic-bezier(.17,.67,.35,1.3) forwards, sr-pulse-double 1.8s 0.4s ease-in-out infinite; }
    .sr-icon    { font-size:clamp(36px,6vw,64px); line-height:1.1; margin-bottom:4%; }
    .sr-label   { font-size:clamp(10px,1.6vw,18px); font-weight:700; letter-spacing:.08em; margin-bottom:3%; }
    .golden-horse-box .sr-label { color:#ffd700; }
    .black-horse-box  .sr-label { color:#aaaaee; }
    .sr-horse   { font-size:clamp(13px,2vw,24px); font-weight:800; color:#fff; margin-bottom:2%; }
    .sr-odds    { font-family:'Courier New',monospace; font-weight:900; line-height:1;
                  font-size:clamp(32px,5.5vw,70px); margin-bottom:3%; }
    .golden-horse-box .sr-odds { color:#ffd700; text-shadow:0 0 18px #ffd700; }
    .black-horse-box  .sr-odds { color:#ccccff; text-shadow:0 0 18px #8888ff; }
    .sr-sub     { font-size:clamp(7px,1vw,12px); opacity:.65; color:#ccc; margin-bottom:4%; }
    .sr-hint    { font-size:clamp(6px,.85vw,10px); opacity:.4; color:#999; }
    @keyframes sr-pulse-gold {
      0%,100% { box-shadow:0 0 60px 20px rgba(255,215,0,.5); }
      50%      { box-shadow:0 0 80px 30px rgba(255,215,0,.8); }
    }
    @keyframes sr-pulse-black {
      0%,100% { box-shadow:0 0 60px 20px rgba(130,130,255,.4); }
      50%      { box-shadow:0 0 90px 35px rgba(130,130,255,.7); }
    }
    .golden-horse-box { animation:sr-appear .4s cubic-bezier(.17,.67,.35,1.3) forwards, sr-pulse-gold 1.8s 0.4s ease-in-out infinite; }
    .black-horse-box  { animation:sr-appear .4s cubic-bezier(.17,.67,.35,1.3) forwards, sr-pulse-black 1.8s 0.4s ease-in-out infinite; }

    /* 跑馬道特殊馬光暈 */
    .ro-horse-wrap.special-golden .ro-horse-sprite { filter:drop-shadow(0 0 8px #ffd700) drop-shadow(0 0 4px #fff); }
    .ro-horse-wrap.special-black  .ro-horse-sprite { filter:drop-shadow(0 0 8px #aaaaff) drop-shadow(0 0 4px #fff); }
    .ro-horse-wrap.special-golden .ro-horse-name { color:#ffd700 !important; font-weight:900; }
    .ro-horse-wrap.special-black  .ro-horse-name { color:#ccccff !important; font-weight:900; }

    /* ── 結算 Dialog ── */
    .settle-overlay {
      position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,.75);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .25s;
    }
    .settle-overlay.active { opacity:1; pointer-events:all; }
    .settle-box {
      position:relative; overflow:hidden;
      background:var(--bg-surface); border:1.5px solid var(--border);
      border-radius:14px;
      padding:clamp(14px,3vw,30px) clamp(20px,4.5vw,44px);
      min-width:clamp(180px,28vw,320px);
      text-align:center;
      box-shadow:0 12px 50px rgba(0,0,0,.9);
    }
    .settle-box.win-box  { border-color:var(--color-win); }
    .settle-box.gold-box { border-color:var(--color-golden); }
    .settle-box.warn-box { border-color:var(--color-lose); }
    .sd-icon   { font-size:clamp(28px,5vw,54px); line-height:1.1; margin-bottom:5%; }
    .sd-title  { font-size:clamp(10px,1.7vw,20px); font-weight:800; color:var(--text-main); margin-bottom:3%; }
    .sd-title.gold { color:var(--color-golden); }
    .sd-title.warn { color:var(--color-lose); }
    .sd-amount { font-size:clamp(18px,3vw,36px); font-weight:900; color:var(--color-win); font-family:var(--fn-mono); margin-bottom:5%; min-height:1.2em; }
    .sd-amount.gold { color:var(--color-golden); }
    .sd-sub    { font-size:clamp(7px,.95vw,11px); color:var(--text-dim); margin-bottom:7%; min-height:1.2em; }
    .sd-btn    { background:var(--accent-gold); color:#000; border:none; border-radius:6px; padding:clamp(5px,.8vw,9px) clamp(20px,3.5vw,36px); font-size:clamp(9px,1.2vw,14px); font-weight:700; cursor:pointer; letter-spacing:.04em; }
    .sd-btn:hover { filter:brightness(1.12); }
    .sd-btn.warn  { background:var(--color-lose); color:#fff; }
    /* 硬幣噴射粒子 */
    @keyframes coin-fly {
      0%   { transform:translate(0,0) scale(1) rotate(0deg); opacity:1; }
      100% { transform:translate(var(--tx),var(--ty)) scale(0.3) rotate(360deg); opacity:0; }
    }
    .coin-p { position:absolute; pointer-events:none; font-size:clamp(10px,1.6vw,20px); animation:coin-fly .9s ease-out forwards; }

    /* ── RIGHT: 投注單面板 ── */
    #bet-panel {
      flex:1; display:flex; flex-direction:column;
      background:var(--bg-surface); overflow:hidden;
    }
    /* 上場結果 */
    #panel-lastrace {
      padding:4% 5% 3%; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .lr-title {
      font-size:clamp(6px,.85vw,10px); font-weight:700;
      letter-spacing:.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:5%;
    }
    .lr-podium { display:flex; flex-direction:row; gap:3%; }
    .lr-horse  { flex:1; display:flex; flex-direction:column; align-items:center; gap:6%; min-width:0; }
    .lr-portrait-wrap {
      position:relative;
      width:clamp(32px,4.5vw,56px); height:clamp(32px,4.5vw,56px);
      perspective:300px;
    }
    .lr-portrait {
      width:100%; height:100%; object-fit:cover;
      border-radius:5px; border:2px solid; display:block;
      will-change:transform;
    }
    .lr-portrait-fallback {
      position:absolute; inset:0;
      border-radius:5px; border:2px solid;
      display:none; align-items:center; justify-content:center;
      font-size:clamp(14px,2vw,26px);
    }
    .lr-rank-badge {
      position:absolute; top:-5px; left:-5px; z-index:2;
      width:clamp(14px,1.8vw,22px); height:clamp(14px,1.8vw,22px);
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:clamp(7px,.85vw,11px); font-weight:900;
      box-shadow:0 1px 4px rgba(0,0,0,.6);
    }
    .lr-name   { font-size:clamp(6px,.9vw,11px); font-weight:700; text-align:center; line-height:1.2; }
    .lr-empty  { font-size:clamp(7px,.9vw,11px); color:var(--text-dim); text-align:center; padding:5% 0; }
    /* 情報輪播 */
    #panel-insights {
      padding:4% 5% 3%; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .insight-label {
      font-size:clamp(6px,.85vw,10px); font-weight:700;
      letter-spacing:.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:5%;
    }
    .insight-wrap { display:grid; grid-template-columns:1fr 1fr; gap:3%; }
    .insight-card {
      width:100%; background:var(--bg-card);
      border:1px solid var(--border); border-radius:6px;
      padding:4% 5%; display:flex; flex-direction:row;
      align-items:center; gap:6%;
      min-width:0; overflow:hidden; animation:cd-appear .25s ease-out;
    }
    .ic-left  { display:flex; align-items:center; gap:5%; flex-shrink:0; }
    .ic-icon  { font-size:clamp(11px,1.5vw,18px); flex-shrink:0; }
    .ic-portrait-wrap {
      position:relative; flex-shrink:0;
      width:clamp(26px,3.5vw,44px); height:clamp(26px,3.5vw,44px);
    }
    .ic-portrait {
      width:100%; height:100%; object-fit:cover;
      border-radius:4px; border:2px solid; display:block;
    }
    .ic-portrait-fallback {
      width:100%; height:100%; border-radius:4px; border:2px solid;
      display:none; align-items:center; justify-content:center;
      font-size:clamp(10px,1.5vw,18px);
    }
    .ic-right  { flex:1; min-width:0; display:flex; flex-direction:column; gap:3%; }
    .ic-title  { font-size:clamp(5px,.75vw,9px); font-weight:700; color:var(--text-sub); letter-spacing:.06em; }
    .ic-horse  { font-size:clamp(7px,.95vw,11px); font-weight:700; }
    .ic-desc   { font-size:clamp(5px,.68vw,8px); color:var(--text-sub); }
    .insight-empty { font-size:clamp(7px,.9vw,11px); color:var(--text-dim); text-align:center; padding:4% 0; }
    /* 籌碼 */
    #panel-chips {
      padding:4% 5% 3%; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .pc-label {
      font-size:clamp(6px,.85vw,10px); font-weight:700;
      letter-spacing:.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:5%;
    }
    .pc-btns { display:flex; gap:3%; }
    .pc-chip {
      flex:1; display:flex; align-items:center; justify-content:center;
      height:clamp(20px,4vh,34px);
      border-radius:4px; border:1.5px solid var(--border);
      background:var(--bg-card); color:var(--text-main);
      font-family:var(--fn-mono); font-weight:700; font-size:clamp(6px,.95vw,12px);
      cursor:pointer; transition:all .12s; white-space:nowrap;
    }
    .pc-chip:hover  { border-color:var(--accent-gold); color:var(--accent-gold); }
    .pc-chip.active { background:var(--accent-gold); color:#000; border-color:var(--accent-gold); }
    /* 注單列表 */
    #panel-bets { flex:1; overflow-y:auto; padding:3% 5%; }
    .bet-empty {
      font-size:clamp(7px,.9vw,11px); color:var(--text-dim);
      text-align:center; padding:12% 0; line-height:1.8;
    }
    .p-bet-row {
      display:flex; align-items:center; gap:4%; padding:2.5% 0;
      border-bottom:1px solid rgba(26,39,64,.5);
      font-size:clamp(6px,.9vw,11px); font-family:var(--fn-mono);
    }
    .p-bet-row:last-child { border-bottom:none; }
    .pbet-type  { flex-shrink:0; }
    .pbet-horse { flex:1; min-width:0; font-weight:600; }
    .pbet-odds  { color:var(--text-sub); flex-shrink:0; }
    .pbet-amt   { font-weight:700; color:var(--accent-gold); flex-shrink:0; }
    /* 面板底部 */
    #panel-footer {
      padding:3% 5%; border-top:2px solid var(--border);
      display:flex; flex-direction:column; gap:4%; flex-shrink:0;
    }
    .pf-summary {
      display:flex; justify-content:space-between; align-items:center;
      font-size:clamp(7px,.95vw,12px); font-family:var(--fn-mono); color:var(--text-sub);
    }
    .pf-total { font-weight:700; color:var(--accent-gold); }
    .pf-row   { display:flex; gap:3%; }
    .pf-btn {
      flex:1; height:clamp(20px,4vh,34px);
      border-radius:4px; border:1.5px solid var(--border);
      background:transparent; color:var(--text-sub);
      font-size:clamp(7px,1vw,12px); font-weight:600;
      cursor:pointer; transition:all .12s; white-space:nowrap;
    }
    .pf-btn:hover          { border-color:var(--accent-gold); color:var(--accent-gold); }
    .pf-btn.cancel:hover   { border-color:var(--color-lose);  color:var(--color-lose);  }
    .pf-btn.primary {
      background:var(--accent-gold); color:#000;
      border-color:var(--accent-gold);
    }
    .pf-btn.primary:hover  { background:var(--gold-bright); border-color:var(--gold-bright); }
    /* 跳過比賽按鈕 */
    #btn-skip {
      padding:0 clamp(8px,1.4vw,18px); height:clamp(18px,3.5vh,30px);
      border-radius:4px; border:1px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.08); color:rgba(255,255,255,.6);
      font-size:clamp(7px,1vw,12px); font-weight:600;
      cursor:pointer; transition:all .12s; white-space:nowrap;
    }
    #btn-skip:hover { background:rgba(255,255,255,.18); color:#fff; }

    /* ── RACE OVERLAY ── */
    #race-overlay {
      display:none; position:absolute; inset:0; z-index:50;
      background:rgba(8,12,24,.96);
      flex-direction:column;
    }
    #race-overlay.active { display:flex; }
    #ro-header {
      display:flex; align-items:center; justify-content:center; gap:1em;
      padding:1.5% 2%;
      border-bottom:1px solid var(--border);
      font-size:clamp(10px,1.6vw,20px); font-weight:700;
      color:var(--accent-gold); letter-spacing:.08em;
    }
    #ro-track {
      flex:1; position:relative; overflow:hidden;
      will-change:transform;
      transition: transform 1.2s cubic-bezier(.4,0,.2,1);
    }

    /* ── Parallax 各層 ── */
    .ro-sky {
      position:absolute; inset:0; height:42%;
      background:linear-gradient(180deg,#071320 0%,#0d2240 55%,#1a3a6a 100%);
    }
    .ro-sky::after {
      content:''; position:absolute; inset:0;
      background-image:
        radial-gradient(1px 1px at 8% 18%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 28% 9%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 52% 22%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 74% 14%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 88% 28%,#fff 0%,transparent 100%),
        radial-gradient(1px 1px at 18% 36%,rgba(255,255,255,.5) 0%,transparent 100%),
        radial-gradient(1px 1px at 63% 32%,rgba(255,255,255,.5) 0%,transparent 100%);
      opacity:.75;
    }
    #ro-stand {
      position:absolute; top:10%; left:0;
      width:3000px; height:34%;
      display:flex; align-items:flex-end;
      animation:ro-scroll 22s linear infinite;
    }
    #ro-ads {
      position:absolute; top:22%; left:0;
      width:3000px; height:24%;
      display:flex; align-items:flex-end;
      animation:ro-scroll 11s linear infinite;
    }
    .ro-ad-board {
      flex-shrink:0; height:68%; border-radius:4px;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(8px,1vw,13px); font-weight:700; letter-spacing:.06em;
      margin-right:clamp(30px,4vw,60px); padding:0 clamp(8px,1.2vw,16px); white-space:nowrap;
      border:2px solid rgba(255,255,255,.18); color:#fff;
    }
    #ro-fence {
      position:absolute; top:44%; left:0;
      width:3000px; height:7%;
      animation:ro-scroll 4.5s linear infinite;
      display:flex; align-items:center; position:absolute;
    }
    .ro-fence-post { flex-shrink:0; width:3px; height:100%; background:#c8a96e; margin-right:clamp(16px,2.2vw,28px); border-radius:1px; }
    .ro-fence-rail { position:absolute; height:2.5px; left:0; width:3000px; background:#c8a96e; opacity:.75; }
    .ro-ground {
      position:absolute; top:46%; left:0; right:0; bottom:0;
      background:linear-gradient(180deg,
        #8a6035 0%,
        #7a5228 18%,
        #6a431e 45%,
        #563518 75%,
        #442a12 100%
      );
    }
    .ro-ground::before {
      content:''; position:absolute; inset:0;
      background:
        repeating-linear-gradient(180deg,
          rgba(255,255,255,.05) 0px, rgba(255,255,255,.05) 1px,
          transparent 1px, transparent 30px
        ),
        repeating-linear-gradient(90deg,transparent,transparent 58px,rgba(255,255,255,.03) 58px,rgba(255,255,255,.03) 59px);
    }
    #ro-grass {
      position:absolute; bottom:0; left:0;
      width:3000px; height:9%;
      animation:ro-scroll 2s linear infinite;
      display:flex; align-items:flex-end;
    }
    .ro-grass-tuft {
      flex-shrink:0; height:20px; width:14px; margin-right:10px; opacity:.6;
      background:linear-gradient(180deg,#5ab52e,#306618);
      clip-path:polygon(50% 0%,0% 100%,100% 100%);
    }
    @keyframes ro-scroll { from{transform:translateX(0)} to{transform:translateX(-1500px)} }

    /* ── 終點線 ── */
    #finish-line {
      position:absolute; right:8%; top:45%; bottom:0; width:4px;
      background:repeating-linear-gradient(180deg,#fff 0,#fff 8px,#000 8px,#000 16px);
      z-index:10;
    }
    #finish-flag {
      position:absolute; right:calc(8% - 8px); top:42%;
      font-size:clamp(14px,2vw,22px); z-index:11;
    }

    /* ── 馬匹（在 #ro-track 內） ── */
    .ro-horse-wrap {
      position:absolute; display:flex; align-items:center; gap:clamp(2px,.4vw,5px);
      z-index:5; transform:translateY(-50%); overflow:visible;
    }
    .ro-horse-num {
      width:clamp(14px,2vw,22px); height:clamp(14px,2vw,22px);
      border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(7px,.9vw,11px); font-weight:700; color:#fff;
      border:2px solid currentColor;
    }
    .ro-horse-sprite {
      width:52px; height:52px;
      background-image:url('gen_tools/銀翼馬/horse_1x6.png');
      background-size:312px 52px;
      background-repeat:no-repeat;
      background-position:0 0;
      filter:drop-shadow(1px 2px 3px rgba(0,0,0,.7));
      flex-shrink:0;
    }
    .ro-horse-wrap.golden .ro-horse-sprite {
      filter:drop-shadow(0 0 10px #ffd700) drop-shadow(1px 2px 3px rgba(0,0,0,.7));
    }
    .ro-horse-name {
      font-size:clamp(7px,.85vw,11px); color:rgba(255,255,255,.85);
      white-space:nowrap; text-shadow:0 1px 3px rgba(0,0,0,.9); font-weight:600;
    }
    .ro-horse-wrap.golden .ro-horse-name { color:#ffd700; }

    /* ── 即時排名欄（固定在 #ro-track 頂部） ── */
    #ro-rank-bar {
      position:absolute; top:0; left:0; right:0;
      height:clamp(28px,5vh,42px);
      background:rgba(0,0,0,.82); border-bottom:1px solid rgba(255,215,0,.22);
      backdrop-filter:blur(6px);
      z-index:20; display:flex; align-items:stretch;
      transition: opacity 0.4s;
    }
    #ro-rank-bar .rb-title {
      flex-shrink:0; width:clamp(32px,5vw,52px);
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(7px,.75vw,9px); font-weight:700; color:#ffd700; letter-spacing:.08em;
      text-align:center; line-height:1.2;
      border-right:1px solid rgba(255,215,0,.2);
    }
    .rb-item {
      flex:1; display:flex; align-items:center; justify-content:center;
      gap:clamp(2px,.4vw,5px);
      border-right:1px solid rgba(255,255,255,.07); padding:0 2px;
    }
    .rb-item:last-child { border-right:none; }
    .rb-item.top1 { background:rgba(255,215,0,.12); }
    .rb-item.top2 { background:rgba(192,192,192,.07); }
    .rb-item.top3 { background:rgba(180,100,20,.07); }
    .rb-pos { font-size:clamp(10px,1.4vw,16px); font-weight:900; font-family:monospace; line-height:1; flex-shrink:0; }
    .rb-pos.p1 { color:#ffd700; text-shadow:0 0 8px rgba(255,215,0,.6); }
    .rb-pos.p2 { color:#bdc3c7; }
    .rb-pos.p3 { color:#c67c2a; }
    .rb-pos.px { color:#555; }
    .rb-dot  { width:clamp(6px,.8vw,9px); height:clamp(6px,.8vw,9px); border-radius:50%; flex-shrink:0; }
    .rb-name { font-size:clamp(7px,.85vw,10px); color:#ccc; white-space:nowrap; font-weight:600; }
    .rb-item.top1 .rb-name { color:#ffd700; }
    .rb-arrow { font-size:clamp(7px,.8vw,9px); flex-shrink:0; }
    .rb-arrow.up   { color:#2ecc71; }
    .rb-arrow.down { color:#e74c3c; }
    .rb-arrow.same { color:#444; }
    /* ── 結算 Backdrop ── */
    #result-backdrop {
      display:none; position:absolute; inset:0; z-index:60;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,.62);
      backdrop-filter:blur(2px);
    }
    #result-backdrop.active { display:flex; }
    #ro-result {
      display:flex; flex-direction:column;
      width:clamp(320px,68%,820px);
      max-height:82%;
      background:var(--bg-surface);
      border:1px solid var(--border-sel);
      border-radius:12px;
      box-shadow:0 12px 50px rgba(0,0,0,.9), 0 0 0 1px rgba(201,162,39,.15);
      overflow:hidden;
    }
    /* Podium */
    #ro-podium {
      display:flex; align-items:center; justify-content:center; gap:3%;
      padding:.8% 3%; border-bottom:1px solid var(--border);
      background:var(--bg-card); flex-shrink:0;
    }
    .ro-podium-item {
      display:flex; align-items:center; gap:.4em;
      font-size:clamp(7px,1.05vw,13px); font-weight:600;
    }
    .ro-podium-dot {
      width:.7em; height:.7em; border-radius:50%; flex-shrink:0;
    }
    /* Breakdown */
    #ro-breakdown {
      flex:1; overflow-y:auto; display:flex; flex-direction:column;
    }
    #rbd-col-header {
      display:grid;
      grid-template-columns: 6% 28% 10% 10% 12% 14%;
      gap:0 1%;
      padding:.4% 2%;
      background:var(--bg-card);
      border-bottom:1px solid var(--border);
      flex-shrink:0;
      font-size:clamp(5px,.75vw,9px);
      color:var(--text-sub); font-weight:700; letter-spacing:.07em;
      text-transform:uppercase;
    }
    #rbd-col-header span { text-align:center; }
    #rbd-col-header .rbd-col-target { text-align:left; }
    #rbd-list { flex:1; overflow-y:auto; }
    .rbd-row {
      display:grid;
      grid-template-columns: 6% 28% 10% 10% 12% 14%;
      gap:0 1%; align-items:center;
      padding:.35% 2%;
      border-bottom:1px solid rgba(26,39,64,.5);
      font-size:clamp(6px,.9vw,11px); font-family:var(--fn-mono);
    }
    .rbd-row.won-row  { background:rgba(39,174,96,.08); }
    .rbd-row.lost-row { background:transparent; opacity:.6; }
    .rbd-row > span   { display:flex; align-items:center; justify-content:center; }
    .rbd-row > .rbd-target { justify-content:flex-start; gap:.35em; }
    .rbd-type-badge {
      display:inline-block;
      padding:.1em .45em; border-radius:3px;
      font-size:clamp(5px,.75vw,9px); font-weight:700; letter-spacing:.04em;
    }
    .rbd-type-WIN      { background:rgba(212,175,55,.2); color:var(--accent-gold); border:1px solid rgba(212,175,55,.35); }
    .rbd-type-PLACE    { background:rgba(41,128,185,.2); color:#5dade2; border:1px solid rgba(41,128,185,.35); }
    .rbd-type-QUINELLA { background:rgba(142,68,173,.2); color:#bb8fce; border:1px solid rgba(142,68,173,.35); }
    .rbd-dot { width:.6em; height:.6em; border-radius:50%; flex-shrink:0; }
    .rbd-result-won  { color:var(--color-win); font-weight:700; }
    .rbd-result-lost { color:var(--text-dim); }
    .rbd-payout-won  { color:var(--color-win); font-weight:700; }
    .rbd-payout-lost { color:var(--text-dim); }
    /* Summary */
    #ro-summary {
      display:flex; align-items:center; gap:1.5%;
      padding:.6% 2%; border-top:1px solid var(--border);
      background:var(--bg-surface); flex-shrink:0;
    }
    .sum-item {
      font-size:clamp(6px,.9vw,11px); color:var(--text-sub);
      font-family:var(--fn-mono); display:flex; align-items:center; gap:.4em;
    }
    .sum-val { font-weight:700; color:var(--text-main); }
    .sum-sep { width:1px; height:1.2em; background:var(--border); }
    #btn-next {
      display:block; width:100%;
      padding:.7em 0;
      border:none; border-top:1px solid var(--border);
      background:var(--accent-gold); color:#000;
      font-size:clamp(10px,1.3vw,16px); font-weight:700;
      cursor:pointer; transition:background .12s; letter-spacing:.06em;
      flex-shrink:0;
    }
    #btn-next:hover { background:var(--gold-bright); }

    /* ── DEBUG ── */
    #dbg {
      display:none; position:absolute; bottom:0; right:0; z-index:100;
      background:rgba(0,0,0,.88); border:1px solid #333;
      border-radius:8px 0 0 0; padding:6px 10px;
      font-size:11px; color:#aaa; font-family:monospace; min-width:160px;
    }

    /* ── 倒數計時 ── */
    #race-countdown {
      display:none; position:absolute; inset:0; z-index:55;
      align-items:center; justify-content:center;
      pointer-events:none;
    }
    #race-countdown.cd-active { display:flex; }
    /* 數字 + 圓形進度環 */
    .cd-wrapper {
      position:relative; display:flex; align-items:center; justify-content:center;
      width:clamp(150px,22vw,270px); height:clamp(150px,22vw,270px);
      animation:cd-appear .15s ease-out both;
    }
    @keyframes cd-appear { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
    .cd-ring-svg {
      position:absolute; inset:0; width:100%; height:100%;
      transform:rotate(-90deg); /* 從12點鐘方向開始 */
    }
    .cd-ring-bg { fill:none; stroke:rgba(255,255,255,.18); stroke-width:6; }
    .cd-ring-fg {
      fill:none; stroke:#ffd700; stroke-width:6; stroke-linecap:round;
      stroke-dasharray:327; stroke-dashoffset:327;
      animation:ring-fill .93s linear forwards;
    }
    @keyframes ring-fill { to { stroke-dashoffset:0; } }
    .cd-num {
      font-size:clamp(72px,13vw,165px); font-weight:900; z-index:1;
      color:#fff; letter-spacing:-.02em;
      text-shadow:0 0 55px rgba(255,215,0,.9),0 6px 24px rgba(0,0,0,.95);
    }
    .cd-go {
      font-size:clamp(60px,11vw,140px); font-weight:900;
      color:#2ecc71; letter-spacing:.04em;
      text-shadow:0 0 60px rgba(46,204,113,.9),0 8px 30px rgba(0,0,0,.95);
      animation:cd-go-pop .65s ease-out both;
    }
    @keyframes cd-go-pop {
      0%  { transform:scale(.5);  opacity:0; }
      30% { transform:scale(1.1); opacity:1; }
      65% { transform:scale(1);   opacity:1; }
      100%{ transform:scale(1.3); opacity:0; }
    }

    /* ── 終點名次結果面板 ── */
    #finish-results {
      position:absolute; right:1.2%; top:12%;
      z-index:18; pointer-events:none;
      display:flex; flex-direction:column;
      gap:clamp(2px,.35vh,4px);
      min-width:clamp(90px,16vw,180px);
    }
    .frm-row {
      display:flex; align-items:center;
      gap:clamp(3px,.4vw,6px);
      padding:clamp(2px,.35vh,4px) clamp(5px,.8vw,9px) clamp(2px,.35vh,4px) clamp(3px,.5vw,6px);
      border-radius:4px; border:1.5px solid; white-space:nowrap;
      animation:marker-pop .25s cubic-bezier(.18,1.4,.6,1) both;
    }
    .frm-row.rank-1 { border-color:#ffd700bb; background:rgba(255,215,0,.18); }
    .frm-row.rank-2 { border-color:#c0c0c0bb; background:rgba(192,192,192,.12); }
    .frm-row.rank-3 { border-color:#cd7f32bb; background:rgba(205,127,50,.15); }
    .frm-row.rank-other { border-color:rgba(50,70,105,.8); background:rgba(12,18,32,.88); }
    .frm-rank {
      font-size:clamp(7px,.9vw,11px); font-weight:900;
      min-width:2.2em; text-align:center; letter-spacing:.02em;
    }
    .frm-num {
      width:clamp(12px,1.6vw,19px); height:clamp(12px,1.6vw,19px);
      border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(5px,.75vw,9px); font-weight:700; border:1.5px solid;
    }
    .frm-name { font-size:clamp(6px,.8vw,10px); }
    @keyframes marker-pop {
      from { transform:scale(.5); opacity:0; }
      to   { transform:scale(1);  opacity:1; }
    }

    /* ── Canvas 賽道 ── */
    #race-canvas {
      position:absolute; inset:0; width:100%; height:100%;
      z-index:6; display:none;
    }

    /* ── SKILL BUBBLES ── */
    .skill-bubble {
      position: absolute; z-index: 25;
      background: rgba(8,14,26,.96);
      border: 1.5px solid;
      border-radius: 7px;
      padding: 3px 8px;
      font-size: clamp(8px,1.15vw,14px);
      font-weight: 700;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
      animation: bubblePop 2.2s ease-out forwards;
    }
    .skill-bubble-big {
      font-size: clamp(10px,1.45vw,17px) !important;
      font-weight: 900 !important;
      padding: 4px 11px !important;
      border-width: 2px !important;
      letter-spacing: .04em;
    }
    @keyframes bubblePop {
      0%   { opacity:0; transform:translateY(4px) scale(.7); }
      15%  { opacity:1; transform:translateY(-4px) scale(1.06); }
      30%  { transform:translateY(-2px) scale(1); }
      75%  { opacity:1; transform:translateY(-2px); }
      100% { opacity:0; transform:translateY(-12px); }
    }

    /* ── 翻牌動畫（上場前三名）── */
    .lr-flip-name { display:inline-block; }
    @keyframes lr-flip-settle {
      from { opacity:.4; transform:scaleY(.7); }
      to   { opacity:1;  transform:scaleY(1); }
    }

    /* ── 閃爍邊框（馬匹情報）── */
    @keyframes insight-flash {
      0%   { box-shadow:none; }
      35%  { box-shadow:0 0 0 2px var(--accent-gold), 0 0 16px rgba(201,162,39,.35); }
      100% { box-shadow:none; }
    }
    .insight-flash-anim { animation:insight-flash .75s ease-out; }

    /* ── ANIMATIONS ── */
    @keyframes blink   { from{opacity:1} to{opacity:.35} }
    /* horse-run handled by JS setInterval — see horseAnimTick() */
    @keyframes skill-flash { 0%{filter:drop-shadow(0 0 12px var(--sc)) brightness(2)} 60%{filter:drop-shadow(0 0 5px var(--sc)) brightness(1.4)} 100%{filter:drop-shadow(1px 2px 3px rgba(0,0,0,.7))} }
    @keyframes coinPop {
      0%  { transform:scale(0) translateY(0); opacity:1; }
      60% { transform:scale(1.3) translateY(-15px); opacity:1; }
      100%{ transform:scale(1) translateY(-30px); opacity:0; }
    }


    /* ── BET BADGE (舊殘留已整合至 cell-tl，此段保留空白佔位）── */

    /* ── 資訊面板按鈕（Header）── */
    #btn-info-toggle {
      display:flex; align-items:center; gap:.3em;
      padding:0 clamp(5px,.9vw,12px);
      height:clamp(16px,3.5vh,30px);
      border-radius:4px; border:1px solid var(--border);
      background:transparent; color:var(--text-sub);
      font-size:clamp(6px,.9vw,11px); font-weight:600;
      cursor:pointer; transition:all .15s; white-space:nowrap;
    }
    #btn-info-toggle:hover { border-color:var(--accent-gold); color:var(--accent-gold); }
    #btn-info-toggle.open  {
      border-color:rgba(201,162,39,.6); color:var(--accent-gold);
      background:rgba(201,162,39,.12);
    }

    /* ── 資訊面板（可收合抽屜）── */
    #info-panel {
      position:absolute; left:0; top:0; bottom:0;
      width:clamp(240px,38%,420px);
      background:var(--bg-surface);
      border-right:2px solid var(--border-sel);
      box-shadow:6px 0 28px rgba(0,0,0,.75);
      z-index:30;
      display:flex; flex-direction:column; overflow-y:auto;
      transform:translateX(-105%);
      transition:transform .28s cubic-bezier(.4,0,.2,1);
    }
    #info-panel.open { transform:translateX(0); }
    #info-overlay {
      display:none; position:absolute; inset:0;
      background:rgba(0,0,0,.42); z-index:29;
    }
    #info-overlay.active { display:block; }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      display:flex; align-items:center;
      background:#12100a;
      border-top:2px solid var(--border);
      padding:0 1.2%;
      gap:.8%;
      overflow:hidden;
    }
    #bb-bet-info {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:rgba(0,0,0,.55); border:1px solid var(--border);
      border-radius:5px; padding:0 1.8%;
      min-width:8%; height:72%; flex-shrink:0;
    }
    .bb-bet-label {
      font-size:clamp(5px,.65vw,8px); color:var(--text-sub);
      letter-spacing:.06em; white-space:nowrap;
    }
    #pf-total-val {
      font-family:var(--fn-mono); font-size:clamp(9px,1.3vw,16px);
      font-weight:700; color:var(--accent-gold);
    }
    #bb-chips {
      display:flex; gap:clamp(3px,.5vw,6px); align-items:center; flex-shrink:0;
    }
    .bb-chip {
      width:clamp(28px,4.2vw,50px); height:clamp(28px,4.2vw,50px);
      border-radius:50%; border:3px dashed;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--fn-mono); font-weight:800;
      font-size:clamp(6px,.82vw,10px);
      cursor:pointer; transition:transform .1s, box-shadow .1s;
      position:relative; flex-shrink:0; user-select:none;
    }
    .bb-chip:hover  { transform:scale(1.1); }
    .bb-chip.active { transform:scale(1.12); box-shadow:0 0 14px 3px currentColor; border-style:solid; }
    .bb-chip[data-chip="100"]   { background:#3a3a4a; border-color:#8888aa; color:#ccccee; }
    .bb-chip[data-chip="500"]   { background:#1e3a22; border-color:#44aa4a; color:#88ee88; }
    .bb-chip[data-chip="1000"]  { background:#12285a; border-color:#3377cc; color:#77aaff; }
    .bb-chip[data-chip="5000"]  { background:#38124a; border-color:#9933cc; color:#cc88ff; }
    .bb-chip[data-chip="10000"] { background:#4a1e10; border-color:#cc5522; color:#ffaa66; }
    .bb-spacer { flex:1; }
    .bb-btn {
      height:clamp(22px,5.5vh,42px);
      border-radius:5px; border:1.5px solid;
      font-weight:700; font-size:clamp(7px,1.0vw,13px);
      cursor:pointer; padding:0 clamp(6px,1.2vw,16px);
      white-space:nowrap; transition:all .12s; flex-shrink:0;
    }
    #bb-btn-repeat {
      background:rgba(255,255,255,.05); border-color:var(--border);
      color:var(--text-sub);
    }
    #bb-btn-repeat:hover { border-color:var(--accent-gold); color:var(--accent-gold); }
    #bb-btn-allbet {
      background:rgba(46,204,113,.12); border-color:#27ae60; color:#2ecc71;
    }
    #bb-btn-allbet:hover { background:#27ae60; color:#000; }
    #bb-btn-cancel {
      background:transparent; border-color:var(--border); color:var(--text-sub);
    }
    #bb-btn-cancel:hover { border-color:var(--color-lose); color:var(--color-lose); }
    #btn-start {
      background:var(--accent-gold); border-color:var(--accent-gold); color:#000;
      font-size:clamp(8px,1.25vw,15px); font-weight:800;
      padding:0 clamp(10px,2vw,26px);
    }
    #btn-start:hover    { background:var(--gold-bright); border-color:var(--gold-bright); }
    #btn-start:disabled { background:var(--border); border-color:var(--border); color:var(--text-dim); cursor:not-allowed; }

    /* ── HISTORY BUTTON ── */
    #btn-history {
      display:flex; align-items:center; gap:.3em;
      padding:0 clamp(5px,.9vw,12px);
      height:clamp(16px,3.5vh,30px);
      border-radius:4px; border:1px solid var(--border);
      background:transparent; color:var(--text-sub);
      font-size:clamp(6px,.9vw,11px); font-weight:600;
      cursor:pointer; transition:all .15s; white-space:nowrap;
    }
    #btn-history:hover { border-color:var(--accent-gold); color:var(--accent-gold); }

    /* ── HISTORY OVERLAY ── */
    #history-overlay {
      display:none; position:absolute; inset:0; z-index:60;
      background:rgba(8,12,24,.97);
      flex-direction:column;
    }
    #history-overlay.active { display:flex; }
    #hist-header {
      display:flex; align-items:center; padding:1% 1.5%;
      border-bottom:2px solid var(--border);
      background:var(--bg-surface);
      gap:1%;
    }
    #hist-title {
      font-size:clamp(9px,1.4vw,17px); font-weight:700;
      color:var(--accent-gold); letter-spacing:.06em;
    }
    #hist-subtitle {
      font-size:clamp(6px,.9vw,11px); color:var(--text-sub);
      font-family:var(--fn-mono);
    }
    #hist-close {
      margin-left:auto;
      padding:0 clamp(5px,.9vw,12px); height:clamp(16px,3.5vh,30px);
      border-radius:4px; border:1px solid var(--border);
      background:transparent; color:var(--text-sub);
      font-size:clamp(7px,1.0vw,12px); font-weight:600;
      cursor:pointer; transition:all .15s;
    }
    #hist-close:hover { border-color:var(--color-lose); color:var(--color-lose); }

    /* Table */
    #hist-body {
      flex:1; overflow-y:auto; padding:0.5% 1%;
    }
    #hist-table {
      width:100%; border-collapse:collapse;
      font-size:clamp(6px,.9vw,11px); font-family:var(--fn-mono);
    }
    #hist-table thead th {
      position:sticky; top:0;
      background:var(--bg-card);
      color:var(--text-sub); font-weight:700;
      letter-spacing:.06em; text-transform:uppercase;
      padding:.5em .6em; border-bottom:2px solid var(--border);
      text-align:center; white-space:nowrap;
    }
    #hist-table tbody tr { border-bottom:1px solid rgba(26,39,64,.6); }
    #hist-table tbody tr:nth-child(odd) { background:rgba(255,255,255,.015); }
    #hist-table tbody tr:hover          { background:rgba(255,255,255,.04); }
    #hist-table td {
      padding:.4em .6em; text-align:center;
      color:var(--text-main); vertical-align:middle;
    }
    .hist-race-num { color:var(--text-sub); font-weight:700; }
    .hist-horse-badge {
      display:inline-flex; align-items:center; gap:.3em;
      background:rgba(255,255,255,.05); border-radius:3px;
      padding:.1em .4em;
    }
    .hist-dot { width:.7em; height:.7em; border-radius:50%; flex-shrink:0; }
    .hist-gold-row td { background:rgba(255,215,0,.05)!important; }
    .hist-gold-tag {
      display:inline-block;
      background:rgba(255,215,0,.15); border:1px solid rgba(255,215,0,.35);
      border-radius:3px; padding:.05em .4em;
      color:var(--color-golden); font-size:.85em;
    }
    /* Rank colors */
    .rank-1 { color:var(--gold-bright); font-weight:700; }
    .rank-2 { color:#b0b8c8; }
    .rank-3 { color:#cd7f32; }
    /* Tabs */
    #hist-tabs {
      display:flex; gap:.4em; align-items:center;
      background:rgba(255,255,255,.04); border-radius:5px;
      padding:.2em .3em;
    }
    .hist-tab {
      padding:.2em .8em; border-radius:4px;
      border:1px solid transparent;
      background:transparent; color:var(--text-sub);
      font-size:clamp(6px,.9vw,11px); font-weight:600;
      cursor:pointer; transition:all .15s; letter-spacing:.04em;
    }
    .hist-tab.active {
      background:rgba(212,175,55,.18);
      border-color:rgba(212,175,55,.4);
      color:var(--accent-gold);
    }
    .hist-tab:not(.active):hover { color:var(--text-main); }
    /* Stats panel */
    #hist-stats-panel {
      display:none; flex:1; overflow-y:auto; padding:0.5% 1%;
    }
    #hist-stats-panel.active { display:block; }
    #stats-table {
      width:100%; border-collapse:collapse;
      font-size:clamp(6px,.9vw,11px); font-family:var(--fn-mono);
    }
    #stats-table thead th {
      position:sticky; top:0;
      background:var(--bg-card);
      color:var(--text-sub); font-weight:700;
      letter-spacing:.06em; text-transform:uppercase;
      padding:.5em .6em; border-bottom:2px solid var(--border);
      text-align:center; white-space:nowrap;
    }
    #stats-table tbody tr { border-bottom:1px solid rgba(26,39,64,.6); }
    #stats-table tbody tr:nth-child(odd) { background:rgba(255,255,255,.015); }
    #stats-table tbody tr:hover { background:rgba(255,255,255,.04); }
    #stats-table td {
      padding:.4em .6em; text-align:center;
      color:var(--text-main); vertical-align:middle;
    }
    .stats-horse-name {
      display:inline-flex; align-items:center; gap:.35em;
    }
    .stats-rate-bar {
      display:inline-block; height:.5em; border-radius:2px;
      margin-left:.3em; vertical-align:middle; opacity:.7;
    }
    /* Stats bar */
    #hist-stats {
      display:flex; gap:2%; align-items:center;
      padding:.5% 1.5%; border-top:1px solid var(--border);
      background:var(--bg-surface);
      font-size:clamp(6px,.85vw,10px); color:var(--text-sub);
      font-family:var(--fn-mono);
    }
    .stat-item { display:flex; gap:.4em; align-items:center; }
    .stat-val  { color:var(--text-main); font-weight:700; }
  </style>
</head>
<body>
<div id="app">
  <div id="gc">

    <!-- ══ HEADER ══ -->
    <div id="header">
      <button id="btn-info-toggle" onclick="toggleInfoPanel()">📊 賽事資訊</button>
      <div class="hd-div"></div>
      <span class="hd-race" id="race-lbl">RACE 1</span>
      <span class="hd-info" id="race-info">草地 · 1200m</span>
      <span class="hd-info" id="machine-num-lbl" style="color:var(--accent-gold);opacity:.65;font-family:var(--fn-mono)">#--- 號賽道</span>
      <div class="hd-div"></div>
      <div class="hd-spc"></div>
      <button id="btn-history" onclick="openHistory()">📋 歷史紀錄</button>
      <div class="hd-div"></div>
      <div id="bal-wrap">
        <span id="bal-label">籌碼</span>
        <span id="bal-val">$10,000</span>
        <button onclick="cheatMoney()" title="補充籌碼" style="
          margin-left:.4em;
          padding:0 .5em; height:clamp(14px,3vh,26px);
          border-radius:3px; border:1px solid rgba(46,204,113,.4);
          background:rgba(46,204,113,.12); color:#2ecc71;
          font-size:clamp(7px,1.0vw,12px); font-weight:700;
          cursor:pointer; transition:all .15s;
        " onmouseover="this.style.background='rgba(46,204,113,.25)'"
           onmouseout="this.style.background='rgba(46,204,113,.12)'">+$10K</button>
      </div>
    </div>

    <!-- ══ MAIN AREA ══ -->
    <div id="main-area">

      <!-- 資訊面板（可收合抽屜）-->
      <div id="info-panel">
        <div id="panel-lastrace"></div>
        <div id="panel-insights"></div>
      </div>
      <div id="info-overlay" onclick="toggleInfoPanel()"></div>

      <!-- 投注區（欄式：每馬一欄）-->
      <div id="tote-left">
        <!-- Row 1: 馬頭像 -->
        <div id="tl-imgs-row" class="tl-row">
          <div class="tl-row-lbl"></div>
        </div>
        <!-- Row 2: 馬匹名字 -->
        <div id="tl-names-row" class="tl-row">
          <div class="tl-row-lbl"></div>
        </div>
        <!-- Row 3: 獨贏 -->
        <div id="tl-win-row" class="tl-row">
          <div class="tl-row-lbl win-lbl">獨贏<br><small>猜第一名</small></div>
        </div>
        <!-- Row 4: 位置 -->
        <div id="tl-place-row" class="tl-row">
          <div class="tl-row-lbl place-lbl">位置<br><small>猜前三名</small></div>
        </div>
        <!-- Row 5: 連贏 (3×7) -->
        <div id="tl-quinella-section" class="tl-row">
          <div class="tl-row-lbl q-lbl">連贏<br><small>猜前兩名</small></div>
          <div id="tl-q-cells"></div>
        </div>
      </div>

    </div>

    <!-- ══ BOTTOM BAR ══ -->
    <div id="bottom-bar">
      <div id="bb-bet-info">
        <div class="bb-bet-label">本局下注</div>
        <div id="pf-total-val">$0</div>
      </div>
      <div id="bb-chips"><!-- JS rendered --></div>
      <div class="bb-spacer"></div>
      <button id="bb-btn-repeat" class="bb-btn" onclick="repeatBet()">□ 重複下注</button>
      <button id="bb-btn-allbet" class="bb-btn" onclick="betAll()">一鍵全注</button>
      <button id="bb-btn-cancel" class="bb-btn" onclick="cancelAll()">取消</button>
      <button id="btn-start" class="bb-btn" onclick="beginRace()">開賽</button>
    </div>

    <!-- ══ RACE OVERLAY ══ -->
    <div id="race-overlay">
      <div id="ro-header">
        <span id="ro-phase-lbl">🏇 比賽開始！</span>
        <button id="btn-skip" onclick="skipRace()">⏭ 跳過</button>
      </div>
      <div id="ro-track">
        <!-- Parallax 背景（由 JS 建立內容） -->
        <div class="ro-sky"></div>
        <div id="ro-stand"></div>
        <div id="ro-ads"></div>
        <div id="ro-fence">
          <div class="ro-fence-rail" style="top:35%"></div>
          <div class="ro-fence-rail" style="top:68%"></div>
        </div>
        <div class="ro-ground"></div>
        <div id="ro-grass"></div>
        <!-- 即時排名欄 -->
        <div id="ro-rank-bar">
          <div class="rb-title">即時<br>排名</div>
        </div>
        <!-- 終點線 -->
        <div id="finish-line"></div>
        <div id="finish-flag">🏁</div>
        <!-- Canvas U-track（馬匹與賽道由 drawRaceFrame() 繪製） -->
        <canvas id="race-canvas"></canvas>
      </div>
      <!-- 倒數計時：race-overlay 直接子元素，不受 ro-track 鏡頭變形影響 -->
      <div id="race-countdown"></div>
      <!-- 終點名次面板：固定在 overlay 右側，不隨鏡頭移動 -->
      <div id="finish-results"></div>
      <!-- ── 結算 Dialog ── -->
      <div id="result-backdrop">
        <div id="ro-result">
          <!-- 名次 -->
          <div id="ro-podium"></div>
          <!-- 投注明細 -->
          <div id="ro-breakdown">
            <div id="rbd-col-header">
              <span class="rbd-col-type">類型</span>
              <span class="rbd-col-target">投注對象</span>
              <span class="rbd-col-amt">下注</span>
              <span class="rbd-col-odds">賠率</span>
              <span class="rbd-col-result">結果</span>
              <span class="rbd-col-pay">派彩</span>
            </div>
            <div id="rbd-list"></div>
          </div>
          <!-- 結算摘要 -->
          <div id="ro-summary">
            <div class="sum-item">總投注 <span class="sum-val" id="sum-bet"></span></div>
            <div class="sum-sep"></div>
            <div class="sum-item">總派彩 <span class="sum-val" id="sum-pay"></span></div>
            <div class="sum-sep"></div>
            <div class="sum-item">淨損益 <span class="sum-val" id="sum-net"></span></div>
          </div>
          <!-- 下一場按鈕 -->
          <button id="btn-next" onclick="nextRace()">下一場 →</button>
        </div>
      </div>
    </div>

    <!-- ══ HISTORY OVERLAY ══ -->
    <div id="history-overlay">
      <div id="hist-header">
        <span id="hist-title">📋 近50場紀錄</span>
        <div id="hist-tabs">
          <button class="hist-tab active" onclick="switchHistTab('records')">排名紀錄</button>
          <button class="hist-tab" onclick="switchHistTab('stats')">馬匹統計</button>
        </div>
        <span id="hist-subtitle">最新場次在最上方</span>
        <button id="hist-close" onclick="closeHistory()">✕ 關閉</button>
      </div>
      <!-- Tab: 排名紀錄 -->
      <div id="hist-body">
        <table id="hist-table">
          <thead>
            <tr>
              <th>場次</th>
              <th class="rank-1">🥇 第1名</th>
              <th class="rank-2">🥈 第2名</th>
              <th class="rank-3">🥉 第3名</th>
              <th>4th</th><th>5th</th><th>6th</th><th>7th</th>
              <th>備註</th>
            </tr>
          </thead>
          <tbody id="hist-tbody"></tbody>
        </table>
      </div>
      <!-- Tab: 馬匹統計 -->
      <div id="hist-stats-panel">
        <table id="stats-table">
          <thead>
            <tr>
              <th>馬匹</th>
              <th>出場</th>
              <th class="rank-1">第1名</th>
              <th class="rank-1">第1名率</th>
              <th class="rank-2">前2名</th>
              <th class="rank-2">前2名率</th>
              <th class="rank-3">前3名</th>
              <th class="rank-3">前3名率</th>
            </tr>
          </thead>
          <tbody id="stats-tbody"></tbody>
        </table>
      </div>
      <div id="hist-stats"></div>
    </div>

    <!-- ══ DEBUG ══ -->
    <div id="dbg"></div>

  </div>
</div>

<script>
// ════════════════════════════════════
// CONFIG
// ════════════════════════════════════
const CFG = {
  RACE_DUR:        9000,

  INIT_BALANCE:    10000,
  CHIPS:           [100, 500, 1000, 5000, 10000],
  RTP_WIN:         0.93,   // 獨贏 RTP 93%
  RTP_PLACE:       0.94,   // 位置 RTP 94%
  RTP_QUINELLA:    0.90,   // 連贏 RTP 90%
  // 黃金馬 / 黑金馬（投注後揭曉，保證第一）
  GOLDEN_HORSE_CHANCE: 0.06,   // 黃金馬觸發率 6%
  BLACK_HORSE_CHANCE:  0.015,  // 黑金馬觸發率 1.5%

const MACHINE_KEY = 'horse_machine_v1';

// Mulberry32 seeded PRNG
function makePRNG(seed) {
  seed = seed >>> 0;
  return function() {
    seed = (seed + 0x6D2B79F5) >>> 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// FNV-1a hash: string → uint32 seed
function strToSeed(str) {
  let h = 0x811c9dc5 >>> 0;
  for (let i = 0; i < str.length; i++)
    h = Math.imul(h ^ str.charCodeAt(i), 0x01000193) >>> 0;
  return h;
}

function seededShuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function seededSimRace(horses, rng) {
  const rem = horses.map(h => ({ h, p: h.trueProb }));
  const order = [];
  while (rem.length) {
    const tot = rem.reduce((s, x) => s + x.p, 0);
    let r = rng() * tot, cum = 0;
    for (let i = 0; i < rem.length; i++) {
      cum += rem[i].p;
      if (r <= cum || i === rem.length - 1) {
        order.push(rem[i].h);
        rem.splice(i, 1);
        break;
      }
    }
  }
  return order;
}

// 產生機台固定歷史（seeded，同台機台永遠一致）
function generateBootstrapHistory(id) {
  const rng   = makePRNG(strToSeed(id));
  const count = 30 + Math.floor(rng() * 21); // 30–50 場
  const history = [];

  for (let i = 0; i < count; i++) {
    const pool7   = seededShuffle([...POOL], rng).slice(0, 7);
    const weights = seededShuffle([...TRUE_PROB_WEIGHTS], rng);
    const wSum    = weights.reduce((a, b) => a + b, 0);

    const horses = pool7.map((h, idx) => {
      const tp    = weights[idx] / wSum;
      const noise = 0.98 + rng() * 0.04;
      return { id:h.id, name:h.name, color:h.color, silk:h.silk,
               pos:idx+1, trueProb:tp,
               winOdds: +(1/tp * CFG.RTP_WIN * noise).toFixed(1) };
    });

    const order = seededSimRace(horses, rng);
    history.push({ raceNum:i+1, order:[...order], winnerWinOdds:order[0].winOdds });
  }

  return history.reverse(); // 最新場在最前面
}

function saveMachineData() {
  try {
    localStorage.setItem(MACHINE_KEY, JSON.stringify({
      id: machineId, raceNum: S.raceNum, history: S.history,
    }));
  } catch(e) {}
}

function loadMachineData() {
  try { return JSON.parse(localStorage.getItem(MACHINE_KEY) || 'null'); }
  catch(e) { return null; }
}

let machineId  = '';
let machineNum = 0;

function initMachine() {
  const saved = loadMachineData();
  if (saved && saved.id && Array.isArray(saved.history) && saved.history.length > 0) {
    machineId = saved.id;
    S.history = saved.history;
    S.raceNum = saved.raceNum || S.history.length + 1;
  } else {
    machineId = 'M' + Date.now().toString(36).toUpperCase() +
                Math.random().toString(36).slice(2,6).toUpperCase();
    S.history = generateBootstrapHistory(machineId);
    S.raceNum = S.history.length + 1;
    saveMachineData();
  }
  machineNum = (strToSeed(machineId) % 1000) + 1;
  document.getElementById('machine-num-lbl').textContent = '#' + machineNum + ' 號賽道';
}

function scheduleSkills(order, raceDur) {
  // 大招全場最多觸發 1 次，隨機分配給其中一匹落後馬
  let bigSkillUsed = false;
  const bigHorseRank = 3 + Math.floor(Math.random() * 4); // rank 3–6（第4–7名）

  order.forEach((h, rank) => {
    if (rank < 3) return;
    const numSkills = rank >= 4 ? 2 : (Math.random() < 0.65 ? 2 : 1);
    const usedNames = new Set();

    for (let s = 0; s < numSkills; s++) {
      const delay = raceDur * (0.15 + Math.random() * 0.58);

      // 第一個 slot：小招；第二個 slot：若是指定馬且大招未用，觸發大招
      let skill;
      if (s === 1 && rank === bigHorseRank && !bigSkillUsed && Math.random() < 0.55) {
        skill = SKILL_BIG[Math.floor(Math.random() * SKILL_BIG.length)];
        bigSkillUsed = true;
      } else {
        let candidate;
        do { candidate = SKILL_SMALL[Math.floor(Math.random() * SKILL_SMALL.length)]; }
        while (usedNames.has(candidate.name) && usedNames.size < SKILL_SMALL.length);
        skill = candidate;
      }
      usedNames.add(skill.name);
      setTimeout(() => showSkillBubble(h, skill), delay);
    }
  });
}

// 產生中途亂序（讓結果難以預測）
// stage 0 = 35% 時間點：贏家落後在 3–5 位
// stage 1 = 70% 時間點：贏家衝到前 2
function genMidOrder(finalOrder, stage) {
  const n = finalOrder.length;
  const result = [...finalOrder];
  for (let i = n - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  if (stage === 0) {
    // 早段：把最終贏家推到第 3–5 位（製造懸念）
    const wIdx = result.indexOf(finalOrder[0]);
    if (wIdx < 2) {
      const swap = 2 + Math.floor(Math.random() * Math.min(3, n - 3));
      [result[wIdx], result[swap]] = [result[swap], result[wIdx]];
    }
  } else {
    // 中段：贏家爬到前 2，亞軍進前 4
    const wIdx = result.indexOf(finalOrder[0]);
    if (wIdx > 1) {
      const swap = Math.floor(Math.random() * 2);
      [result[wIdx], result[swap]] = [result[swap], result[wIdx]];
    }
    const s2 = result.indexOf(finalOrder[1]);
    if (s2 > 3) {
      const swap = 1 + Math.floor(Math.random() * 3);
      [result[s2], result[swap]] = [result[swap], result[s2]];
    }
  }
  return result;
}

// HARVILLE PROBABILITY HELPERS
// ════════════════════════════════════

// P(horse 進前 3) — Harville 三層公式
function calcPlaceProb(allHorses, target) {
  const n = allHorses.length;
  const p = allHorses.map(h => h.trueProb);
  const ti = allHorses.indexOf(target);
  let prob = p[ti]; // P(1st)
  // P(2nd)
  for (let j = 0; j < n; j++) {
    if (j === ti) continue;
    prob += p[j] * p[ti] / (1 - p[j]);
  }
  // P(3rd)
  for (let j = 0; j < n; j++) {
    if (j === ti) continue;
    for (let k = 0; k < n; k++) {
      if (k === ti || k === j) continue;
      const denom = 1 - p[j] - p[k];
      if (denom <= 0) continue;
      prob += p[j] * (p[k] / (1 - p[j])) * (p[ti] / denom);
    }
  }
  return Math.min(prob, 0.999);
}

// P(馬 A 和 B 同時進前 2) — Harville 連贏公式
function calcQuinellaProb(ha, hb) {
  const pi = ha.trueProb, pj = hb.trueProb;
  return pi * pj / (1 - pi) + pj * pi / (1 - pj);
}

function pickHorses() {
  // 馬匹固定用 SESSION_HORSES，每場只重新洗賠率權重
  const weights = [...TRUE_PROB_WEIGHTS].sort(() => Math.random() - 0.5);
  const wSum    = weights.reduce((a, b) => a + b, 0);

  // 第一輪：賦予真實勝率 + 獨贏賠率（顯示值加 ±4% 雜訊製造盤口變化感）
  const horses = SESSION_HORSES.map((h, i) => {
    const tp    = weights[i] / wSum;
    const noise = 0.98 + Math.random() * 0.04;
    return {
      ...h,
      pos:       i + 1,
      trueProb:  tp,
      winOdds:   +(1/tp * CFG.RTP_WIN * noise).toFixed(1),
      placeOdds: 0,
      finalPos:  null,
    };
  });

  // 第二輪：用 Harville 算位置機率 → 位置賠率
  horses.forEach(h => {
    const pp    = calcPlaceProb(horses, h);
    const noise = 0.98 + Math.random() * 0.04;
    h.placeOdds = +(1/pp * CFG.RTP_PLACE * noise).toFixed(1);
  });

  return horses;
}


// ── 特殊馬事件：投注確認後觸發 ──
function checkAndApplySpecialHorse() {
  S.specialHorse  = null; S.specialType  = null;
  S.specialHorse2 = null; S.specialType2 = null;
  S.doubleEvent   = false; S.doubleQOdds  = null;

  let type, minOdds, maxOdds;
  if (S.forceDoubleHorse) {
    return applyDoubleHorseEvent();
  } else if (S.forceBlackHorse) {
    type = 'BLACK';  minOdds = CFG.BLACK_HORSE_MIN;  maxOdds = CFG.BLACK_HORSE_MAX;
  } else if (S.forceGoldenHorse) {
    type = 'GOLDEN'; minOdds = CFG.GOLDEN_HORSE_MIN; maxOdds = CFG.GOLDEN_HORSE_MAX;
  } else {
    const r = Math.random();
    if (r < CFG.DOUBLE_HORSE_CHANCE) {
      return applyDoubleHorseEvent();
    } else if (r < CFG.DOUBLE_HORSE_CHANCE + CFG.BLACK_HORSE_CHANCE) {
      type = 'BLACK';  minOdds = CFG.BLACK_HORSE_MIN;  maxOdds = CFG.BLACK_HORSE_MAX;
    } else if (r < CFG.DOUBLE_HORSE_CHANCE + CFG.BLACK_HORSE_CHANCE + CFG.GOLDEN_HORSE_CHANCE) {
      type = 'GOLDEN'; minOdds = CFG.GOLDEN_HORSE_MIN; maxOdds = CFG.GOLDEN_HORSE_MAX;
    } else {
      return false;
    }
  }

  // 單馬事件：優先從低勝率馬中選
  const pool   = S.horses.filter(h => h.trueProb <= 0.20);
  const source = pool.length > 0 ? pool : S.horses;
  const target = source[Math.floor(Math.random() * source.length)];

  const winOdds   = type === 'GOLDEN' ? CFG.GOLDEN_HORSE_ODDS  : CFG.BLACK_HORSE_ODDS;
  const placeOdds = type === 'GOLDEN' ? CFG.GOLDEN_HORSE_PLACE : CFG.BLACK_HORSE_PLACE;
  target.specialOdds      = winOdds;
  target.specialPlaceOdds = placeOdds;
  target.specialType = type;

  S.bets.forEach(bet => {
    if (bet.type === 'WIN'   && bet.horses[0] === target.pos) { bet.odds = winOdds;   bet.isSpecial = true; }
    if (bet.type === 'PLACE' && bet.horses[0] === target.pos) { bet.odds = placeOdds; bet.isSpecial = true; }
  });

  S.specialHorse = target;
  S.specialType  = type;
  return true;
}

function applyDoubleHorseEvent() {
  // 選兩匹不同的低勝率馬
  const pool    = S.horses.filter(h => h.trueProb <= 0.20);
  const source  = pool.length >= 2 ? pool : S.horses;
  const shuffled = [...source].sort(() => Math.random() - 0.5);
  const horseA  = shuffled[0];
  const horseB  = shuffled.find(h => h.pos !== horseA.pos) || S.horses.find(h => h.pos !== horseA.pos);

  // 隨機決定名次：黃1黑2 或 黑1黃2
  const goldenFirst = Math.random() < 0.5;
  const goldenHorse = goldenFirst ? horseA : horseB;
  const blackHorse  = goldenFirst ? horseB : horseA;

  goldenHorse.specialOdds      = CFG.DOUBLE_HORSE_GOLDEN_ODDS;
  goldenHorse.specialPlaceOdds = CFG.DOUBLE_HORSE_GOLDEN_PLACE;
  goldenHorse.specialType = 'GOLDEN';
  blackHorse.specialOdds       = CFG.DOUBLE_HORSE_BLACK_ODDS;
  blackHorse.specialPlaceOdds  = CFG.DOUBLE_HORSE_BLACK_PLACE;
  blackHorse.specialType  = 'BLACK';

  const first  = goldenFirst ? goldenHorse : blackHorse;
  const second = goldenFirst ? blackHorse  : goldenHorse;

  // 升級 WIN / PLACE 下注 + 連贏那格
  S.bets.forEach(bet => {
    if (bet.type === 'WIN') {
      if (bet.horses[0] === goldenHorse.pos) { bet.odds = CFG.DOUBLE_HORSE_GOLDEN_ODDS;  bet.isSpecial = true; }
      if (bet.horses[0] === blackHorse.pos)  { bet.odds = CFG.DOUBLE_HORSE_BLACK_ODDS;   bet.isSpecial = true; }
    } else if (bet.type === 'PLACE') {
      if (bet.horses[0] === goldenHorse.pos) { bet.odds = CFG.DOUBLE_HORSE_GOLDEN_PLACE; bet.isSpecial = true; }
      if (bet.horses[0] === blackHorse.pos)  { bet.odds = CFG.DOUBLE_HORSE_BLACK_PLACE;  bet.isSpecial = true; }
    } else if (bet.type === 'QUINELLA') {
      const s = new Set(bet.horses);
      if (s.has(goldenHorse.pos) && s.has(blackHorse.pos)) { bet.odds = CFG.DOUBLE_HORSE_Q_ODDS; bet.isSpecial = true; }
    }
  });

  S.specialHorse  = first;   S.specialType  = first.specialType;
  S.specialHorse2 = second;  S.specialType2 = second.specialType;
  S.doubleEvent   = true;
  S.doubleQOdds   = CFG.DOUBLE_HORSE_Q_ODDS;
  return true;
}

      <div class="sr-sub">${orderLabel}・保證包辦前兩名！</div>
      <div class="sr-hint">點擊任意處繼續</div>`;
  } else {
    // ── 單馬事件 ──
    const isBlack = S.specialType === 'BLACK';
    backdrop.className = 'sr-backdrop ' + (isBlack ? 'sr-backdrop-black' : 'sr-backdrop-golden');
    box.className = 'special-reveal-box ' + (isBlack ? 'black-horse-box' : 'golden-horse-box');
    box.innerHTML = `
      <div class="sr-icon">${isBlack ? '🖤' : '✨'}</div>
      <div class="sr-label">${isBlack ? '【黑金馬】降臨！' : '【黃金馬】出現！'}</div>
      <div class="sr-horse">${S.specialHorse.pos}號 ${S.specialHorse.name}</div>
      <div class="sr-odds">${S.specialHorse.specialOdds}x</div>
      <div class="sr-sub">獨贏 ${S.specialHorse.specialOdds}x・位置 ${S.specialHorse.specialPlaceOdds}x</div>
      <div class="sr-sub">${isBlack ? '黑金馬' : '黃金馬'}保證奪得第一名！</div>
      <div class="sr-hint">點擊任意處繼續</div>`;
  }

  overlay.classList.add('active');

  let dismissed = false;
  function dismiss() {
    if (dismissed) return;
    dismissed = true;
    overlay.removeEventListener('click', dismiss);
    overlay.classList.remove('active');
    setTimeout(callback, 320);
  }

  const autoTimer = setTimeout(dismiss, 4200);
  overlay.addEventListener('click', () => { clearTimeout(autoTimer); dismiss(); });
}

function calcQuinellaOdds(ha, hb) {
  const prob = calcQuinellaProb(ha, hb);
  return +(1/prob * CFG.RTP_QUINELLA).toFixed(1);
}

function simulateRace(horses) {
  // 用 trueProb 做 Harville 序列抽樣：每輪重新正規化剩餘機率
  const rem = horses.map(h => ({h, p: h.trueProb}));
  const order = [];
  while (rem.length) {
    const tot = rem.reduce((s, x) => s + x.p, 0);
    let r = Math.random() * tot, cum = 0;
    for (let i = 0; i < rem.length; i++) {
      cum += rem[i].p;
      if (r <= cum || i === rem.length - 1) {
        order.push(rem[i].h);
        rem.splice(i, 1);
        break;
      }
    }
  }
  order.forEach((h,i) => h.finalPos = i+1);
  return order;
}

function calcPayout(bets, horses) {
  let totalWin = 0;
  const results = [];
  // 依完賽名次排序
  const sorted = [...horses].sort((a,b)=>a.finalPos-b.finalPos);
  const first=sorted[0], second=sorted[1], third=sorted[2];

  for (const bet of bets) {
    let win = 0;
    if (bet.type==='WIN') {
      // bet.horses[0] 是位置號碼 (pos)
      if (bet.horses[0]===first.pos) win = bet.amount*bet.odds;
    } else if (bet.type==='PLACE') {
      const top3pos = [first.pos, second.pos, third.pos];
      if (top3pos.includes(bet.horses[0])) win = bet.amount*bet.odds;
    } else if (bet.type==='QUINELLA') {
      const top2pos = [first.pos, second.pos];
      if (bet.horses.every(p=>top2pos.includes(p))) win = bet.amount*bet.odds;
    }
    totalWin += win;
    results.push({bet, win});
  }
  return {totalWin, results, order:sorted};
}

function oddsClass(odds) {
  if (odds<=3.5) return 'hot';
  if (odds<=7)   return 'mid';
  return 'cold';
}

function renderQuinellaGrid() {
  const qcells  = document.getElementById('tl-q-cells');
  const betting = S.phase === 'BETTING';
  if (!qcells) return;
  qcells.innerHTML = '';

  const sorted = [...S.horses].sort((a, b) => a.pos - b.pos);
  // 21 組組合，依序排入 3 列 × 7 欄
  const pairs = [];
  for (let i = 0; i < sorted.length - 1; i++)
    for (let j = i + 1; j < sorted.length; j++)
      pairs.push([sorted[i], sorted[j]]);

  for (let r = 0; r < 3; r++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'tl-q-row';
    for (let c = 0; c < 7; c++) {
      const idx = r * 7 + c;
      if (idx >= pairs.length) break;
      const [ha, hb] = pairs[idx];
      const odds   = calcQuinellaOdds(ha, hb);
      const betAmt = cellBetTotal('QUINELLA', [ha.pos, hb.pos]);
      const cell   = document.createElement('div');
      cell.className = `tl-q-cell${betAmt>0?' sel':''}`;
      cell.dataset.type = 'QUINELLA'; cell.dataset.posA = ha.pos; cell.dataset.posB = hb.pos;
      cell.innerHTML = `
        <div class="tl-q-pair">
          <span class="tl-q-num" style="color:${ha.color};border-color:${ha.color}">${ha.pos}</span>
          <span class="tl-q-num" style="color:${hb.color};border-color:${hb.color}">${hb.pos}</span>
        </div>
        ${betAmt > 0 ? `<span class="bet-badge">$${betAmt}</span>` : ''}
        <div class="tl-q-odds">${odds}x</div>`;
      if (betting) cell.addEventListener('click', () => placeQuinellaBet(ha.pos, hb.pos));
      rowEl.appendChild(cell);
    }
    qcells.appendChild(rowEl);
  }
}

function getInsights() {
  const hist = S.history;
  const n    = hist.length;
  const out  = [];
  if (n === 0) return out;

  // 勝率王
  const winCnt = {};
  hist.slice(0, 10).forEach(r => {
    const w = r.order[0];
    if (w) winCnt[w.id] = (winCnt[w.id] || 0) + 1;
  });
  let topId = null, topCt = 0;
  Object.entries(winCnt).forEach(([id, c]) => { if (c > topCt) { topCt = c; topId = +id; } });
  if (topId) {
    const horse = S.horses.find(h => h.id === topId) || POOL.find(h => h.id === topId);
    if (horse) out.push({ icon:'🏆', title:'勝率王', horse,
      desc:`近${Math.min(n,10)}場 ${topCt}勝（${Math.round(topCt/Math.min(n,10)*100)}%）` });
  }

  // 爆冷王（單場最高賠率奪冠）
  let topOddsRace = null, topOdds = 0;
  hist.slice(0, 10).forEach(r => {
    if (r.winnerWinOdds && r.winnerWinOdds > topOdds) { topOdds = r.winnerWinOdds; topOddsRace = r; }
  });
  if (topOddsRace && topOdds >= 4) {
    const horse = S.horses.find(h => h.id === topOddsRace.order[0].id) || topOddsRace.order[0];
    if (horse) out.push({ icon:'💰', title:'爆冷王', horse, desc:`最高 ${topOdds}x 賠率奪冠` });
  }

  // 久未奪冠（≥5 場）
  const lastWinRace = {};
  hist.forEach(r => { const w = r.order[0]; if (w && lastWinRace[w.id] === undefined) lastWinRace[w.id] = r.raceNum; });
  let drHorse = null, maxDr = 0;
  S.horses.forEach(h => {
    const last = lastWinRace[h.id];
    const gap  = last !== undefined ? S.raceNum - last : S.raceNum;
    if (gap >= 5 && gap > maxDr) { maxDr = gap; drHorse = h; }
  });
  if (drHorse) out.push({ icon:'😴', title:'久未奪冠', horse: drHorse, desc:`已 ${maxDr} 場未奪冠` });

  // 前三常客（近10場前三次數最多）
  const top3Cnt = {};
  hist.slice(0, 10).forEach(r => {
    r.order.slice(0, 3).forEach(h => {
      if (h) top3Cnt[h.id] = (top3Cnt[h.id] || 0) + 1;
    });
  });
  let t3Horse = null, maxT3 = 2;
  S.horses.forEach(h => {
    const c = top3Cnt[h.id] || 0;
    if (c > maxT3) { maxT3 = c; t3Horse = h; }
  });
  if (t3Horse) out.push({ icon:'🎯', title:'前三常客', horse: t3Horse, desc:`近${Math.min(n,10)}場 ${maxT3}次前三` });

  return out;
}

// 計算某格累積投注金額（用 pos）
function cellBetTotal(type, positions) {
  return S.bets
    .filter(b => b.type===type && positions.every(p=>b.horses.includes(p)))
    .reduce((s,b)=>s+b.amount, 0);
}

function placeBet(type, pos) {
  if (S.phase!=='BETTING') return;
  const h = S.horses.find(x=>x.pos===pos);
  if (!h) return;
  const odds = type==='WIN' ? h.winOdds : h.placeOdds;
  if (S.balance < S.chipAmt) { flashInsufficient(); return; }
  S.balance -= S.chipAmt;
  updateBal();
  S.bets.push({type, horses:[pos], amount:S.chipAmt, odds});
  renderAll();
}

function flashInsufficient() {
  const el = document.getElementById('pf-total-val');
  if (!el) return;
  const orig = el.style.color;
  el.textContent = '餘額不足';
  el.style.color = 'var(--color-lose)';
  setTimeout(() => { el.style.color = orig; renderPanelFooter(); }, 1200);
}

function repeatBet() {
  if (S.phase !== 'BETTING' || S.lastBets.length === 0) return;
  // 用 horse.id 對應當前賽局的 pos
  const idToPos = {};
  S.horses.forEach(h => { idToPos[h.id] = h.pos; });
  S.lastBets.forEach(b => {
    const newPos = b.horseIds.map(id => idToPos[id]).filter(Boolean);
    if (newPos.length !== b.horseIds.length) return; // 該馬本場不出賽
    if (S.balance < b.amount) return;
    if (b.type === 'QUINELLA' && newPos.length === 2) {
      S.balance -= b.amount;
      S.bets.push({ type:'QUINELLA', horses:newPos, amount:b.amount, odds:b.odds });
    } else if (b.type !== 'QUINELLA' && newPos.length === 1) {
      const horse = S.horses.find(h => h.pos === newPos[0]);
      const odds  = b.type === 'WIN' ? horse.winOdds : horse.placeOdds;
      S.balance -= b.amount;
      S.bets.push({ type:b.type, horses:newPos, amount:b.amount, odds });
    }
  });
  updateBal();
  renderAll();
}

function placeQuinellaBet(posA, posB) {
  if (S.phase!=='BETTING') return;
  const ha=S.horses.find(x=>x.pos===posA), hb=S.horses.find(x=>x.pos===posB);
  if (!ha||!hb) return;
  if (S.balance < S.chipAmt) return;
  S.balance -= S.chipAmt;
  updateBal();
  S.bets.push({type:'QUINELLA', horses:[posA,posB], amount:S.chipAmt, odds:calcQuinellaOdds(ha,hb)});
  renderAll();
}

function betAll() {
  if (S.phase !== 'BETTING') return;
  const horses = [...S.horses].sort((a,b) => a.pos - b.pos);
  const amt = S.chipAmt;
  let spent = 0;

  // 獨贏
  horses.forEach(h => {
    if (S.balance - spent < amt) return;
    spent += amt;
    S.bets.push({ type:'WIN', horses:[h.pos], amount:amt, odds:h.winOdds });
  });
  // 位置
  horses.forEach(h => {
    if (S.balance - spent < amt) return;
    spent += amt;
    S.bets.push({ type:'PLACE', horses:[h.pos], amount:amt, odds:h.placeOdds });
  });
  // 連贏
  for (let i = 0; i < horses.length - 1; i++) {
    for (let j = i + 1; j < horses.length; j++) {
      if (S.balance - spent < amt) break;
      const ha = horses[i], hb = horses[j];
      spent += amt;
      S.bets.push({ type:'QUINELLA', horses:[ha.pos,hb.pos], amount:amt, odds:calcQuinellaOdds(ha,hb) });
    }
  }

  S.balance -= spent;
  updateBal();
  renderAll();
}

function cancelAll() {
  const refund = S.bets.reduce((s,b)=>s+b.amount, 0);
  S.balance += refund;
  updateBal();
  S.bets = [];
  renderAll();
}

function beginRace() {
  if (S.phase !== 'BETTING') return;
  const triggered = checkAndApplySpecialHorse();
  if (triggered) {
    showSpecialReveal(() => startRace());
  } else {
    startRace();
  }
}

function skipRace() {
  if (S.phase !== 'RACING' || !S.raceOrder) return;
  if (raceAnimId) { cancelAnimationFrame(raceAnimId); raceAnimId = null; }
  if (camTimer)   { clearTimeout(camTimer); camTimer = null; }
  document.getElementById('race-countdown').classList.remove('cd-active');
  onRaceEnd(S.raceOrder);
}

function updateRankBar(ts) {
  const sorted = S.horses
    .map(h => ({ h, left: racePositions[h.pos] || RACE_START_PCT }))
    .sort((a,b) => b.left - a.left);

  const posClass = ['p1','p2','p3','px','px','px','px'];
  const bgClass  = ['top1','top2','top3','','','',''];

  sorted.forEach(({ h }, rank) => {
    const rb = rbItemsByPos[h.pos];
    if (!rb) return;
    rb.el.style.order  = rank;
    rb.el.className    = `rb-item ${bgClass[rank]}`;
    rb.posEl.className = `rb-pos ${posClass[rank]}`;
    rb.posEl.textContent = rank + 1;
  });

  if (ts - lastArrowTs > 500) {
    sorted.forEach(({ h }, rank) => {
      const rb   = rbItemsByPos[h.pos];
      const prev = prevRanksByPos[h.pos];
      if (!rb) return;
      if (prev === -1 || rank === prev) {
        rb.arrowEl.className = 'rb-arrow same'; rb.arrowEl.textContent = '—';
      } else if (rank < prev) {
        rb.arrowEl.className = 'rb-arrow up';   rb.arrowEl.textContent = '▲';
      } else {
        rb.arrowEl.className = 'rb-arrow down'; rb.arrowEl.textContent = '▼';
      }
      prevRanksByPos[h.pos] = rank;
    });
    lastArrowTs = ts;
  }
}
